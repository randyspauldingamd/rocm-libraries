# hipSOLVER Test Categories Configuration
# Aligned with rocJenkins job types and Test Filter Standardization.
#
# hipSOLVER uses a two-tier naming convention:
#   checkin_* - Fast tests for precheckin validation (e.g. checkin_lapack, checkin_misc)
#   daily_*   - Comprehensive tests for nightly runs (currently commented out)
#
# Note: hipSOLVER does not currently define weekly_* tests, so no weekly
# tier is included here. Add one if/when weekly_* INSTANTIATE_TEST_SUITE_P
# entries are introduced.
#
# The exclude list mirrors the curated "known broken" filter used by
# TheRock CI in test/therock/test_hipsolver.py and the *known_bug* convention
# used by projects/hipsolver/rtest.xml.

# YAML anchor for the shared exclusion list so each category stays in sync
# with TheRock CI runner (test/therock/test_hipsolver.py).
_common_excludes: &common_excludes
  - "*DISABLED*"
  - "*known_bug*"
  - "*HEEVD*float_complex*"
  - "*HEEVJ*float_complex*"
  - "*HEGVD*float_complex*"
  - "*HEGVJ*float_complex*"
  - "*HEEVDX*float_complex*"
  - "*SYTRF*float_complex*"
  - "*HEEVD*double_complex*"
  - "*HEEVJ*double_complex*"
  - "*HEGVD*double_complex*"
  - "*HEGVJ*double_complex*"
  - "*HEEVDX*double_complex*"
  - "*SYTRF*double_complex*"
  # TODO(#2824): Re-enable test once flaky issue is resolved.
  - "checkin_lapack/POTRF_FORTRAN.batched__float_complex/9"

test_categories:
  quick:
    description: "Fast sanity checks (target: < 5 min) - checkin tests"
    test_patterns:
      - "checkin_*"
    exclude: *common_excludes
    labels:
      - "quick"
      - "pre-commit"
      - "smoke"

  standard:
    description: "Pre-checkin validation (target: < 45 min) - same as Jenkins precheckin"
    test_patterns:
      - "checkin_*"
    exclude: *common_excludes
    labels:
      - "standard"
      - "pr"
      - "precheckin"

  comprehensive:
    description: "Nightly comprehensive tests (target: < 7 hours) - same as Jenkins extended"
    test_patterns:
      - "daily_*"
      - "checkin_*" #daily_* is commented out for now
    exclude: *common_excludes
    labels:
      - "comprehensive"
      - "nightly"
      - "extended"

  full:
    description: "Complete test suite - all tests including daily"
    test_patterns:
      - "checkin_*"
      - "daily_*"
    exclude: *common_excludes
    labels:
      - "full"
      - "all"

execution_settings:
  default_timeout: 300
  timeout_multiplier: 1
  category_timeouts:
    quick: 300            # 5 minutes
    standard: 2700        # 45 minutes (matches Jenkins precheckin timeout)
    comprehensive: 25200  # 7 hours (matches Jenkins extended timeout)
    full: 28800           # 8 hours
