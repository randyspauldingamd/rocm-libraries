  - "*/GPU_ConvBiasActiv*"
  - "*/GPU_Conv*"
  - "*/GPU_conv*"
  - "*/GPU_UnitTestConv*"
  - "*/GPU_GetitemBwd*"
  - "*/GPU_GLU_*"
  - "*/GPU_GroupConv*"
  - "*/GPU_GroupNorm_*"
  - "*/GPU_GRUExtra_*"
  - "*/GPU_TestActivation*"
  - "*/GPU_HipBLASLtGEMMTest*"
  - "*/GPU_KernelTuningNetTestConv*"
  - "*/GPU_Kthvalue_*"
  - "*/GPU_LayerNormTest*"
  - "*/GPU_LayoutTransposeTest_*"
  - "*/GPU_Lrn*"
  - "*/GPU_lstm_extra*"
  - "*/GPU_MultiMarginLoss_*"
  - "*/GPU_ConvNonpack*"
  - "*/GPU_PerfConfig_HipImplicitGemm*"
  - "*/GPU_AsymPooling2d_*"
  - "*/GPU_WidePooling2d_*"
  - "*/GPU_PReLU_*"
  - "*/GPU_Reduce*"
  - "*/GPU_reduce_custom_*"
  - "*/GPU_regression_issue_*"
  - "*/GPU_RNNExtra_*"
  - "*/GPU_RoPE*"
  - "*/GPU_SoftMarginLoss*"
  - "*/GPU_T5LayerNormTest_*"
  - "*/GPU_Op4dTensorGenericTest_*"
  - "*/GPU_TernaryTensorOps_*"
  - "*/GPU_unaryTensorOps_*"
  - "*/GPU_Transformers*"
  - "*/GPU_TunaNetTest_*"
  - "*/GPU_UnitTestActivationDescriptor_*"
  - "*/GPU_FinInterfaceTest*"
  - "*/GPU_KernelTuningNetTest*"
