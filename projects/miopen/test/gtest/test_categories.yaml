# MIOpen Test Categories Configuration
# Time-based test organization for CI/CD pipeline efficiency
# This file defines test categories by execution time and criticality

# Common comprehensive patterns - used by both standard and comprehensive
# Standard applies exclude list to filter out slower tests
# Comprehensive runs all patterns without exclusion
