test_categories:
  quick:
    description: "Fast sanity checks - Run pre-commit (target: < 5 min)"
    test_patterns:
      - "Smoke/GPU_BNCKFWDTrainLarge2D_FP16*"
      - "Smoke/GPU_BNOCLFWDTrainLarge2D_FP16*"
      - "Smoke/GPU_BNOCLFWDTrainLarge3D_FP16*"
      - "Smoke/GPU_BNCKFWDTrainLarge2D_BFP16*"
      - "Smoke/GPU_BNOCLFWDTrainLarge2D_BFP16*"
      - "Smoke/GPU_BNOCLFWDTrainLarge3D_BFP16*"
      - "Smoke/GPU_UnitTestConvSolverImplicitGemmFwdXdlops_FP16*"
      - "Smoke/GPU_UnitTestConvSolverImplicitGemmFwdXdlops_BFP16*"

    exclude:
      - "Smoke/GPU_BNOCLFWDTrainLarge2D_BFP16*"
      - "Smoke/GPU_BNOCLInferLarge2D_BFP16*"
      - "*/GPU_MIOpenDriver*"
      - "*GPU_TestMhaFind20_FP32*" #rocm-1016 fixed in develop. Re-enable once bumped
      - "*GPU_TestMhaFind20_FP16*" #rocm-1016 fixed in develop. Re-enable once bumped
      
    exclude_windows:
      # The following tests are added to show functionality
      - "Smoke/GPU_BNOCLFWDTrainLarge2D_BFP16*"
      - "Smoke/GPU_BNOCLInferLarge2D_BFP16*"

    exclude_linux:
      # The following tests are added to show functionality
      - "Smoke/GPU_BNOCLInferLarge2D_BFP16*"
      - "Smoke/GPU_BNOCLFWDTrainLarge2D_BFP16*"

      
    test_files:
      - "gtest/smoke_*.cpp"
      - "gtest/unit_ActivationDescriptor.cpp"
      - "gtest/unit_TensorDescriptor.cpp"
      - "gtest/unit_FinInterface.cpp"
      - "gtest/unit_lib_env_var.cpp"
      - "gtest/gtest_activation.cpp"
      - "handle_test.cpp"
      - "gtest/handle_hip_device.cpp"
      - "gtest/tensor_api.cpp"
      - "gtest/tensor_test.cpp"
      - "gtest/log.cpp"
      - "gtest/log_test.cpp"
      - "gtest/test_errors.cpp"
      - "gtest/pooling2d_asymmetric.cpp"
    
    labels:
      - "quick"
      - "pre-commit"
      - "smoke"

  standard:
    description: "Core functionality - Run on every PR (target: < 30 min)"
    test_patterns: *positive_patterns

    exclude:
      # Excluding slower tests for faster PR validation
      - "*DeepBench*"
      - "*MIOpenTestConv*"
      - "Full/GPU_Reduce_FP64*"
      - "Full/GPU_BNOCLFWDTrainSerialRun3D_BFP16*"
      - "Full/GPU_Lrn_FP32*"
      - "Full/GPU_Lrn_FP16*"
      - "Full/GPU_BNOCLInferSerialRun3D_BFP16*"
      - "Smoke/GPU_BNOCLFWDTrainLarge2D_BFP16*"
      - "Smoke/GPU_BNOCLInferLarge2D_BFP16*"
      - "Full/GPU_BNOCLBWDSerialRun3D_BFP16*"
      - "Smoke/GPU_BNOCLBWDLarge2D_BFP16*"
      - "Full/GPU_UnitTestActivationDescriptor_FP32*"
      - "Full/GPU_UnitTestActivationDescriptor_FP16*"
      - "Smoke/GPU_BNOCLBWDLargeFusedActivation2D_BFP16*"
      - "Smoke/GPU_BNOCLBWDLargeFusedActivation2D_FP16*"
      - "Full/GPU_ConvGrpBiasActivInfer_BFP16*"
      - "Full/GPU_ConvGrpBiasActivInfer_FP32*"
      - "Full/GPU_ConvGrpBiasActivInfer_FP16*"
      - "Full/GPU_ConvGrpActivInfer_BFP16*"
      - "Full/GPU_ConvGrpActivInfer_FP32*"
      - "Full/GPU_ConvGrpActivInfer_FP16*"
      - "Full/GPU_ConvGrpBiasActivInfer3D_BFP16*"
      - "Full/GPU_ConvGrpBiasActivInfer3D_FP32*"
      - "Full/GPU_ConvGrpBiasActivInfer3D_FP16*"
      - "Full/GPU_ConvGrpActivInfer3D_BFP16*"
      - "Full/GPU_ConvGrpActivInfer3D_FP32*"
      - "Full/GPU_ConvGrpActivInfer3D_FP16*"
      - "Smoke/GPU_UnitTestConvSolverHipImplicitGemmV4R1Fwd_BFP16.ConvHipImplicitGemmV4R1Fwd/0"
      - "*/GPU_MIOpenDriver*"
      - "*GPU_TestMhaFind20_FP32*" #rocm-1016 fixed in develop. Re-enable once bumped
      - "*GPU_TestMhaFind20_FP16*" #rocm-1016 fixed in develop. Re-enable once bumped

    test_files:
      # Quick tests
      - "gtest/smoke_*.cpp"
      - "gtest/unit_*.cpp"
      - "gtest/gtest_activation.cpp"
      - "handle_test.cpp"
      - "gtest/handle_hip_device.cpp"
      
      # Standard tests
      - "conv2d.cpp"
      - "conv2d_bias.cpp"
      - "gtest/miopen_conv.cpp"
      - "bn_spatial_test.cpp"
      - "bn_peract_test.cpp"
      - "gtest/bn_fwd_train.cpp"
      - "gtest/bn_bwd.cpp"
      - "gtest/bn_infer.cpp"
      - "gtest/conv_api.cpp"
      - "gtest/conv_activ_infer.cpp"
      - "pooling2d.cpp"
      - "gtest/pooling2d_asymmetric.cpp"
      - "gtest/pooling2d_wide.cpp"
      - "tensor_reorder.cpp"
      - "tensor_trans.cpp"
      - "gtest/tensor_api.cpp"
      - "gtest/unary_tensor_ops.cpp"
      - "gtest/binary_tensor_ops.cpp"
      - "gtest/soft_max.cpp"
      - "gtest/dropout.cpp"
      - "gtest/reduce.cpp"
      - "gtest/layernorm.cpp"
      - "gtest/cache.cpp"
    
    labels:
      - "standard"
      - "pr"


  comprehensive:
    description: "Extended testing - Run nightly (target: < 2 hours)"
    test_patterns: *positive_patterns

    exclude:
      - "*/GPU_MIOpenDriver*"
      - "*GPU_TestMhaFind20_FP32*" #rocm-1016 fixed in develop. Re-enable once bumped
      - "*GPU_TestMhaFind20_FP16*" #rocm-1016 fixed in develop. Re-enable once bumped

    test_files:
      # Quick tests
      - "gtest/smoke_*.cpp"
      - "gtest/unit_*.cpp"
      - "gtest/gtest_activation.cpp"
      - "handle_test.cpp"
      - "gtest/handle_hip_device.cpp"
      
      # Standard tests
      - "conv2d.cpp"
      - "conv2d_bias.cpp"
      - "gtest/miopen_conv.cpp"
      - "bn_spatial_test.cpp"
      - "bn_peract_test.cpp"
      - "gtest/bn_fwd_train.cpp"
      - "gtest/bn_bwd.cpp"
      - "gtest/bn_infer.cpp"
      - "gtest/conv_api.cpp"
      - "gtest/conv_activ_infer.cpp"
      - "pooling2d.cpp"
      - "gtest/pooling2d_asymmetric.cpp"
      - "gtest/pooling2d_wide.cpp"
      - "tensor_reorder.cpp"
      - "tensor_trans.cpp"
      - "gtest/tensor_api.cpp"
      - "gtest/unary_tensor_ops.cpp"
      - "gtest/binary_tensor_ops.cpp"
      - "gtest/soft_max.cpp"
      - "gtest/dropout.cpp"
      - "gtest/reduce.cpp"
      - "gtest/layernorm.cpp"
      - "gtest/cache.cpp"

    labels:
      - "comprehensive"
      - "nightly"

  full:
    description: "Complete test suite - (target: hours+)"
    test_patterns:
      # Everything - all test suite prefixes
      - "Smoke/*"
      - "Full/*"
      - "Perf/*"
      - "Unit/*"
      - "*"

    exclude:
      - "*/GPU_MIOpenDriver*"

    test_files:
      # All test files in the suite
      - "*.cpp"
      - "gtest/*.cpp"
      
    exclude:
      # Only exclude explicitly disabled tests
      - "*DISABLED*"
    
    labels:
      - "full"
      - "weekly"
      - "all"


# Common GPU exclusion patterns - used by multiple GPU architectures
gfx11_common_patterns: &gfx11_common_patterns
  - "Smoke/GPU_BNFWDTrainLargeFusedActivation2D_FP32.BnV2LargeFWD_TrainCKfp32Activation/NCHW_BNSpatial_testBNAPIV1_Dim_2_test_id_32"
  - "Smoke/GPU_BNFWDTrainLarge2D_FP32.BnV2LargeFWD_TrainCKfp32/NCHW_BNSpatial_testBNAPIV2_Dim_2_test_id_64"
  - "*SerialRun3D*"
  - "*gfx942*"
  - "*GPU_UnitTestConvSolverFFTFwd_FP32*"
  - "*GPU_UnitTestConvSolverFFTBwd_FP32*"
  - "*GPU_TernaryTensorOps_FP64*"
  - "*GPU_TernaryTensorOps_FP16*"
  - "*GPU_TernaryTensorOps_FP32*"
  - "*GPU_Op4dTensorGenericTest_FP32*"
  - "*GPU_UnitTestActivationDescriptor_FP16*"
  - "*GPU_UnitTestActivationDescriptor_FP32*"
  - "*CPU_TuningPolicy_NONE*"
  - "*GPU_Dropout_FP32*"
  - "*GPU_Dropout_FP16*"
  - "*GPU_GroupConv3D_BackwardData_FP16.GroupConv3D_BackwardData_half_Test*"
  - "*GPU_GroupConv3D_BackwardData_BFP16.GroupConv3D_BackwardData_bfloat16_Test*"
  - "*GPU_UnitTestConvSolverImplicitGemmGroupWrwXdlops_BFP16.ConvHipImplicitGemmGroupWrwXdlops*"
  - "Smoke/GPU_MultiMarginLoss*"
  - "*CPU_UnitTestConvSolverImplicitGemmGroupWrwXdlopsDevApplicability_FP16.ConvHipImplicitGemmGroupWrwXdlops*"
  # Slow tests to exclude (from #3362)
  - "Full/GPU_Softmax_FP32*"  # 24 min
  - "Full/GPU_Softmax_BFP16*"  # 13 min
  - "Full/GPU_Softmax_FP16*" # 11.5 min
  - "Smoke/GPU_Reduce_FP32*"  # 6.5 min
  - "Smoke/GPU_Reduce_FP16*"  # 4.5 min

exclude_gpu:
  exclude_gpu_gfx120X:
    test_patterns: *gfx11_common_patterns
    labels:
      - "quick"
      - "standard"
      - "comprehensive"
      - "full"
      - "ex_gpu_gfx120X"

  exclude_gpu_gfx110X:
    test_patterns: *gfx11_common_patterns
    labels:
      - "quick"
      - "standard"
      - "comprehensive"
      - "full"
      - "ex_gpu_gfx110X"

  exclude_gpu_gfx115X:
  #Negative patterns for gfx1150 and gfx1151 will be covered here. 
  #Add exclude_gpu_gfx1150/gfx1151 separately only if they have unique patterns.
    test_patterns: *gfx11_common_patterns
    labels:
      - "quick"
      - "standard"
      - "comprehensive"
      - "full"
      - "ex_gpu_gfx115X"

  exclude_gpu_gfx950:
    test_patterns:
      - "*DBSync*"
    labels:
      - "quick"
      - "standard"
      - "comprehensive"
      - "full"
      - "ex_gpu_gfx950"

execution_settings:
  default_timeout: 300  # 5 minutes per test
  timeout_multiplier: 2 # Multiplier for all timeouts (1, 1.5, 1.75, 2, etc.)
  category_timeouts:
    quick: 300          # 5 minutes 
    standard: 1800      # 30 minutes 
    comprehensive: 7200 # 2 hours 
    full: 14400         # 4 hours         
