[pytest]
# Pytest configuration for CK Tile Dispatcher Python tests

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Options
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    --durations=10

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    cuda: marks tests requiring CUDA/ROCm
    torch: marks tests requiring PyTorch
    integration: marks integration tests
    unit: marks unit tests

# Coverage
[coverage:run]
source = .
omit =
    */tests/*
    */examples/*
    setup.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov

