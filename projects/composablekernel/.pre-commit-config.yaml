repos:
-   repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.3
    hooks:
    -   id: clang-format
        types_or: [c++, inc]
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
    -   id: ruff-check
        args: [ --fix ]
        exclude: |
            (?x)^(
                docs/conf.py
            )$
    -   id: ruff-format
        exclude: |
            (?x)^(
                docs/conf.py
            )$
-   repo: local
    hooks:
    -   id: copyright-header-checker
        name: Check copyright headers
        entry: projects/composablekernel/script/check_copyright_year.sh
        verbose: false
        language: script
        types_or: [c++, python, shell, cmake]
    -   id: ascii-only-checker
        name: Check for non-ASCII characters in C/C++ sources
        entry: projects/composablekernel/script/check_ascii_only.sh
        language: script
        types_or: [c++, inc]
    -   id: crlf-checker
        name: Check for CRLF line endings in C/C++ sources
        entry: projects/composablekernel/script/check_no_crlf.sh
        language: script
        types_or: [c++, inc]
    -   id: remove-exec-bit
        name: Remove executable bit from non-executable files
        entry: projects/composablekernel/script/remove_exec_bit.sh
        language: script
        types_or: [c++, text]
        verbose: true
    -   id: remod-ck-tile
        name: Run ck_tile remod.py
        entry: python projects/composablekernel/script/remod_for_ck_tile.py
        language: python
        files: '^projects/composablekernel/(include|example)/ck_tile/.*$'
        additional_dependencies:
        - dos2unix
        - clang-format==18.1.3
        pass_filenames: false
