  alpha_beta: *alpha_beta_range
  c_equal_d: [false, true]
  batch_mode: [0, 1]
  batch_count: [1, 3]

# FP16 I/O + FP32 compute: full-matrix probe for internal FP32 accumulation (rocBLAS-style near-max A, ±2 pairs in B).
# Mirrors matmul_integer_exact_* matrix_size / category / batch / gpu_arch; NN only (probe does not support transposes).
# Odd K skipped at runtime.
- name: matmul_fp16_accumulator_probe_one
  category: quick
  function:
    matmul: *hpa_half_precision
  matrix_size: *one_matrix_size_range
  transA: N
  transB: N
  alpha: 1.0
  beta: 0.0
  initialization: fp16_accumulator_probe
  unit_check: 1

