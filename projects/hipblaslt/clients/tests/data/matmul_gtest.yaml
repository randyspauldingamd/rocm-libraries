# Integer-exact + TF32x1 (f32 A+B, compute input bf16). gfx950 only. Sizes match matmul_gemm_f32_fast_bf16.
# Omit TT: TF32x1 often has no solution for both-transposed on gfx950 (CI saw 21× NO solution, all TT).
- name: matmul_integer_exact_tf32x1_gfx950
  category: quick
  function:
    matmul: *real_precisions_tf32x1_only
  matrix_size:
    - { M:  128,  N:  128,  K:  128  }
    - { M:  131,  N:  131,  K:  131  }
    - { M:  1024, N:  1024, K:  1024 }
    - { M:  1031, N:  1031,  K:  1031  }
  transA_transB:
    - { transA: N, transB: N }
    - { transA: N, transB: T }
    - { transA: T, transB: N }
  alpha_beta: *integer_exact_alpha_beta
  initialization: integer_exact
  unit_check: 1
  gpu_arch: '950'

