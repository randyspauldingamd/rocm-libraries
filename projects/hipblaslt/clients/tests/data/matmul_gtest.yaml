---
include: hipblaslt_common.yaml
include: known_bugs.yaml
include: matmul_common.yaml

Definitions:
  - &alpha_beta_range
    - { alpha:  5, beta:  0 }
    - { alpha:  0, beta:  3 }
    - { alpha:  1, beta:  3 }
    - { alpha:  1, beta:  1 }
  
  - &complex_alpha_beta_range
    - { alpha: 1, alphai: 0, beta: 0, betai: 0 } # Standard
    - { alpha: 0, alphai: 0, beta: 1, betai: 0 } # Pure C (Alpha Zero)
    - { alpha: 0, alphai: 1, beta: 0, betai: 0 } # Imaginary Alpha
    - { alpha: 1, alphai: 0, beta: 0, betai: 1 } # Imaginary Beta
    - { alpha: 0, alphai: 2, beta: 0, betai: 0 } # Optimization Trap (Real=0)
    - { alpha: 1, alphai: 1, beta: 1, betai: -1 } # Cancellation/Signs
    - { alpha: 2, alphai: 3, beta: 4, betai: 5 } # General
 
  - &complex_alpha_beta_range_small
    - { alpha: 1, alphai: 0, beta: 0, betai: 1 } # Imaginary Beta
    - { alpha: 2, alphai: 3, beta: 4, betai: 5 } # General

  - &alpha_beta_range_small
    - { alpha: 2, alphai: 2, beta: -1.0, betai: 2.0 }

  - &transA_transB_range
    - { transA: N, transB: N }
    - { transA: N, transB: T }
    - { transA: T, transB: N }
    - { transA: T, transB: T }

  - &complex_transA_transB_range
    - { transA: N, transB: N }
    - { transA: N, transB: T }
    - { transA: T, transB: N }
    - { transA: T, transB: T }
    - { transA: C, transB: N }
    - { transA: N, transB: C }
    - { transA: C, transB: C }

  - &complex_transA_transB_range_small
    - { transA: T, transB: C }
    - { transA: C, transB: N }
    - { transA: C, transB: C }

  - &deepbench_alpha_beta_range
    - { alpha: 1, beta: 0 }
    - { alpha: 1, beta: 1 }

  - &integer_exact_alpha_beta
    - { alpha: 2.0, beta: 0.0 }
    - { alpha: 2.0, beta: -2.0 }

  - &deepbench_transA_transB_range
    - { transA: N, transB: N }
    - { transA: N, transB: T }
    - { transA: T, transB: N }

  - &ldd_transA_transB_range
    - { transA: N, transB: N }
    - { transA: N, transB: T }
    - { transA: T, transB: N }
    - { transA: T, transB: T }

  - &conjugate_transA_transB_range
    - { transA: T, transB: C }
    - { transA: C, transB: T }
    - { transA: N, transB: C }
    - { transA: C, transB: N }
    - { transA: C, transB: C }

  - &swizzleA_strideA_support
    - {}
    - { stride_a: 0 }

  - &swizzleB_strideB_support
    - {}
    - { stride_b: 0 }

Tests:
- name: matmul_bad_arg
  category: pre_checkin
  function:
    - matmul_bad_arg: *real_precisions
  transA: N
  transB: N
  fortran: [ false, true ]

# Tests confirm no NaN propagation when alpha = 0, 2 and beta = 0. Value .NaN is converted into zero
- {name: alpha_beta_zero_NaN, category: pre_checkin, precision: *real_precisions,
   function: matmul, transA: N, transB: N, M: 256, N: 128, K:  64, alpha: [ .NaN, 2 ], beta: [ .NaN, 2 ] }

# ROCM-1545: hipblasLtMatmul with INF inputs and computeType HIPBLAS_COMPUTE_32F_FAST_TF32
# returns NaN on gfx950 (MI355). This test expects correct behavior (no NaN in output).
- {name: matmul_tf32_inf_ROCM1545, category: pre_checkin, precision: *xf32_precision,
   function: matmul, transA: N, transB: N, M: 64, N: 64, K: 64, alpha: 1.0, beta: 0.0,
   initialization: inf }

# Smoke: norm_dist_one_special (Gaussian fill + one FP special); batch_count 2 exercises packed strided buffers.
- {name: matmul_norm_dist_one_special_smoke, category: quick, precision: *real_precisions,
   function: matmul, transA: N, transB: N, M: 32, N: 32, K: 32, alpha: 1.0, beta: 0.0,
   batch_count: 2, initialization: norm_dist_one_special }

