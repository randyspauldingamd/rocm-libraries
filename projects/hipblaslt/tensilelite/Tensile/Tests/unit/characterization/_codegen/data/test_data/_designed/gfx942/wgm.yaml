# R2 designed WGM-algo config for gfx942 codegen characterization.
#
# Goal: execute the SpaceFillingCurveWalk code path (lines 369-1037 of
# Tensile/Components/WorkGroupMappingAlgos.py) which is entirely uncovered when
# SpaceFillingAlgo is empty (DefaultWGM path).
#
# Key dispatch logic in KernelWriterAssembly.py:
#   if len(kernel["SpaceFillingAlgo"]):
#       SpaceFillingCurveWalk(...)   # -> lines 369-1037
#   else:
#       DefaultWGM(...)
#
# SpaceFillingAlgo fork values and their coverage targets:
#   [0] -> ColMajor single-level  -> chiplet_transform (369-410) +
#           SpaceFillingCurveWalk body (430-628) + TransformNLevels (655-763)
#           single-level path + ColRowMajor (816-841) + OrderingPreamble (781-808)
#   [1] -> RowMajor single-level  -> same paths as [0]
#   [2] -> Hilbert single-level   -> SpaceFillCurveSimpleImpl (850-1037) orderID=2
#   [3] -> Morton-Z single-level  -> SpaceFillCurveSimpleImpl (850-1037) orderID=3
#   [0,1] + SFCWGM -> two-level   -> multi-level paths in SpaceFillingCurveWalk
#                                    (495-608) + TransformNLevels multi-level (660-732)
#
# 5 SpaceFillingAlgo values x 1 SFCWGM config (shared across all) => 5 fork perms
# All 5 are within the limit=8 budget.
#
# ProblemType: bf16 BH + Bias + Activation on gfx942 (same dominant shape as
# seed.yaml so we reuse its validated kernel parameters).
GlobalParameters:
  SyncsPerBenchmark: 0
  MinimumRequiredVersion: 5.0.0
  NumElementsToValidate: 128
  DataInitTypeBeta: 0
  DataInitTypeAlpha: 1
  Device: 0

BenchmarkProblems:
  ########################################
  # BBS (bf16 in / bf16 out / f32 compute) NT, BH + Bias + Activation
  # SpaceFillingAlgo sweep to exercise WGM algo selection code paths.
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: True
      TransposeB: False
      UseBeta: True
      UseBias: 1
      Batched: True
      Activation: True
      ActivationType: all
    - # BenchmarkProblemSizeGroup
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 16, 1,  1,   1, 1,  4, 1 ]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ClusterLocalRead: [1]
        - DepthU: [32]
        - LocalReadVectorWidth: [8]
        - ScheduleIterAlg: [3]
        - ExpandPointerSwap: [False]
        - TransposeLDS: [1]
        - GlobalSplitU: [1]
        - SourceSwap: [True]
        - DirectToVgprA: [False]
        # SpaceFillingAlgo sweep: exercises SpaceFillingCurveWalk and its sub-functions.
        # Each list item is one fork value (a list of ordering IDs):
        #   [0]   = col-major, single-level   -> chiplet_transform + ColRowMajor
        #   [1]   = row-major, single-level   -> chiplet_transform + ColRowMajor (isCol=False)
        #   [2]   = Hilbert, single-level     -> SpaceFillCurveSimpleImpl orderID=2
        #   [3]   = Morton-Z, single-level    -> SpaceFillCurveSimpleImpl orderID=3
        #   [0,1] = col-major+row-major, 2-lv -> multi-level paths in TransformNLevels
        - SpaceFillingAlgo:
          - [0]
          - [1]
          - [2]
          - [3]
          - [0,1]
        # SFCWGM encodes grid dims for multi-level; required when len(SpaceFillingAlgo)>1.
        # Format: [[GridDimM_L1, GridDimN_L1], [GridDimM_L2, GridDimN_L2]]
        # A single pair works for single-level too (only L1 dims are used).
        - SFCWGM:
          - [[4,4],[2,2]]
        - WorkGroupMapping: [8]
        - WorkGroupMappingXCC: [1]
        - WorkGroupMappingXCCGroup: [0]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [256, 256, 1, 256]
        - BiasTypeArgs: ['b']
        - ActivationArgs:
          - [Enum: relu]
