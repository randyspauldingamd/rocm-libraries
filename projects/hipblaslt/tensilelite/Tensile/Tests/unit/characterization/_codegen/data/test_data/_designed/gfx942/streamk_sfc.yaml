# R5 designed StreamK + SpaceFillingAlgo config for gfx942 codegen characterization.
#
# Goal: exercise the SpaceFillingAlgo branch in skIndexToWG (StreamK.py:375-377)
# and the StreamK=2 (TwoTileOriginal) deterministic two-tile path with conditions
# that force partial tiles (grid forcing).
#
# Target missing ranges (methodology-A):
#   316-409  skIndexToWG SpaceFillingAlgo branch (lines 376-377)
#            Condition: kernel["SpaceFillingAlgo"] != []
#            SpaceFillingAlgo=[1] with SFCWGM=[[4,4]] triggers the
#            SNop + SMovB32(StreamKTileID) instructions (lines 376-377)
#
# StreamK=2 (TwoTileOriginal) with SpaceFillingAlgo exercises the fixup/partial
# tile code generation path (storeBranchesCommon) while also hitting the
# SpaceFillingAlgo conditional in skIndexToWG.
#
# The SFCWGM=[[4,4]] provides the L1 grid dims for the SFC ordering.
# SpaceFillingAlgo=[1] is ordering ID 1 (valid range 0-5).
#
# limit=4 kernels: StreamK=[2] x SpaceFillingAlgo=[[1]] x StreamKAtomic=[0,1] = 2 combos.
GlobalParameters:
  SyncsPerBenchmark: 0
  MinimumRequiredVersion: 5.0.0
  NumElementsToValidate: 128
  DataInitTypeBeta: 0
  DataInitTypeAlpha: 1
  Device: 0

BenchmarkProblems:
  ########################################
  # SGEMM (f32 in/out/compute) NT, Batched
  # StreamK=2 + SpaceFillingAlgo to exercise skIndexToWG SpaceFillingAlgo branch.
  # The SpaceFillingAlgo conditional (line 375) stores StreamKTileID in SGPR
  # (lines 376-377) for use by the WGM space-filling algorithm.
  #
  # StreamK=2 (TwoTileOriginal) generates:
  #   - skTileIndex path (lines 321-361)
  #   - skIndexToWG with SpaceFillingAlgo branch (lines 363-384)
  #   - storeBranchesCommon fixup loop (lines 785-919)
  ########################################
  -
    - # ProblemType: SGEMM NT
      OperationType: GEMM
      DataType: s
      DestDataType: s
      ComputeDataType: s
      HighPrecisionAccumulate: False
      TransposeA: False
      TransposeB: True
      UseBeta: True
      Batched: True
    - # BenchmarkProblemSizeGroup
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 4, 1, 1, 4, 4, 2, 2]
        - StreamK: [2]
        - StreamKAtomic: [0, 1]
        - StreamKXCCMapping: [0]
        - SpaceFillingAlgo: [[1]]
        - SFCWGM: [[[4, 4]]]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [3]
        - DepthU: [16]
        - LocalReadVectorWidth: [1]
        - ExpandPointerSwap: [False]
        - TransposeLDS: [0]
        - GlobalSplitU: [0]
        - SourceSwap: [True]
        - WorkGroupMapping: [1]
        - MIArchVgpr: [0]
        - VectorWidthA: [1]
        - VectorWidthB: [1]
        - GlobalReadVectorWidthA: [1]
        - GlobalReadVectorWidthB: [1]
        - StoreRemapVectorWidth: [0]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [512, 512, 1, 1024]
