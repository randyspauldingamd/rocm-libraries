TestParameters:
  marks: [skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201, skip-gfx1250] # not supported yet

GlobalParameters:
  MinimumRequiredVersion: 5.0.0
  SleepPercent: 50
  NumElementsToValidate: 128
  DataInitTypeBeta: 0
  DataInitTypeAlpha: 1
  CSVExportWinner: true
  CSVMergeSameProblemID: true
  Device: 0
  SyncsPerBenchmark: 1

BenchmarkProblems:
  ########################################
  # NN - standard
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: s
      TransposeA: true
      TransposeB: false
      UseBeta: True
      Batched: True
      UseBias: 1
      Batched: True
      Activation: True
      ActivationType: hipblaslt_all
    - # BenchmarkProblemSizeGroup - Standard - All problem
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 4, 1,  1,   1, 1,  4,1 ]
          - [16, 16, 4, 1,  1,   2, 1,  2,2 ]
          - [16, 16, 4, 1,  1,   1, 1,  1,4 ]
          - [32, 32, 2, 1,  1,   1, 1,  4,1 ]
          - [32, 32, 2, 1,  1,   2, 1,  2,2 ]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ClusterLocalRead: [1]
        - DepthU: [16,32]
        - LocalReadVectorWidth: [4]
        - ScheduleIterAlg: [3]
        - ExpandPointerSwap: [false]
        - TransposeLDS: [0,1]
        - LdsBlockSizePerPadA: [-1]
        - LdsBlockSizePerPadB: [-1]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - 1LDSBuffer: [-1]
        - GlobalSplitU: [1,2]
        - GlobalSplitUAlgorithm: ["MultipleBuffer", "MultipleBufferSingleKernel"]
        - SourceSwap: [false, true]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [255, 255, 1, 255]
          - Exact: [256, 256, 1, 256]
          - Exact: [257, 257, 1, 257]
        - BiasTypeArgs: ['s']
        - ActivationArgs:
          - [Enum: relu]
