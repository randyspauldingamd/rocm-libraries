# MXFP8 SubtileImpl tail-loop smoke.
#
#
# Exercises K values that are not a multiple of DepthU on the smallest
# MXFP8 macro tile (MT128x128, DU=256, PGR=1) so any tail-loop drift
# shows up fast across the {full-tail, main+tail, main-only} buckets.
# K = 128, 288, 512, 544, 768. Tail granularity = 32 (MX block size).#
# v3 base verification (2026-06-03, gfx950, host build_tmp tensilelite-client):
#   branch:  users/bnemanich/mxfp8-on-tl-multiple-du-2-v3
#   base:    origin/users/maemmett/tl-multiple-du-2 = 771c7db7313
#            "Fix subtile_mxfp8 regressions from mis-gated VGPR free-list allocation"
#            (PR 7781 with PR 7656 absorbed upstream; the previously-documented
#             MT256x256 PLR=0 multi-DU vgprs=289 codegen-overflow is RESOLVED
#             on this base.)
#   result:
#     subtile_mxfp8_tail_loop_smoke.yaml — 5/5 PASS (K=128/288/512/544/768; smoke 5-cell tail-loop coverage).
########################################

TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201, skip-gfx1250]

GlobalParameters:
  SyncsPerBenchmark: 0
  NumElementsToValidate: -1
  MinimumRequiredVersion: 5.0.0
  PrintLevel: 3
  Device: 0
  CMakeBuildType: Release
  KernelTime: True
  MaxWorkspaceSize: 13421772800
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeC: 0
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  DataInitTypeMXSA: 3
  DataInitTypeMXSB: 3
  MXScaleFormat: 1
  BoundsCheck: 0
  KeepBuildTmp: True
  CpuThreads: 1
  RotatingBufferSize: 0
  PrintSolutionRejectionReason: True

BenchmarkProblems:
  ########################################
  # MXFP8 TN — MT128x128, DU=256, PGR=1 tail-loop smoke.
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: F8
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      MXBlockA: 32
      MXBlockB: 32
      TransposeA: true
      TransposeB: false
      UseBeta: True
      Batched: True
      ActivationFuncCall: True

    - InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 128, 1,  1, 4, 4,  2, 2]   # MT 128x128, MIWT=[4,4], MIWG=[2,2]
        - PrefetchGlobalRead: [1]
        - PrefetchLocalRead:  [1]
        - DepthU: [256]
        - ScheduleIterAlg: [3]
        - DirectToLds: [1]
        - StreamK: [3]
        - StaggerU: [0]
        - UseSubtileImpl: [true]
        - WorkGroupMapping: [1]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          # K-bucket coverage (32-element MX block tail granularity).
          - Exact: [128, 128, 1, 128]   # K=128: full tail, no main (K < DU)
          - Exact: [128, 128, 1, 288]   # K=288: 1*DU + 32 tail
          - Exact: [128, 128, 1, 512]   # K=512: 2*DU, no tail (control)
          - Exact: [128, 128, 1, 544]   # K=544: 2*DU + 32 tail
          - Exact: [128, 128, 1, 768]   # K=768: 3*DU, no tail (control)

LibraryLogic:
    ScheduleName: "gfx950"
    DeviceNames: ["Device 75a0"]
    ArchitectureName: "gfx950"
    LibraryType: "Prediction"

LibraryClient:
