########################################
# MXFP8 multi-DU + multi-partition force_drain coverage.
#
# Exercises the force_drain vmcnt(0) path in LogicalScheduler.remove_cross_deps
# for asymmetric macro tiles that produce numPartitions > 1 under multi-DU.
# Look for "[Subtile] force_drain:" messages in the build output to confirm
# the path is hit.
#
# MTs chosen to cover different partition counts and MIWT asymmetries:
#   320x256 MIWT=[10,8] — 5 partitions (M partitioned)
#   192x256 MIWT=[ 6,8] — 4 partitions (N partitioned)
#   256x192 MIWT=[ 8,6] — 4 partitions (M partitioned)
#   256x320 MIWT=[ 8,10] — 5 partitions (N partitioned)
########################################

TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201, skip-gfx1250]

GlobalParameters:
  SyncsPerBenchmark: 0
  NumElementsToValidate: -1
  MinimumRequiredVersion: 5.0.0
  PrintLevel: 3
  Device: 0
  CMakeBuildType: Release
  KernelTime: True
  MaxWorkspaceSize: 13421772800
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeC: 0
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  DataInitTypeMXSA: 3
  DataInitTypeMXSB: 3
  MXScaleFormat: 1
  BoundsCheck: 0
  KeepBuildTmp: True
  CpuThreads: 1
  RotatingBufferSize: 0
  PrintSolutionRejectionReason: True

BenchmarkProblems:
  ########################################
  # FP8 TN — PGR=1, multi-DU, asymmetric MTs (multi-partition)
  # All MTs are asymmetric → scheduler picks numPartitions > 1.
  # Combined with multi-DU (DepthU=256, dataDU=128) this exercises
  # the force_drain vmcnt(0) path.
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: F8
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      MXBlockA: 32
      MXBlockB: 32
      TransposeA: true
      TransposeB: false
      UseBeta: True
      Batched: True
      ActivationFuncCall: True

    - InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 128, 1,  1, 10, 8,  2, 2]  # MT 320x256, MIWT=[10,8]
          - [16, 16, 128, 1,  1,  6, 8,  2, 2]  # MT 192x256, MIWT=[ 6,8]
          - [16, 16, 128, 1,  1,  8, 6,  2, 2]  # MT 256x192, MIWT=[ 8,6]
          - [16, 16, 128, 1,  1,  8,10,  2, 2]  # MT 256x320, MIWT=[ 8,10]
        - PrefetchGlobalRead: [1]
        - PrefetchLocalRead: [1]
        - DepthU: [256]
        - ScheduleIterAlg: [3]
        - DirectToLds: [1]
        - StreamK: [3]
        - StaggerU: [0]
        - UseSubtileImpl: [true]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [960, 960, 1, 256]     # K = 1*DU, single iter
          - Exact: [960, 960, 1, 512]     # K = 2*DU
          - Exact: [960, 960, 1, 1024]    # K = 4*DU, exercises mainloop

LibraryLogic:
    ScheduleName: "gfx950"
    DeviceNames: ["Device 75a0"]
    ArchitectureName: "gfx950"
    LibraryType: "Prediction"

LibraryClient:
