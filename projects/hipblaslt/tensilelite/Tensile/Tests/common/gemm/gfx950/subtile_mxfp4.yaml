  ########################################
  # F4BS TN — TAIL loop sweep (bias + ScaleAlphaVec + hipblaslt_all)
  #
  # Sweeps K = 32..512 (step 32, the FP4 K-granularity) at M=N=256 with
  # MT 128x128, exercising tail-loop remainders for DU=256 and DU=512.
  # PGR=0/1/2, StreamK=3, WGM=16/XCC=4 to match the production scheduler path.
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: F4
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      MXBlockA: 32
      MXBlockB: 32
      TransposeA: 1
