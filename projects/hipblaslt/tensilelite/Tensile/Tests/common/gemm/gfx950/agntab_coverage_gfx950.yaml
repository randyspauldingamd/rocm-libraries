TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201, skip-gfx1250] # not supported by arch

GlobalParameters:
  NumElementsToValidate: -1
  NumWarmups: 1
  MaxEnqueuesPerSync: 1
  SleepPercent: 0
  PrintSolutionRejectionReason: True
  DataInitTypeA: 23
  DataInitTypeB: 24
  DataInitTypeBeta: 0
  DataInitTypeAlpha: 1
  CSVExportWinner: 1
  CSVMergeSameProblemID: 1
  Device: 0
  MaxWorkspaceSize: 134217728
  KernelTime: True
  RotatingBufferSize: 512

.AdaptiveBase: &adaptive_base
  CustomKernels:
  InitialSolutionParameters:
  BenchmarkCommonParameters:
    - KernelLanguage: ["Assembly"]
  ForkParameters:
    - MatrixInstruction:
      - [16, 16, 32, 1, 1, 6, 4, 2, 2] # MT192x128, 4 waves; MFMA bf16 16x16x32, gfx950 CMS specific
      - [32, 32, 16, 1, 1, 1, 5, 4, 1] # MT128x160, 4 waves; MFMA bf16 32x32x16, AGNTAB+SK coverage
    - DepthU: [64]
    - 1LDSBuffer: [-1]
    - ExpandPointerSwap: [0]
    - StaggerU: [16]
    - TransposeLDS: [0]
    - WorkGroupMapping: [1]
    - WorkGroupMappingXCC: [8]
    - DirectToLds: [1]
    - DtlPlusLdsBuf: [0]
    - GlobalReadVectorWidthA: [8]
    - GlobalReadVectorWidthB: [8]
    - LocalReadVectorWidth: [8]
    # ============ feature axes under test ============
    - PrefetchGlobalRead: [2]
    - AdaptiveGemm: [0, 1]
    - AdaptiveGemmGSUA: [0, 1]
    - AdaptiveGemmNTAB: [0, 1]
    - OptNoLoadLoop: [0, 1]
    - TailloopInNll: [False, True]
    - UseCustomMainLoopSchedule: [0, 1]
    # - UseSubtileImpl: [0, 1]
    - Groups:
      - - GlobalSplitU: 0
          StreamK:      3
        - GlobalSplitU: -1
          StreamK:      0
      - - UseCustomMainLoopSchedule: 0
          TailloopInNll: True
        - UseCustomMainLoopSchedule: 1
          TailloopInNll: False
  BenchmarkJoinParameters:
  BenchmarkFinalParameters:
    - ProblemSizes:
      - Exact: [128,    128, 1, 128]  # baseline       -> NTA0_NTB0  (loopIters=2; 'enough' is False)
      - Exact: [65536,  128, 1, 192]  # NTA4 fires     -> NTA4_NTB0  (skinnyA, longA, K/DU=3 > 2)
      - Exact: [128,  16384, 1, 256]  # NTB4 fires     -> NTA0_NTB4  (skinnyB, longB, K/DU=4 > 2)
      - Exact: [ 464,  1872, 1, 6736] # AGNTAB+SK=3 store-path state selection regression
      - Exact: [1024,  1024, 1, 1024] # AGNTAB+SK=3 workspace/partial-store regression

.AdaptiveBaseDtl: &adaptive_base_dtl
  CustomKernels:
  InitialSolutionParameters:
  BenchmarkCommonParameters:
    - KernelLanguage: ["Assembly"]
  ForkParameters:
    - MatrixInstruction:
      - [16, 16, 32, 1, 1, 4, 4, 2, 2] # MT128x128, 4 waves; MFMA bf16 16x16x32
      - [32, 32, 16, 1, 1, 1, 5, 4, 1] # MT128x160, 4 waves; MFMA bf16 32x32x16, AGNTAB+SK coverage
    - DepthU: [64]
    - 1LDSBuffer: [-1]
    - ExpandPointerSwap: [0]
    - StaggerU: [16]
    - WorkGroupMapping: [1]
    - WorkGroupMappingXCC: [8]
    # ---- TransposeLDS=-1 lets Solution.py auto-pick:
    #        TLDS=0 for NT (TLUA=T AND TLUB=T)
    #        TLDS=1 for NN / TN / TT
    - TransposeLDS: [-1]
    # ---- DTL forced ON (=1: both A and B) to satisfy PGR>=3 gate ----
    - DirectToLds: [1]
    # ============ feature axes under test ============
    - PrefetchGlobalRead: [3, 4]
    - AdaptiveGemm: [0, 1]
    - AdaptiveGemmGSUA: [0, 1]
    - AdaptiveGemmNTAB: [0, 1]
    - OptNoLoadLoop: [0, 1]
    - TailloopInNll: [False, True]
    # - UseSubtileImpl: [0, 1]
    - Groups: # GSU and StreamK
      - - GlobalSplitU: 0
          StreamK:      3
        - GlobalSplitU: -1
          StreamK:      0
  BenchmarkJoinParameters:
  BenchmarkFinalParameters:
    - ProblemSizes:
      - Exact: [128,    128, 1, 128]  # baseline       -> NTA0_NTB0  (loopIters=2; 'enough' is False)
      - Exact: [32768,  128, 1, 192]  # NTA4 fires     -> NTA4_NTB0  (skinnyA, longA, K/DU=3 > 2)
      - Exact: [128,  16384, 1, 256]  # NTB4 fires     -> NTA0_NTB4  (skinnyB, longB, K/DU=4 > 2)
      - Exact: [ 464,  1872, 1, 6736] # AGNTAB+SK=3 store-path state selection regression
      - Exact: [1024,  1024, 1, 1024] # AGNTAB+SK=3 workspace/partial-store regression

.SuppressNllBase: &suppress_nll_base
  CustomKernels:
  InitialSolutionParameters:
  BenchmarkCommonParameters:
    - KernelLanguage: ["Assembly"]
  ForkParameters:
    - MatrixInstruction:
      - [16, 16, 32, 1, 1, 6, 4, 2, 2] # MT192x128, 4 waves; MFMA bf16 16x16x32
      - [32, 32, 16, 1, 1, 1, 5, 4, 1] # MT128x160, 4 waves; MFMA bf16 32x32x16
    - DepthU: [64]
    - 1LDSBuffer: [-1]
    - ExpandPointerSwap: [0]
    - StaggerU: [16]
    - TransposeLDS: [0]
    - WorkGroupMapping: [1]
    - WorkGroupMappingXCC: [8]
    - DirectToLds: [0]            # DTL requires PGR>=2, incompatible with PGR=1
    - GlobalReadVectorWidthA: [8]
    - GlobalReadVectorWidthB: [8]
    - LocalReadVectorWidth: [8]
    # ============ feature axes under test ============
    - PrefetchGlobalRead: [1]     # required for SuppressNoLoadLoop
    - AdaptiveGemm: [0, 1]
    - AdaptiveGemmGSUA: [0, 1]
    - AdaptiveGemmNTAB: [0, 1]
    - OptNoLoadLoop: [0, 1]
    - SuppressNoLoadLoop: [False, True]
    - TailloopInNll: [False]      # True forces SuppressNoLoadLoop=False
    # - UseSubtileImpl: [0, 1]
    - Groups:
      - - GlobalSplitU: -1
          StreamK:      0
  BenchmarkJoinParameters:
  BenchmarkFinalParameters:
    - ProblemSizes:
      - Exact: [128,    128, 1, 128]  # baseline       -> NTA0_NTB0  (loopIters=2; 'enough' is False)
      - Exact: [65536,  128, 1, 192]  # NTA4 fires     -> NTA4_NTB0  (skinnyA, longA, K/DU=3 > 2)
      - Exact: [128,  16384, 1, 256]  # NTB4 fires     -> NTA0_NTB4  (skinnyB, longB, K/DU=4 > 2)

BenchmarkProblems:
  # =================================================================
  # Adaptive coverage -- PGR=2 path: 4 transpose x 3 sizes
  # =================================================================
  - # NN adaptive (PGR=2)
    - OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: False
      TransposeB: False
      UseBeta: True
      Batched: True
    - <<: *adaptive_base

  - # TN adaptive (PGR=2)
    - OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: True
      TransposeB: False
      UseBeta: True
      Batched: True
    - <<: *adaptive_base

  - # NT adaptive (PGR=2)
    - OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: False
      TransposeB: True
      UseBeta: True
      Batched: True
    - <<: *adaptive_base

  - # TT adaptive (PGR=2)
    - OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: True
      TransposeB: True
      UseBeta: True
      Batched: True
    - <<: *adaptive_base

  # =================================================================
  # Adaptive coverage -- PGR=[3, 4] + DTL: 4 transpose x 3 sizes
  # =================================================================
  - # NN adaptive (PGR=3, 4 + DTL)
    - OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: False
      TransposeB: False
      UseBeta: True
      Batched: True
    - <<: *adaptive_base_dtl

  - # TN adaptive (PGR=3, 4 + DTL)
    - OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: True
      TransposeB: False
      UseBeta: True
      Batched: True
    - <<: *adaptive_base_dtl

  - # NT adaptive (PGR=3, 4 + DTL)
    - OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: False
      TransposeB: True
      UseBeta: True
      Batched: True
    - <<: *adaptive_base_dtl

  - # TT adaptive (PGR=3, 4 + DTL)
    - OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: True
      TransposeB: True
      UseBeta: True
      Batched: True
    - <<: *adaptive_base_dtl

  # =================================================================
  # SuppressNoLoadLoop coverage -- PGR=1, no DTL: 4 transpose
  # =================================================================
  - # NN suppress-NLL (PGR=1)
    - OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: False
      TransposeB: False
      UseBeta: True
      Batched: True
    - <<: *suppress_nll_base

  - # TN suppress-NLL (PGR=1)
    - OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: True
      TransposeB: False
      UseBeta: True
      Batched: True
    - <<: *suppress_nll_base

  - # NT suppress-NLL (PGR=1)
    - OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: False
      TransposeB: True
      UseBeta: True
      Batched: True
    - <<: *suppress_nll_base

  - # TT suppress-NLL (PGR=1)
    - OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: True
      TransposeB: True
      UseBeta: True
      Batched: True
    - <<: *suppress_nll_base
