      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 128, 1,  1, 8, 10,  2, 2]   # MT256x320, MIWT=[8,10], MIWG=[2,2]
        - PrefetchGlobalRead: [1]
        - PrefetchLocalRead:  [0]
        - DepthU: [256]
        - ScheduleIterAlg: [3]
        - DirectToLds: [1]
        - StreamK: [3]
        - StaggerU: [0]
        - UseSubtileImpl: [true]
        - WorkGroupMapping: [1]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          # ===== Failing sizes (PR 7767 norm_err annotations) =====
          - Exact: [    9728,   9600, 1, 13824]   # bench norm_error = 0.0914 (square, K=54*DU)
          - Exact: [   14336,  10880, 1,  9472]   # bench norm_error = 0.100  (rectangular, K=37*DU)
          - Exact: [  173312,   3200, 1,  2560]   # bench norm_error = 0.0768 (skinny, K=10*DU)
          # ===== Control sizes (PR 7767 PASS smokes) =====
          - Exact: [    2048,   4480, 1,   768]   # validator PASS smoke (K=3*DU)
          - Exact: [    7680,   5760, 1,   256]   # validator PASS smoke (K=1*DU)

