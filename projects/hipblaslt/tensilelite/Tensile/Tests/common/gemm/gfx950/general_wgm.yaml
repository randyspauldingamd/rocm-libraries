TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201, skip-gfx1250] # not supported by arch

GlobalParameters:
  SyncsPerBenchmark: 0
  SleepPercent: 50
  NumElementsToValidate: -1
  NumWarmups: 1
  EnqueuesPerSync: 1
  DataInitTypeA: 12 #12
  DataInitTypeB: 13 #13
  DataInitTypeBeta: 0
  DataInitTypeAlpha: 1
  NewClient: 2
  CSVExportWinner: 1
  CSVMergeSameProblemID: 1
  Device: 0
  PrintSolutionRejectionReason: True
  DeviceLDS: 163840
  MaxLDS: 163840
  RotatingBufferSize: 512
  KeepBuildTmp: True
  #GenerateSourcesAndExit: True
  ForceGenerateKernel: 1

BenchmarkProblems:
  ########################################
  # TN - standard
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      Batched: True

      UseBias: 1
      BiasDataTypeList: [s,b]
      UseScaleAlphaVec: 1
      Activation: true
      ActivationType: hipblaslt_all
      ActivationFuncCall: true
      #ActivationHPA: True
    - # BenchmarkProblemSizeGroup - Standard - All problem
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
           - [16, 16,32, 1,  1, 1, 1,  1,1 ]
        - PrefetchGlobalRead: [2] #[2]   ## PGR=2 is not supported with DTL
        - PrefetchLocalRead: [1]
        - DepthU: [64]
        - ScheduleIterAlg: [3]
        - ExpandPointerSwap: [0]
        - TransposeLDS: [1] #0,1
        - LocalReadVectorWidth: [8]
        - GlobalReadVectorWidthA: [8]
        - GlobalReadVectorWidthB: [8]
        - StreamK: [1,2,3]
        - LdsPadA: [-1] #[-1]
        - LdsPadB: [-1] #[-1]
        - StaggerU: [0]
        - StaggerUStride: [512]
        - StorePriorityOpt: [1]
        - StoreSyncOpt: [4]
        - WorkGroupMapping: [16]
        - WorkGroupMappingXCC: [2]
        #- StreamKXCCMapping: [8]
        - 1LDSBuffer: [0]
        - NonTemporalD: [4]
        - SourceSwap: [1]
        - UseSgprForGRO: [0]
        - UseCustomMainLoopSchedule: [0]
        - SpaceFillingAlgo: [[],[0,1,2],[2,2,2], [0],[1,0],[2,3]]
        - SFCWGM: [[[5,5],[2,2]], [[8,1],[4,3]]]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Range: [[16,48,256],[16,32,512],[1],[32]]
        - BiasTypeArgs: ['b']
