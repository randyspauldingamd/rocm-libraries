########################################
# MXFP8 correctness regression — MT256x192x128 / PLR1 / WGM1, multi-DU.
#
# Ported from PR 7767 to PR 7781's auto-detected multi-DU path:
# DepthU=256 + MXScaleFormat=HostPreSwizzle → dataDU=128.  PGR=2 → PGR=1
# because PR 7781 rejects PGR>1 once multi-DU triggers.
#
# Source cluster (PR 7767 / MXFP8_BUG_HANDOFF_kernels.csv row 4):
#     MT256x192x128 / MIWT=[8,6] / MIWG=[2,2] / PGR2 / PLR1 / WGM1
#                  → 6/6 bench fail (100.0%)
#                  → max norm_error = 0.107
#
# Iteration-cost shrink: drop the 3 deep-K fails (K=48384 / 595968 /
# 651008), keep the 3 small-K fails plus 2 small-K controls.
#
# Pinned ForkParameter values:
#   MatrixInstruction:    [16, 16, 128, 1, 1, 8, 6, 2, 2]
#                                  → MT256x192, MIWT=[8,6], MIWG=[2,2]
#   PrefetchGlobalRead:   [1]      → PGR1 (multi-DU constraint)
#   PrefetchLocalRead:    [1]      → PLR1
#   DepthU:               [256]    → dataDU=128 auto-derived
#   ScheduleIterAlg:      [3]
#   DirectToLds:          [1]
#   StreamK:              [3]
#   StaggerU:             [0]
#   UseSubtileImpl:       [1]
#   WorkGroupMapping:     [1]      → WGM1
#
# PR 7781 verification status:
#   * Pre-fix (commit 0a9b6367693, gfx950): 5/5 PASS.
#     The PR 7767 drift signature does not transfer for symmetric MIWT
#     under PLR=1.
#   * Post LR-vs-GR drain fix (commit ce19b77af42): 5/5 PASS.
#     The drain fix is a no-op for this kernel (numPartitions=1, MIWT
#     in {6, 8} doesn't trigger the bug) -- pre/post asm bytes are
#     bit-identical (verified via diff).  An earlier worker observed
#     occasional flaky FAIL on (4736,4480,1,7680) of ~10-20 wrong
#     values out of 21M (~1e-6 wrong rate) and attributed it to init-
#     seed noise; the re-run on the new combined branch deterministically
#     passes all 5 sizes.
#
# v3 base verification (2026-06-03, gfx950, host build_tmp tensilelite-client):
#   branch:  users/bnemanich/mxfp8-on-tl-multiple-du-2-v3
#   base:    origin/users/maemmett/tl-multiple-du-2 = 771c7db7313
#            "Fix subtile_mxfp8 regressions from mis-gated VGPR free-list allocation"
#            (PR 7781 with PR 7656 absorbed upstream; the previously-documented
#             MT256x256 PLR=0 multi-DU vgprs=289 codegen-overflow is RESOLVED
#             on this base.)
#   result:
#     subtile_mxfp8_correctness_regression_mt256x192_plr1_wgm1.yaml — 5/5 PASS.
#
########################################

TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201, skip-gfx1250]

GlobalParameters:
  SyncsPerBenchmark: 0
  NumElementsToValidate: -1
  MinimumRequiredVersion: 5.0.0
  PrintLevel: 3
  Device: 0
  CMakeBuildType: Release
  KernelTime: True
  MaxWorkspaceSize: 13421772800
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeC: 0
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  DataInitTypeMXSA: 3
  DataInitTypeMXSB: 3
  MXScaleFormat: 1
  BoundsCheck: 0
  KeepBuildTmp: True
  CpuThreads: 1
  RotatingBufferSize: 0
  PrintSolutionRejectionReason: True

BenchmarkProblems:
  -
    - # ProblemType
      OperationType: GEMM
      DataType: F8
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      MXBlockA: 32
      MXBlockB: 32
      TransposeA: true
      TransposeB: false
      UseBeta: True
      Batched: True
      ActivationFuncCall: True

    - InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 128, 1,  1, 8, 6,  2, 2]    # MT256x192, MIWT=[8,6], MIWG=[2,2]
        - PrefetchGlobalRead: [1]
        - PrefetchLocalRead:  [1]
        - DepthU: [256]
        - ScheduleIterAlg: [3]
        - DirectToLds: [1]
        - StreamK: [3]
        - StaggerU: [0]
        - UseSubtileImpl: [true]
        - WorkGroupMapping: [1]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          # ===== Failing sizes (PR 7767 norm_err annotations) =====
          - Exact: [    7808,   3072, 1,  3328]   # bench norm_error = 0.107  (largest, K=13*DU)
          - Exact: [    4736,   4480, 1,  7680]   # bench norm_error = 0.0843 (K=30*DU)
          - Exact: [    4864,   4864, 1,  7680]   # bench norm_error = 0.0835 (square, K=30*DU)
          # ===== Control sizes (synthetic small-K smokes) =====
          - Exact: [    2048,   2048, 1,   256]   # smoke (K=1*DU)
          - Exact: [    4096,   3072, 1,   768]   # smoke (K=3*DU)

LibraryLogic:
    ScheduleName: "gfx950"
    DeviceNames: ["Device 75a0"]
    ArchitectureName: "gfx950"
    LibraryType: "Prediction"

