TestParameters:
  # need to skip for gfx950: TODO: re-enable this with subtile + MXScaleFormat=1
  marks: [skip-gfx950, skip-gfx1250, skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201]

GlobalParameters:
  NumElementsToValidate: -1
  MinimumRequiredVersion: 5.0.0
  PrintLevel: 1
  # PrintSolutionRejectionReason: True
  Device: 0
  CMakeBuildType: Debug
#  MergeFiles: False
  KernelTime: True
  MaxWorkspaceSize: 13421772800
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeC: 0
  DataInitTypeMXSA: 3
  DataInitTypeMXSB: 3
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  NumElementsToValidate: -1
  BoundsCheck: 0
  KeepBuildTmp: True
  MaxFileName: 128
  DeviceLDS: 163840
  MaxLDS: 163840
#  PrintTensorA: True
#  PrintTensorB: True
#  PrintTensorC: True
#  PrintTensorD: True
#  PrintTensorRef: True
  MXScaleFormat: 1

BenchmarkProblems:
  ########################################
  # FP8HS with ScaleABCD
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: F8
      DestDataType: S
      ComputeDataType: S
      HighPrecisionAccumulate: True
      MXBlockA: 32
      MXBlockB: 32
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      Batched: True
      Activation: True
      ActivationType: hipblaslt_all
#      UseScaleAB: "Scalar"
#      UseScaleCD: True
      UseScaleAlphaVec: 1
      UseBias: 1
      BiasDataTypeList: [s]

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 128, 1, 1, 1,1, 1,1]  # 64x64
          - [16, 16, 128, 1, 1, 4,2, 2,2]  # 64x64
          - [16, 16, 128, 1, 1, 2,4, 2,2]  # 64x64
#          - [16, 16, 128, 1, 1, 8,8, 2,2]  # 64x64
          - [32, 32,  64, 1, 1, 1,1, 1,1]  # 64x64
          - [32, 32,  64, 1, 1, 2,2, 2,2]  # 64x64
          - [32, 32,  64, 1, 1, 4,2, 2,2]  # 64x64
#          - [32, 32,  64, 1, 1, 2,4, 2,2]  # 64x64
        #- ForceDisableShadowInit: [True, False]
        - UseSgprForGRO: [0,1]
        - DepthU: [64, 128, 256]
        - AssertFree0ElementMultiple: [1]
        - AssertFree1ElementMultiple: [1]
        - AssertSummationElementMultiple: [64]
        - LocalReadVectorWidth: [16]
        - PrefetchGlobalRead: [0,1,2]
        - PrefetchLocalRead: [0,1]
        #- PreloadKernArgs: [0,1]
        - ClusterLocalRead: [0,1]
        - VectorWidthA: [1]
        - VectorWidthB: [1]
        - GlobalReadVectorWidthA: [16]
        - GlobalReadVectorWidthB: [16]
        - ScheduleIterAlg: [1,2,3]
        - InnerUnroll: [1]
        - ExpandPointerSwap: [0,1]
#        - LdsBlockSizePerPadA: [0]
#        - LdsBlockSizePerPadB: [0]
        - TransposeLDS: [1]
#        - LdsPadA: [0]
#        - LdsPadB: [0]
        - WaveSeparateGlobalReadA: [0]
        - WaveSeparateGlobalReadB: [0]
        - 1LDSBuffer: [0]
        - GlobalSplitU: [1,2]
#        - GlobalSplitUAlgorithm: ["MultipleBuffer", "MultipleBufferSingleKernel"]
        - GlobalReadPerMfma: [1]
        - LocalWritePerMfma: [-1]
        - StoreVectorWidth: [-1]
        - SourceSwap: [1]
        - StreamK: [0,3]
        - UseSubtileImpl: [1] # TODO: enable subtile
#        - NumElementsPerBatchStore: [0]
#        - StorePriorityOpt: [0]
#        - StaggerU: [0]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          # - Exact: [16, 16, 1, 128]
          - Exact: [32, 16, 1, 1024]
          - Exact: [256, 256, 1, 32]
          - Exact: [256, 256, 1, 64]
          - Exact: [256, 256, 1, 96]
          - Exact: [256, 256, 1, 160]
          - Exact: [256, 256, 1, 192]
          - Exact: [256, 256, 1, 224]
          - Exact: [1025, 513, 1, 2048]
#          - Exact: [1026, 514, 1, 2048]
#          - Exact: [1027, 515, 1, 2048]
#          - Exact: [1028, 516, 1, 2048]
#          - Exact: [1029, 517, 1, 2048]
