TestParameters:
  # Restrict to gfx950 for now (feature was developed/validated there).
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201, skip-gfx1250]

GlobalParameters:
  MinimumRequiredVersion: 5.0.0
  SleepPercent: 50
  NumElementsToValidate: 128
  PrintSolutionRejectionReason: True
  DataInitTypeBeta: 0
  DataInitTypeAlpha: 1
  CSVExportWinner: 1
  CSVMergeSameProblemID: 1
  Device: 0

BenchmarkProblems:
  ########################################
  # NOTE:
  # KRingShift is restricted to TN in Solution.py (host-side rejection for NN/NT/TT).
  # Keep this test file TN-only.
  ########################################

  ########################################
  # BF16 TN - KRingShift coverage
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      Batched: True
      UseBias: 0
      Activation: False
      UseScaleAlphaVec: 0
    - # BenchmarkProblemSizeGroup - single focused config
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - KRingShift: [True]
        # KRingShift requires BAddrInterleave (BInterleaveG).
        - BAddrInterleave: [True]
        - MatrixInstruction:
          - [16, 16, 32, 1, 1, 8, 3, 1, 4]
        - DepthU: [128]
        - StreamK: [3]
        - ScheduleGlobalRead: [1]
        - ScheduleLocalWrite: [1]
        - GlobalSplitU: [0]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - BufferLoad: [True]
        - BufferStore: [True]
        - DirectToLds: [0]
        - GlobalReadVectorWidthA: [8]
        - GlobalReadVectorWidthB: [8]
        - LocalReadVectorWidth: [8]
        - VectorWidthA: [8]
        - VectorWidthB: [1]
        - ClusterLocalRead: [0]
        - SourceSwap: [0, 1]
        - WorkGroup:
          - [16, 16, 1]
        - WavefrontSize: [64]
        - ScheduleIterAlg: [3]
        - TransposeLDS: [2]
        - 1LDSBuffer: [1]
        - StoreVectorWidth: [8]
        - StoreSyncOpt: [0]
        - StaggerU: [16]
        - StaggerUStride: [256]
        - StaggerUMapping: [0]
        - UseSgprForGRO: [0]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Range: [[2048], [3072], [1], [1880, 32, 2176]]
          - Range: [[128], [192], [1], [128, 32, 512]]

  ########################################
  # FP16 TN - KRingShift coverage
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: h
      DestDataType: h
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      Batched: True
      UseBias: 0
      Activation: False
      UseScaleAlphaVec: 0
    - # BenchmarkProblemSizeGroup - single focused config
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - KRingShift: [True]
        - BAddrInterleave: [True]
        - MatrixInstruction:
          - [16, 16, 32, 1, 1, 8, 3, 1, 4]
        - DepthU: [128]
        - StreamK: [3]
        - ScheduleGlobalRead: [1]
        - ScheduleLocalWrite: [1]
        - GlobalSplitU: [0]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - BufferLoad: [True]
        - BufferStore: [True]
        - DirectToLds: [0]
        - GlobalReadVectorWidthA: [8]
        - GlobalReadVectorWidthB: [8]
        - LocalReadVectorWidth: [8]
        - VectorWidthA: [8]
        - VectorWidthB: [1]
        - ClusterLocalRead: [0]
        - SourceSwap: [0, 1]
        - WorkGroup:
          - [16, 16, 1]
        - WavefrontSize: [64]
        - ScheduleIterAlg: [3]
        - TransposeLDS: [2]
        - 1LDSBuffer: [1]
        - StoreVectorWidth: [8]
        - StoreSyncOpt: [0]
        - StaggerU: [16]
        - StaggerUStride: [256]
        - StaggerUMapping: [0]
        - UseSgprForGRO: [0]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Range: [[2048], [3072], [1], [1880, 32, 2176]]
          - Range: [[128], [192], [1], [128, 32, 512]]

  ########################################
  # FP8 (F8->F16) TN - KRingShift coverage
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: f8
      DestDataType: h
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      Batched: True
      UseBias: 0
      Activation: False
      UseScaleAlphaVec: 0
    - # BenchmarkProblemSizeGroup - single focused config
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - KRingShift: [True]
        - BAddrInterleave: [True]
        - MatrixInstruction:
          - [16, 16, 128, 1, 1, 4, 4, 2, 2]
        - DepthU: [128]
        - StreamK: [3]
        - ScheduleIterAlg: [3]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - BufferLoad: [True]
        - BufferStore: [True]
        - DirectToLds: [0]
        - GlobalReadVectorWidthA: [16]
        - GlobalReadVectorWidthB: [16]
        - LocalReadVectorWidth: [8]
        - WorkGroup:
          - [16, 16, 1]
        - WavefrontSize: [64]
        - TransposeLDS: [2]
        - 1LDSBuffer: [1]
        - SourceSwap: [1]
        - StaggerU: [16]
        - StaggerUStride: [256]
        - StaggerUMapping: [0]
        - UseSgprForGRO: [0]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Range: [[2048], [3072], [1], [1880, 32, 2176]]
          - Range: [[128], [192], [1], [128, 32, 512]]

