########################################
# MXFP8 correctness regression — MT192x256x128 / PLR1 / WGM4, multi-DU.
#
# Ported from PR 7767 to PR 7781's auto-detected multi-DU path:
# DepthU=256 + MXScaleFormat=HostPreSwizzle → dataDU=128.  PGR=2 → PGR=1
# because PR 7781 rejects PGR>1 once multi-DU triggers.
#
# Companion to `subtile_mxfp8_correctness_regression_mt320x256_plr1_wgm4.yaml`
# at smaller MT (192x256 vs 320x256), useful for isolating whether bugs
# are MT-size-dependent vs scheduler-bucket-dependent on PLR1/WGM4.
#
# Source cluster (PR 7767 / MXFP8_BUG_HANDOFF_kernels.csv row 6):
#     MT192x256x128 / MIWT=[6,8] / MIWG=[2,2] / PLR1 / WGM4
#                  → 5/5 bench fail (100.0%); max norm_error = 0.0585
# MIWT_M=6 is non-power-of-two, exercising the LR free-list cycle
# convergence path (LogicalScheduler MAX_UNROLL=32 case).
#
# Pinned ForkParameter values:
#   MatrixInstruction:    [16, 16, 128, 1, 1, 6, 8, 2, 2]
#                                  → MT192x256, MIWT=[6,8], MIWG=[2,2]
#   PrefetchGlobalRead:   [1]      → PGR1 (multi-DU constraint)
#   PrefetchLocalRead:    [1]      → PLR1
#   DepthU:               [256]    → dataDU=128 auto-derived
#   ScheduleIterAlg:      [3]
#   DirectToLds:          [1]
#   StreamK:              [3]
#   StaggerU:             [0]
#   UseSubtileImpl:       [1]
#   WorkGroupMapping:     [4]      → WGM4
#
# PR 7781 verification status:
#   * Pre-fix (commit 0a9b6367693, gfx950): 6/6 PASS.
#     PR 7767's non-power-of-two MIWT_M=6 + WGM4 pin cleared on the
#     auto-detected multi-DU path.
#   * Post LR-vs-GR drain fix (commit ce19b77af42): 6/6 PASS preserved.
#     The drain fix is a no-op for this kernel (numPartitions=1 picks
#     the single-partition candidate before VGPR pressure forces the
#     5-partition split that triggered the bug on MIWT=10 cases).
#
# v3 base verification (2026-06-03, gfx950, host build_tmp tensilelite-client):
#   branch:  users/bnemanich/mxfp8-on-tl-multiple-du-2-v3
#   base:    origin/users/maemmett/tl-multiple-du-2 = 771c7db7313
#            "Fix subtile_mxfp8 regressions from mis-gated VGPR free-list allocation"
#            (PR 7781 with PR 7656 absorbed upstream; the previously-documented
#             MT256x256 PLR=0 multi-DU vgprs=289 codegen-overflow is RESOLVED
#             on this base.)
#   result:
#     subtile_mxfp8_correctness_regression_mt192x256_plr1_wgm4.yaml — 6/6 PASS.
#
########################################

TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201, skip-gfx1250]

GlobalParameters:
  SyncsPerBenchmark: 0
  NumElementsToValidate: -1
  MinimumRequiredVersion: 5.0.0
  PrintLevel: 3
  Device: 0
  CMakeBuildType: Release
  KernelTime: True
  MaxWorkspaceSize: 13421772800
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeC: 0
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  DataInitTypeMXSA: 3
  DataInitTypeMXSB: 3
  MXScaleFormat: 1
  BoundsCheck: 0
  KeepBuildTmp: True
  CpuThreads: 1
  RotatingBufferSize: 0
  PrintSolutionRejectionReason: True

BenchmarkProblems:
  -
    - # ProblemType
      OperationType: GEMM
      DataType: F8
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      MXBlockA: 32
      MXBlockB: 32
      TransposeA: true
      TransposeB: false
      UseBeta: True
      Batched: True
      ActivationFuncCall: True

    - InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 128, 1,  1, 6, 8,  2, 2]    # MT192x256, MIWT=[6,8], MIWG=[2,2]
        - PrefetchGlobalRead: [1]
        - PrefetchLocalRead:  [1]
        - DepthU: [256]
        - ScheduleIterAlg: [3]
        - DirectToLds: [1]
        - StreamK: [3]
        - StaggerU: [0]
        - UseSubtileImpl: [true]
        - WorkGroupMapping: [4]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          # ===== Failing sizes (PR 7767 norm_err annotations) =====
          - Exact: [    4608,   4864, 1,  2560]   # bench norm_error = 0.0585 (largest, K=10*DU)
          - Exact: [    4992,   4608, 1,  7424]   # bench norm_error = 0.0432 (K=29*DU)
          - Exact: [    2944,   3584, 1,   512]   # bench norm_error = 0.0276 (K=2*DU)
          - Exact: [    1920,   5888, 1,  3328]   # bench norm_error = 0.0235 (skinny, K=13*DU)
          # ===== Control sizes (synthetic small-K smokes) =====
          - Exact: [    1920,   2560, 1,   256]   # smoke (K=1*DU)
          - Exact: [    3840,   2560, 1,   768]   # smoke (K=3*DU)

LibraryLogic:
    ScheduleName: "gfx950"
    DeviceNames: ["Device 75a0"]
    ArchitectureName: "gfx950"
    LibraryType: "Prediction"

