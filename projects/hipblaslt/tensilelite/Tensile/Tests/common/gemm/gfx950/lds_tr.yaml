        - TransposeLDS: [1] #0,1
        - LdsBlockSizePerPadA: [-1]
        - LdsBlockSizePerPadB: [-1]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - StaggerU: [0]
        - StaggerUStride: [16]
        - 1LDSBuffer: [1]
        - GlobalSplitU: [1]
