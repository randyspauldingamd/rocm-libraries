        - ExpandPointerSwap: [True, False]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
          #        - ClusterLocalRead: [1]
        - DepthU: [32, 64]
        - LocalReadVectorWidth: [-1]
        - ScheduleIterAlg: [3]
