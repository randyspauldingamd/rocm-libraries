      ForkParameters:
        #        - AssertSummationElementMultiple: [32]
        - MatrixInstruction:
          - [16, 16, 32, 1, 1, 4, 4, 2, 2 ]
          - [16, 16, 32, 1, 1, 2, 8, 4, 1 ]
