TestParameters:
  marks: [skip-gfx942, skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201, skip-gfx1250] # not supported by arch

GlobalParameters:
  SyncsPerBenchmark: 0
  NumElementsToValidate: -1
  MinimumRequiredVersion: 5.0.0
  PrintLevel: 1
  PrintSolutionRejectionReason: True
  Device: 0
  CMakeBuildType: Release
  MergeFiles: False
  KernelTime: True
  MaxWorkspaceSize: 13421772800
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  #DataInitTypeA: 1
  #DataInitTypeB: 1
  BoundsCheck: 2
  KeepBuildTmp: True
  #EnqueuesPerSync: 10
  #NumWarmups: 1
  MaxLDS: 163840
  DeviceLDS: 163840
  #AsmDebug: True

BenchmarkProblems:
  ########################################
  # F32X NT
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataTypeA: S
      DataTypeB: S
      DataType: b
      DestDataType: S
      #F32XdlMathOp: X
      TransposeA: False
      TransposeB: True
      UseBeta: True
      Batched: True
    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 32, 1, 1, 2,2, 2, 2]
          - [16, 16, 32, 1, 1, 1,1, 1, 1]
          - [16, 16, 32, 1, 1, 2,2, 4, 1]
          - [16, 16, 32, 1, 1, 2,2, 1, 4]
          - [16, 16, 32, 1, 1, 8,8, 2, 2]
        - DepthU: [ 32, 64, 128]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [3]
        - SourceSwap: [1]
        - StaggerU: [0]
        - 1LDSBuffer: [0]
        - LocalReadVectorWidth: [8]
        - VectorWidthA: [1, -1]
        - VectorWidthB: [1, -1]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [32, 32, 1, 32]
          - Exact: [128, 128, 1, 128]
          - Exact: [127, 127, 1, 127]
          - Exact: [2048, 2048, 1, 256]

  ########################################
  # F32X TN
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataTypeA: S
      DataTypeB: S
      DataType: b
      TransposeA: True
      TransposeB: False
      UseBeta: True
      Batched: True
      DestDataType: S
    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 32, 1, 1, 2,2, 2, 2]
          - [16, 16, 32, 1, 1, 1,1, 1, 1]
          - [16, 16, 32, 1, 1, 2,2, 4, 1]
          - [16, 16, 32, 1, 1, 2,2, 1, 4]
          - [16, 16, 32, 1, 1, 8,8, 2, 2]
        - DepthU: [ 32, 64, 128]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - VectorWidthA: [1, -1]
        - VectorWidthB: [1, -1]
        - ScheduleIterAlg: [3]
        - SourceSwap: [1]
        - GlobalReadVectorWidthA: [4]
        - LocalReadVectorWidth: [8]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [128, 128, 1, 128]
          - Exact: [64, 16, 1, 31]
          - Exact: [2048, 2048, 1, 256]

  ########################################
  # F32X NN
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataTypeA: S
      DataTypeB: S
      DataType: b
      TransposeA: False
      TransposeB: False
      UseBeta: True
      Batched: True
      DestDataType: S
      UseBias: 1
      UseScaleAlphaVec: 1
      Activation: True
      ActivationType: hipblaslt_all
      BiasDataTypeList: ['s']
    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [32, 32, 16, 1, 1, 2,2, 2, 2]
          - [32, 32, 16, 1, 1, 1,1, 1, 1]
          - [32, 32, 16, 1, 1, 2,2, 4, 1]
          - [32, 32, 16, 1, 1, 2,2, 1, 4]
        - DepthU: [ 64]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        #- VectorWidthA: [1, -1]
        #- VectorWidthB: [1, -1]
        - ScheduleIterAlg: [3]
        - SourceSwap: [1]
        - GlobalReadVectorWidthA: [1,2,4]
        - GlobalReadVectorWidthB: [1,2,4]
        - LocalReadVectorWidth: [8]
        - TransposeLDS: [0,1]
        - 1LDSBuffer: [-1]
        - StaggerU: [16]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Range: [[1,67,517], [1,93,709],    [1], [1,76,865]]
        - BiasTypeArgs: ['s']


  ########################################
  # F32X TT + LSU4
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataTypeA: S
      DataTypeB: S
      DataType: b
      TransposeA: True
      TransposeB: True
      UseBeta: True
      Batched: True
      DestDataType: S
      UseBias: 1
      UseScaleAlphaVec: 1
      Activation: True
      ActivationType: hipblaslt_all
      BiasDataTypeList: ['s']
    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [32, 32, 16, 1, 1, 1,1, 1, 1]
          - [16, 16, 32, 1, 1, 1,1, 1, 1]
        - WorkGroup:
          - [4, 4, 4]
        - DepthU: [128, 256]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        #- VectorWidthA: [1, -1]
        #- VectorWidthB: [1, -1]
        - ScheduleIterAlg: [3]
        - SourceSwap: [1]
        - LocalReadVectorWidth: [8]
        #- LdsPadB: [0]
        #- LdsPadA: [0]
        - TransposeLDS: [0,1]
        - 1LDSBuffer: [-1]
        - StaggerU: [16]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Range: [[1,67,517], [1,93,709],    [1], [1,76,865]]
        - BiasTypeArgs: ['s']
