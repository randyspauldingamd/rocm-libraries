          - Exact: [256, 256, 1, 512]   # K = 2*DepthU
          - Exact: [256, 256, 1, 1024]  # K = 4*DepthU

  ########################################
  # FP8 TN — PGR=1, multi-DU (auto-detected), MT 256x256
  # Covers WG permutations [2,2], [1,4], [4,1] (cf. bnemanich review #9).
  # MIWaveTile compensates to keep MT 256x256:
  #   WG [2,2] → MIWT  8x 8
  #   WG [1,4] → MIWT 16x 4
  #   WG [4,1] → MIWT  4x16
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: F8
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      MXBlockA: 32
      MXBlockB: 32
