          - [16, 16, 128, 1,  1, 2, 2,  1, 4]  # MT 32x128
          - [16, 16, 128, 1,  1, 4, 2,  1, 4]  # MT 64x128
          - [16, 16, 128, 1,  1, 6, 2,  1, 4]  # MT 96x128
          - [16, 16, 128, 1,  1, 2, 4,  1, 4]  # MT 32x256
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - DepthU: [256]                 # 2*MI_K = 256
        - ScheduleIterAlg: [3]
        - DirectToLds: [1]
        - StreamK: [3]
        - StaggerU: [0]
        - UseSubtileImpl: [true]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
