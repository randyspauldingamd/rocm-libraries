      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 128, 1,  1,  8,  8,  2, 2]  # MT 256x256, WG 2x2 (baseline)
          - [16, 16, 128, 1,  1, 16,  4,  1, 4]  # MT 256x256, WG 1x4
          - [16, 16, 128, 1,  1,  4, 16,  4, 1]  # MT 256x256, WG 4x1
