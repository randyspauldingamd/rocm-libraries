# v3 base verification (2026-06-03, gfx950, host build_tmp tensilelite-client):
#   branch:  users/bnemanich/mxfp8-on-tl-multiple-du-2-v3
#   base:    origin/users/maemmett/tl-multiple-du-2 = 771c7db7313
#            "Fix subtile_mxfp8 regressions from mis-gated VGPR free-list allocation"
#            (PR 7781 with PR 7656 absorbed upstream; the previously-documented
#             MT256x256 PLR=0 multi-DU vgprs=289 codegen-overflow is RESOLVED
#             on this base.)
#   result:
#     subtile_mxfp8.yaml — 107 PASSED, 0 FAILED across 7 MT/PGR/PLR cache groups (39 exact problems × multiple kernel candidates; clientExit=0 PASS).
#
TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201, skip-gfx1250]

GlobalParameters:
  NumElementsToValidate: -1
  MinimumRequiredVersion: 5.0.0
  PrintLevel: 3
  Device: 0
  CMakeBuildType: Release
  KernelTime: True
  MaxWorkspaceSize: 13421772800
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeC: 0
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  DataInitTypeMXSA: 3
  DataInitTypeMXSB: 3
  MXScaleFormat: 1
  BoundsCheck: 0
  KeepBuildTmp: True
  CpuThreads: 1
  RotatingBufferSize: 0
  PrintSolutionRejectionReason: True

BenchmarkProblems:
  ########################################
  # FP8 TN — PGR=0, DU = 2*MI_K = 256, MT 128x128
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: F8
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      MXBlockA: 32
      MXBlockB: 32
      TransposeA: true
      TransposeB: false
      UseBeta: True
      Batched: True
      ActivationFuncCall: True

    - InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          # 2x2 wave group — symmetric
          - [16, 16, 128, 1,  1, 2, 2,  2, 2]  # MT 64x64
          - [16, 16, 128, 1,  1, 4, 4,  2, 2]  # MT 128x128
          # 2x2 wave group — asymmetric
          - [16, 16, 128, 1,  1, 2, 4,  2, 2]  # MT 64x128
          - [16, 16, 128, 1,  1, 4, 2,  2, 2]  # MT 128x64
          # 4x1 wave group
          - [16, 16, 128, 1,  1, 2, 2,  4, 1]  # MT 128x32
          - [16, 16, 128, 1,  1, 2, 4,  4, 1]  # MT 128x64
          - [16, 16, 128, 1,  1, 2, 6,  4, 1]  # MT 128x96
          - [16, 16, 128, 1,  1, 4, 2,  4, 1]  # MT 256x32
          # 1x4 wave group
          - [16, 16, 128, 1,  1, 2, 2,  1, 4]  # MT 32x128
          - [16, 16, 128, 1,  1, 4, 2,  1, 4]  # MT 64x128
          - [16, 16, 128, 1,  1, 6, 2,  1, 4]  # MT 96x128
          - [16, 16, 128, 1,  1, 2, 4,  1, 4]  # MT 32x256
        - PrefetchGlobalRead: [0]
        - PrefetchLocalRead: [0]
        - DepthU: [256]                 # 2*MI_K = 256
        - ScheduleIterAlg: [3]
        - DirectToLds: [1]
        - StreamK: [3]
        - StaggerU: [0]
        - UseSubtileImpl: [true]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [768, 768, 1, 256]   # K = 1*DU; LCM(MT_M)=LCM(MT_N)=768
          - Exact: [768, 768, 1, 512]   # K = 2*DU
          - Exact: [768, 768, 1, 768]   # K = 3*DU (K-loop)

  ########################################
  # FP8 TN — PGR=2 (scheduler path), DU = 2*MI_K = 256, MT 128x128
