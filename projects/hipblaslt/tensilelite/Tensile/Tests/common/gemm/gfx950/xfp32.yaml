        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [3]
        - SourceSwap: [1]
        - StaggerU: [0]
        - 1LDSBuffer: [0]
        - DirectToLds: [0,1]
        - GlobalReadVectorWidthA: [4]
        - LocalReadVectorWidth: [4]
