TestParameters:
  marks: [skip-gfx942, skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported by arch

GlobalParameters:
  NumElementsToValidate: -1
  MinimumRequiredVersion: 5.0.0
  PrintLevel: 1
  PrintSolutionRejectionReason: True
  Device: 0
  CMakeBuildType: Release
  MergeFiles: False
  KernelTime: True
  MaxWorkspaceSize: 13421772800
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  BoundsCheck: 2
  KeepBuildTmp: True
  EnqueuesPerSync: 10
  NumWarmups: 5
  MaxLDS: 163840
  DeviceLDS: 163840

BenchmarkProblems:
  ########################################
  # F32X NT
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: S
      DestDataType: S
      F32XdlMathOp: X
      TransposeA: 0
      TransposeB: 1
      UseBeta: True
      Batched: True
    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 32, 1, 1, 8, 8, 2, 2]
        - DepthU: [ 32 ]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [3]
        - SourceSwap: [1]
        - StaggerU: [0]
        - 1LDSBuffer: [0]
        - DirectToLds: [0] # carson: was 1
        - GlobalReadVectorWidthA: [4]
        - LocalReadVectorWidth: [4]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [128, 128, 1, 128]
          - Exact: [128, 128, 1, 127]
          - Exact: [2048, 2048, 1, 256]

  ########################################
  # F32X TN
  ########################################
