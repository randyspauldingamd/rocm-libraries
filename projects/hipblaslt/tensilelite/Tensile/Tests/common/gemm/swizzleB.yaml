TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201, skip-gfx1250] # not supported by arch

GlobalParameters:
  SyncsPerBenchmark: 0
  NumElementsToValidate: -1
  MinimumRequiredVersion: 5.0.0
  PrintLevel: 1
  #PrintSolutionRejectionReason: True
  Device: 0
  CMakeBuildType: Release
  KernelTime: True
  MaxWorkspaceSize: 13421772800
  DataInitTypeA: 13
  DataInitTypeB: 12
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  DataInitTypeBias: 13
  DataInitTypeScaleAlphaVec: 12
  BoundsCheck: 2
  #MaxFileName: 256

BenchmarkProblems:
  ########################################
  # HHS TN SWIZZLED_B + BIAS + Activation + SAV
  ########################################
