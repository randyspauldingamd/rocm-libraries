TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201]

GlobalParameters:
  SyncsPerBenchmark: 0
  NumElementsToValidate: -1
  KernelTime: True
  NewClient: 2
  BoundsCheck: False
  ValidationMaxToPrint: 4
  ValidationPrintValids: False
  DataInitTypeA: 3
  DataInitTypeB: 3
  NumWarmups: 1
  EnqueuesPerSync: 1
  MinKForGSU: 1
  Architecture: gfx1250

BenchmarkProblems:
  ########################################
  # NN - standard
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: h
      DestDataType: h
      ComputeDataType: s
      Gradient: True
      UseE: True
      Activation: False
      HighPrecisionAccumulate: True
      TransposeA: False
      TransposeB: False
      UseBeta: True
      SparseA: False
      UseBias: 0
      SupportUserArgs: True
      Batched: True

    - # BenchmarkProblemSizeGroup - Standard - All problem
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 32, 1,  1,  2, 1,  1, 2 ]
        - AssertFree0ElementMultiple: [1]
        - AssertFree1ElementMultiple: [1]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [0]
        - ClusterLocalRead: [1]
        - NumElementsPerBatchStore: [0]
        - DepthU: [32]
        - VectorWidthA: [1, 2]
        - VectorWidthB: [1]
        - WaveSeparateGlobalReadA: [0]
        - WaveSeparateGlobalReadB: [0]
        - WorkGroupMapping: [1]
        - WorkGroupMappingXCC: [1]
        - LocalReadVectorWidth: [8]
        - ScheduleIterAlg: [3]
        - ExpandPointerSwap: [0]
        - TransposeLDS: [1]
        - LdsBlockSizePerPadA: [-1]
        - LdsBlockSizePerPadB: [-1]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - GlobalSplitU: [1]
        - GlobalSplitUAlgorithm: ["MultipleBuffer"]
        - SourceSwap: [1]
        - ActivationFuncCall: [true]
        - 1LDSBuffer: [-1]
        - StaggerU: [0]
        - StaggerUMapping: [0]
        - StaggerUStride: [256]
        - WavefrontSize: [32]
        - ConvertAfterDS: [ False ]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [127, 127, 1, 127]
          - Exact: [32, 32, 1, 16]
          - Exact: [32, 32, 1, 128]
        - ActivationArgs:
          - [Enum: Dgelu]
