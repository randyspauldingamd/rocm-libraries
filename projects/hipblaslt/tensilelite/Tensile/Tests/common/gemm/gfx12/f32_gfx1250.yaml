TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported by arch

GlobalParameters:
  SyncsPerBenchmark: 0
  NumElementsToValidate: -1
  NewClient: 2
  BoundsCheck: False
  PrintSolutionRejectionReason: True
  ValidationMaxToPrint: 4      # maximum number of mismatches to print
  ValidationPrintValids: False # print matches too
  PruneSparseMode: 0
  DataInitTypeA: 3
  DataInitTypeB: 3
  #DataInitTypeAlpha: 0
  #DataInitTypeBeta: 1
  #PrintTensorC: 1
  #PrintTensorD: 1
  #PrintTensorRef: 1
  NumWarmups: 1
  EnqueuesPerSync: 1
  PrintWinnersOnly: True
  MinKForGSU: 1
  Architecture: gfx1250

BenchmarkProblems:
  #######################################
  # TN - standard
  #######################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: s
      DestDataType: s
      ComputeDataType: s
      HighPrecisionAccumulate:  False
      TransposeA: True
      TransposeB: False
      UseBeta: True
      Batched: True
      SupportUserArgs: True
      UseBias: 1
      Activation: True
      #UseScaleAB: Scalar #SAB
      UseScaleAlphaVec: 1 #SAV
      BiasDataTypeList: ['s']
      ActivationType:  hipblaslt_all

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          # - [16, 16, 16, 1,  1,  1, 1,  1, 1 ]
          # - [16, 16, 16, 1,  1,  1, 1,  4, 1 ]
          #- [16, 16, 32, 1,  1,  1, 1,  2, 2 ]
          - [16, 16, 4, 1,  1,  1, 1,  1, 1 ]
          - [16, 16, 4, 1,  1,  1, 1,  2, 2 ]
          - [16, 16, 4, 1,  1,  3, 3,  1, 4 ]
          - [16, 16, 4, 1,  1,  5, 3,  4, 2 ]
        - DepthU: [4,32] #
        - TransposeLDS: [-1]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - LdsPadMetadata: [0]
        - StaggerU: [0]
        - ScheduleIterAlg: [3]
        - PrefetchLocalRead: [1] #
        - PrefetchGlobalRead: [2] #
        - StoreRemapVectorWidth: [0]
        - GlobalSplitU: [1]
        - GlobalSplitUAlgorithm: [MultipleBuffer]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        - 1LDSBuffer: [-1]
        - DirectToVgprSparseMetadata: [0]
        - WorkGroupMapping: [1]
        - StoreVectorWidth: [-1]
        - DirectToVgprA: [False]
        - WavefrontSize: [32]
        #- AssertFree0ElementMultiple: [ 16 ]
        #- AssertFree1ElementMultiple: [ 16 ]
        #- AssertSummationElementMultiple: [ 32 ]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [127, 127, 1, 127]
          - Exact: [128, 128, 1, 128]
          - Exact: [129, 129, 1, 129]
        - BiasTypeArgs: ['s']
        - ActivationArgs:
          - [Enum: none]
          - [Enum: relu]


