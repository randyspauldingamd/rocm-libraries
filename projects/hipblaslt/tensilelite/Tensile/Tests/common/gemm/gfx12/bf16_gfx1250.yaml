TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported by arch

GlobalParameters:
  SyncsPerBenchmark: 0
  NumElementsToValidate: -1
  KernelTime: True
  NewClient: 2
  BoundsCheck: False
  PrintSolutionRejectionReason: True
  ValidationMaxToPrint: 4      # maximum number of mismatches to print
  ValidationPrintValids: False # print matches too
  DataInitTypeA: 3 #3
  DataInitTypeB: 2 #3
  DataInitTypeC: 0
  # DataInitTypeD: 0
  # DataInitTypeE: 0
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  # Tensor printing controls:
  # PrintTensorA: 1          # Print TensorA after initialization
  # PrintTensorB: 1          # Print TensorB after initialization
  # PrintTensorC: 0x3          # Print TensorC.  0x1=after init; 0x2=after copy-back; 0x3=both
  # PrintTensorD: 0x3          # Print TensorD.  0x1=after init; 0x2=after copy-back; 0x3=both
  #PrintTensorRef: 1
  # print logs
  PrintLevel: 2                # how much info to print in generator. 0=none, 1=standard, 2=verbose
  NumWarmups: 1
  EnqueuesPerSync: 1
  PrintWinnersOnly: True
  MinKForGSU: 1
  Architecture: gfx1250

BenchmarkProblems:
  #######################################
  # NN - standard
  #######################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate:  True
      TransposeA: False
      TransposeB: False
      UseBeta: True
      Batched: True
      SupportUserArgs: True
      UseBias: 1
      Activation: True
      #UseScaleAB: Scalar #SAB
      UseScaleAlphaVec: 1 #SAV
      BiasDataTypeList: ['s', 'b']
      ActivationType:  hipblaslt_all

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
          # Putting it all together:
          #  - [32, 32, 1, 2,  1,  4, 1,  2, 2]
          #     ^^^^^^^^^^^^   ^   ^^^^   ^^^^
          #      MatrixInst  BlkM   WT    Wave
        - MatrixInstruction:
          - [16, 16, 32, 1,  1,  2, 1,  1, 2 ]
          - [16, 16, 32, 1,  1,  1, 1,  2, 1 ]
          - [16, 16, 32, 1,  1,  1, 1,  2, 1 ]
          - [16, 16, 32, 1,  1,  1, 1,  1, 1]

        - DepthU: [32]
        - TransposeLDS: [-1]
        - LDSTrInst: [True, False]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - LdsPadMetadata: [0]
        - StaggerU: [0]
        - ScheduleIterAlg: [3]
        - PrefetchLocalRead: [0]
        - PrefetchGlobalRead: [2]
        - StoreRemapVectorWidth: [0]
        - GlobalSplitU: [1]
        - GlobalSplitUAlgorithm: [MultipleBuffer]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        - 1LDSBuffer: [-1, 1]
        - DirectToVgprSparseMetadata: [0]
        - WorkGroupMapping: [1]
        - StoreVectorWidth: [-1]
        - DirectToVgprA: [False]
        - WavefrontSize: [32]
        - AssertFree0ElementMultiple: [1]
        - AssertFree1ElementMultiple: [1]
        # - AssertSummationElementMultiple: [32]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [127, 127, 1, 127]
          - Exact: [128, 128, 1, 128]
          - Exact: [129, 129, 1, 129]
        - BiasTypeArgs: ['s','b']
        - ActivationArgs:
          - [Enum: none]
          - [Enum: relu]
          
