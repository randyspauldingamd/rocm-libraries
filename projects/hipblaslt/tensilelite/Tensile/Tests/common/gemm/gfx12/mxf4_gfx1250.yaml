TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported by arch

GlobalParameters:
  SyncsPerBenchmark: 0
  NumElementsToValidate: -1
  KernelTime: True
  NewClient: 2
  BoundsCheck: False
  PrintSolutionRejectionReason: True
  ValidationMaxToPrint: 4      # maximum number of mismatches to print
  ValidationPrintValids: False # print matches too
  PruneSparseMode: 0
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeC: 0
  DataInitTypeD: 3
  DataInitTypeMXSA: 3
  DataInitTypeMXSB: 3
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  NumWarmups: 1
  EnqueuesPerSync: 1
  PrintWinnersOnly: False
  MinKForGSU: 1
  Architecture: gfx1250
  # KeepBuildTmp: True
  PrintLevel: 2
  MaxLDS: 163840
  DeviceLDS: 163840


BenchmarkProblems:
  #######################################
  # TN - standard, MXF4SS Block32, E4M3
  #######################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: F4
      DestDataType: s
      ComputeDataType: s
      HighPrecisionAccumulate:  True
      TransposeA: True
      TransposeB: False
      UseBeta: True
      Batched: True
      Activation: False
      SupportUserArgs: True
      UseBias: 0
      MXBlockA: 32
      MXBlockB: 32
      DataTypeMXSA: f8
      DataTypeMXSB: f8

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - UseSgprForGRO: [0]
        - ForceDisableShadowInit: [1]
        - MatrixInstruction:
          - [16, 16, 128, 1,  1,  1, 1,  2, 2]
          - [16, 16, 128, 1,  1,  1, 2,  2, 1]
          - [16, 16, 128, 1,  1,  1, 4,  2, 1]
          - [16, 16, 128, 1,  1,  1, 4,  4, 1]
          - [16, 16, 128, 1,  1,  2, 2,  2, 2]
          - [16, 16, 128, 1,  1,  4, 4,  2, 2]
        - DepthU: [128, 256]
        - TDMInst: [3]
        - LocalReadVectorWidth: [32]
        - ScheduleIterAlg: [0]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - VectorWidthA: [1,2]
        - VectorWidthB: [1,2]
        - GlobalReadVectorWidthA: [32]
        - GlobalReadVectorWidthB: [32]
        - InnerUnroll: [1]
        - LdsBlockSizePerPadA: [0]
        - LdsBlockSizePerPadB: [0]
        - TransposeLDS: [1]
        - LdsPadA: [0]
        - LdsPadB: [0]
        - WaveSeparateGlobalReadA: [0]
        - WaveSeparateGlobalReadB: [0]
        - 1LDSBuffer: [0]
        - GlobalReadPerMfma: [1]
        - LocalWritePerMfma: [-1]
        - StoreVectorWidth: [-1]
        - SourceSwap: [1]
        - WavefrontSize: [32]
        - AssertSummationElementMultiple: [ 32 ]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [512, 512, 1, 1024]
          - Exact: [512, 512, 1, 1056]
          - Exact: [514, 512, 1, 1024]
          - Exact: [512, 514, 1, 1024]

