TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported by arch
GlobalParameters:
  SyncsPerBenchmark: 0
  NumElementsToValidate: -1
  KernelTime: False
  NewClient: 2
  BoundsCheck: False
  PrintSolutionRejectionReason: True
  ValidationMaxToPrint: 4      # maximum number of mismatches to print
  ValidationPrintValids: False # print matches too
  PruneSparseMode: 0
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeD: 2
  DataInitTypeMXSA: 3
  DataInitTypeMXSB: 3
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  # PrintTensorC: 1
  # PrintTensorD: 1
  # PrintTensorRef: 1
  NumWarmups: 0
  EnqueuesPerSync: 1
  PrintWinnersOnly: True
  MinKForGSU: 1
  Architecture: gfx1250
  KeepBuildTmp: True
  PrintLevel: 2
  UseGPUTimer: False
  MaxLDS: 163840
  DeviceLDS: 163840


BenchmarkProblems:
  #######################################
  # TN - standard, MXF8SS Block16, E8
  #######################################
  -
    - # ProblemType, TN
      OperationType: GEMM
      DataType: F8
      DestDataType: s
      ComputeDataType: s
      HighPrecisionAccumulate:  True
      TransposeA: True
      TransposeB: False
      UseBeta: True
      Batched: True
      Activation: False
      SupportUserArgs: True
      UseBias: 0
      MXBlockA: 16
      MXBlockB: 16
      DataTypeMXSA: e8
      DataTypeMXSB: e8

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - UseSgprForGRO: [0]
        - ForceDisableShadowInit: [1]
        - Groups:
          -
            - MatrixInstruction: [16, 16, 128, 1,  1,  4, 4,  2, 1]
              WorkGroup: [16, 16, 2]
            - MatrixInstruction: [16, 16, 128, 1,  1,  8, 4,  2, 2]
        - DepthU: [256]
        - TDMInst: [3]
        - TDMIterateMode: [0, 3]
        - TransposeLDS: [-1]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - LdsBlockSizePerPadA: [-1]
        - LdsBlockSizePerPadB: [-1]
        - LdsPadMetadata: [0]
        - LDSTrInst: [False]
        - StaggerU: [0]
        - ScheduleIterAlg: [0]
        - PrefetchLocalRead: [1]
        - PrefetchGlobalRead: [2]
        - StoreRemapVectorWidth: [0]
        - GlobalSplitU: [1,2,4,8]
        - GlobalSplitUAlgorithm: [MultipleBuffer]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        - VectorWidthA: [-1]
        - VectorWidthB: [-1]
        - LocalReadVectorWidth: [-1]
        - 1LDSBuffer: [0]
        - SourceSwap: [0]
        - DirectToVgprSparseMetadata: [0]
        - WorkGroupMapping: [1]
        - StoreVectorWidth: [-1]
        - DirectToVgprA: [False]
        - DirectToVgprB: [False]
        - WavefrontSize: [32]
        - ExpandPointerSwap: [0]
        - AssertSummationElementMultiple: [ 16 ]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [256, 256, 1, 2048]
          - Exact: [256, 256, 1, 2064] #tail
          - Exact: [257, 256, 1, 2048] #edge-m
          - Exact: [256, 257, 1, 2048] #edge-n
        - ActivationArgs:
          - [Enum: none]
  #######################################
  # TN - standard, MXF8SS Block32, E8
  #######################################
  -
    - # ProblemType, TN
      OperationType: GEMM
      DataType: F8
      DestDataType: s
      ComputeDataType: s
      HighPrecisionAccumulate:  True
      TransposeA: True
      TransposeB: False
      UseBeta: True
      Batched: True
      Activation: False
      SupportUserArgs: True
      UseBias: 0
      MXBlockA: 32
      MXBlockB: 32
      DataTypeMXSA: e8
      DataTypeMXSB: e8

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - UseSgprForGRO: [0]
        - ForceDisableShadowInit: [1]
        - MatrixInstruction:
          - [16, 16, 128, 1,  1,  8, 4,  2, 2]
          - [16, 16, 128, 1,  1,  8, 8,  2, 2]
        - HalfPLR: [0,1,2,3]
        - DepthU: [256]
        - TDMInst: [3]
        - TDMIterateMode: [-1,0,1,2,3]
        - TDMSplit: [False, True]
        - TransposeLDS: [-1]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - LdsBlockSizePerPadA: [-1]
        - LdsBlockSizePerPadB: [-1]
        - LdsPadMetadata: [0]
        - LDSTrInst: [False]
        - StaggerU: [0]
        - ScheduleIterAlg: [0]
        - PrefetchLocalRead: [1]
        - PrefetchGlobalRead: [1,2]
        - StoreRemapVectorWidth: [0]
        - GlobalSplitU: [1,2,4,8]
        - GlobalSplitUAlgorithm: [MultipleBuffer]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        - VectorWidthA: [-1]
        - VectorWidthB: [-1]
        - LocalReadVectorWidth: [-1]
        - 1LDSBuffer: [0]
        - SourceSwap: [0]
        - DirectToVgprSparseMetadata: [0]
        - WorkGroupMapping: [1]
        - StoreVectorWidth: [-1]
        - DirectToVgprA: [False]
        - DirectToVgprB: [False]
        - WavefrontSize: [32]
        - ExpandPointerSwap: [0]
        - AssertSummationElementMultiple: [ 32 ]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [256, 256, 1, 128]
          - Exact: [256, 256, 1, 384]
          - Exact: [256, 256, 1, 640]
          - Exact: [256, 256, 1, 896]
          - Exact: [256, 256, 1, 2048]
          - Exact: [256, 256, 1, 2080] #tail
          - Exact: [257, 256, 1, 2048] #edge-m
          - Exact: [256, 257, 1, 2048] #edge-n
        - ActivationArgs:
          - [Enum: none]
