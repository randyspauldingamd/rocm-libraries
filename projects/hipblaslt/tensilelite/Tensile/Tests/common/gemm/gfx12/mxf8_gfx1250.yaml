TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported by arch
GlobalParameters:
  SyncsPerBenchmark: 0
  NumElementsToValidate: -1
  KernelTime: False
  NewClient: 2
  BoundsCheck: False
  PrintSolutionRejectionReason: True
  ValidationMaxToPrint: 4      # maximum number of mismatches to print
  ValidationPrintValids: False # print matches too
  PruneSparseMode: 0
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeD: 2
  DataInitTypeMXSA: 3
  DataInitTypeMXSB: 3
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  # PrintTensorC: 1
  # PrintTensorD: 1
  # PrintTensorRef: 1
  NumWarmups: 0
  EnqueuesPerSync: 1
  PrintWinnersOnly: True
  MinKForGSU: 1
  Architecture: gfx1250
  KeepBuildTmp: True
  PrintLevel: 2
  UseGPUTimer: False
  MaxLDS: 163840
  DeviceLDS: 163840


BenchmarkProblems:
  #######################################
  # NN - standard
  #######################################
  -
    - # ProblemType, NN
      OperationType: GEMM
      DataType: F8
      DestDataType: s
      ComputeDataType: s
      HighPrecisionAccumulate:  True
      TransposeA: False
      TransposeB: False
      UseBeta: True
      Batched: True
      Activation: False
      SupportUserArgs: True
      UseBias: 0
      MXBlockA: 32
      MXBlockB: 32

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - UseSgprForGRO: [0]
        - ForceDisableShadowInit: [1]
        - MatrixInstruction:
          - [16, 16, 128, 1,  1,  2, 2,  2, 2]
        - DepthU: [256]
        - TransposeLDS: [-1]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - LdsBlockSizePerPadA: [-1]
        - LdsBlockSizePerPadB: [-1]
        - LdsPadMetadata: [0]
        - LDSTrInst: [True, False]
        - StaggerU: [0]
        - ScheduleIterAlg: [3]
        - PrefetchLocalRead: [1]
        - PrefetchGlobalRead: [2]
        - StoreRemapVectorWidth: [0]
        - GlobalSplitU: [1]
        - GlobalSplitUAlgorithm: [MultipleBuffer]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        - VectorWidthA: [-1]
        - VectorWidthB: [-1]
        - LocalReadVectorWidth: [-1]
        - 1LDSBuffer: [1]
        - SourceSwap: [0]
        - DirectToVgprSparseMetadata: [0]
        - WorkGroupMapping: [1]
        - StoreVectorWidth: [-1]
        - DirectToVgprA: [False]
        - DirectToVgprB: [False]
        - WavefrontSize: [32]
        - ExpandPointerSwap: [0]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [128, 128, 1, 1024]
        - ActivationArgs:
          - [Enum: none]

