TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported by arch
GlobalParameters:
  NumElementsToValidate: -1
  KernelTime: False
  BoundsCheck: False
  ValidationMaxToPrint: 4      # maximum number of mismatches to print
  ValidationPrintValids: False # print matches too
  PruneSparseMode: 0
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeD: 2
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  # PrintTensorC: 1
  # PrintTensorD: 1
  # PrintTensorRef: 1
  NumWarmups: 0
  EnqueuesPerSync: 1
  PrintWinnersOnly: True
  Architecture: gfx1250
  CpuThreads: 1
  KeepBuildTmp: True
  PrintLevel: 2
  CodeObjectVersion: 4
  ROCmAgentEnumeratorPath: rocm_agent_enumerator

BenchmarkProblems:
  ########################################
  # gfx1250 NonTemporal + TemporalHint + NonVolatile
  ########################################
  -
    - &problem_type_base # ProblemType NN
      OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      UseBeta: True
      Batched: True
      TransposeA: False
      TransposeB: False
    - &bpsg_nt_th_nv # BenchmarkProblemSizeGroup
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 32, 1, 1, 1, 1, 1, 1]
        - WavefrontSize: [32]
        - DepthU: [32]
        - PrefetchGlobalRead: [1]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [3]
        - TransposeLDS: [-1]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - LdsPadMetadata: [0]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        - StoreVectorWidth: [-1]
        - WorkGroupMapping: [1]
        - 1LDSBuffer: [-1]
        - GlobalSplitU: [1]
        - GlobalSplitUAlgorithm: ["MultipleBuffer"]
        - Groups:
          - - NonTemporal: [-1, 0, 1, 4, 7]
              TemporalHint: [-1, 0, 1, 4, 7]
              NonVolatile: [0, 1]
            - NonTemporalA: [0, 1, 4, 7]
              TemporalHintA: [0, 1, 4, 7]
              NonVolatileA: [0, 1]
            - NonTemporalD: [0, 1, 4, 7]
              TemporalHintD: [0, 1, 4, 7]
              NonVolatileD: [0, 1]
            - NonTemporalWS: [0, 1, 4, 7]
              TemporalHintWS: [0, 1, 4, 7]
              NonVolatileWS: [0, 1]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [128, 128, 1, 128]
  -
    - <<: *problem_type_base # ProblemType TN
      TransposeA: True
      TransposeB: False
    - *bpsg_nt_th_nv
  -
    - <<: *problem_type_base # ProblemType NT
      TransposeA: False
      TransposeB: True
    - *bpsg_nt_th_nv
  -
    - <<: *problem_type_base # ProblemType TT
      TransposeA: True
      TransposeB: True
    - *bpsg_nt_th_nv
