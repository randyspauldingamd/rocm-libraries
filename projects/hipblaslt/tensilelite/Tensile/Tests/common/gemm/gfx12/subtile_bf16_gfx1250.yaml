TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201]

GlobalParameters:
  NumElementsToValidate: -1
  PrintLevel: 3
  Device: 0
  CMakeBuildType: Release
  KernelTime: True
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeC: 3
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 2
  BoundsCheck: 0
  KeepBuildTmp: True
  CpuThreads: 1
  RotatingBufferSize: 0
  Architecture: gfx1250
  ISA: [[12, 5, 0]]
  PrintSolutionRejectionReason: True

BenchmarkProblems:
  -
    - # ProblemType
      OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      Batched: True

    - InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 32, 1,  1, 2, 2,  1, 1]  # MT 32x32   WG 1x1
          - [16, 16, 32, 1,  1, 4, 4,  1, 1]  # MT 64x64   WG 1x1
          - [16, 16, 32, 1,  1, 2, 2,  4, 1]  # MT 128x32  WG 4x1
          - [16, 16, 32, 1,  1, 2, 2,  1, 4]  # MT 32x128  WG 1x4
          - [16, 16, 32, 1,  1, 2, 2,  2, 2]  # MT 64x64   WG 2x2
          - [16, 16, 32, 1,  1, 4, 4,  2, 2]  # MT 128x128 WG 2x2
          - [16, 16, 32, 1,  1, 8, 8,  2, 2]  # MT 256x256 WG 2x2
        - DepthU: [64, 128]
        - WavefrontSize: [32]
        - PrefetchGlobalRead: [2]
        - ScheduleIterAlg: [3]
        - UseSubtileImpl: [1]
        - StreamK: [3]
        - TDMInst: [3]
        - StaggerU: [0]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - 1LDSBuffer: [0]
        - StoreVectorWidth: [-1]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        - GlobalSplitU: [1]
        - PreloadKernArgs: [False]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          # Full macro-tile multiples
          - Exact: [64, 64, 1, 64]
          - Exact: [128, 128, 1, 128]
          - Exact: [128, 128, 1, 256]
          - Exact: [256, 256, 1, 256]
          # Mult-of-32 edges: M,N not multiples of macro tile
          - Exact: [96,  96,  1, 128]   # 3*32, edge for MT >= 128
          - Exact: [160, 160, 1, 128]   # 5*32, edge for MT >= 192
          - Exact: [224, 224, 1, 128]   # 7*32, edge for MT >= 256
          - Exact: [288, 288, 1, 128]   # 9*32, edge for MT >= 320
          - Exact: [352, 352, 1, 128]   # 11*32, edge for MT >= 384
          - Exact: [416, 416, 1, 128]   # 13*32, edge for MT >= 448
          - Exact: [480, 480, 1, 128]   # 15*32, edge for MT >= 512
          - Exact: [544, 544, 1, 128]   # 17*32, edge for MT >= 576
          # Asymmetric edges
          - Exact: [96,  256, 1, 128]   # M edge, N full tile
          - Exact: [256,  96, 1, 128]   # M full tile, N edge
          # Larger K
          - Exact: [128, 128, 1, 384]
          - Exact: [256, 256, 1, 384]
          - Exact: [96,  96,  1, 384]
          - Exact: [160, 160, 1, 384]
          # Odd (non-aligned) M and N
          - Exact: [127, 129, 1, 64]
          - Exact: [63,  65,  1, 128]
          - Exact: [255, 257, 1, 128]
          - Exact: [97,  95,  1, 256]
          - Exact: [161, 159, 1, 128]
          - Exact: [33,  127, 1, 128]
          - Exact: [129, 33,  1, 256]
