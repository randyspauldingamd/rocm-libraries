GlobalParameters:
  SyncsPerBenchmark: 0
  NumElementsToValidate: -1
  KernelTime: True
  NewClient: 2
  BoundsCheck: False
  ValidationMaxToPrint: 4
  ValidationPrintValids: False
  DataInitTypeA: 3
  DataInitTypeB: 3
  NumWarmups: 1
  EnqueuesPerSync: 1
  MinKForGSU: 1
  Architecture: gfx1250
  CpuThreads: 1
  ROCmAgentEnumeratorPath: rocm_agent_enumerator

BenchmarkProblems:
  #######################################
  # NN - standard
  #######################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: h
      DestDataType: h
      ComputeDataType: s
      HighPrecisionAccumulate:  True
      TransposeA: False
      TransposeB: False
      UseBeta: True
      Batched: True
      SupportUserArgs: True
      UseBias: 0
      Activation: True
      UseScaleAlphaVec: 1
      BiasDataTypeList: ['s', 'h']
      ActivationType:  hipblaslt_all

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 32, 1,  1,  2, 1,  1, 2 ]
          - [16, 16, 32, 1,  1,  1, 1,  2, 1 ]
          - [16, 16, 32, 1,  1,  1, 1,  2, 1 ]
          - [16, 16, 32, 1,  1,  1, 1,  1, 1]
        - DepthU: [32]
        - TransposeLDS: [-1, 1]
        - LDSTrInst: [True, False]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - LdsPadMetadata: [0]
        - StaggerU: [0]
        - ScheduleIterAlg: [3]
        - PrefetchLocalRead: [0]
        - PrefetchGlobalRead: [2]
        - StoreRemapVectorWidth: [0]
        - GlobalSplitU: [1,2,3]
        - GlobalSplitUAlgorithm: [MultipleBuffer]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        - 1LDSBuffer: [-1, 1]
        - VectorWidthA: [1, 2]
        - SourceSwap: [0, 1]
        - DirectToVgprSparseMetadata: [0]
        - WorkGroupMapping: [1]
        - StoreVectorWidth: [-1]
        - DirectToVgprA: [False]
        - WavefrontSize: [32]
        - AssertFree0ElementMultiple: [1]
        - AssertFree1ElementMultiple: [1]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [127, 127, 1, 127]
          - Exact: [128, 128, 1, 128]
          - Exact: [129, 129, 1, 129]
        - BiasTypeArgs: ['s','h']
        - ActivationArgs:
          - [Enum: none]
          - [Enum: relu]

