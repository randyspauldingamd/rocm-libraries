TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported by arch

GlobalParameters:
  SyncsPerBenchmark: 0
  NumElementsToValidate: -1
  Architecture: gfx1250
  DeviceLDS: 327680
  PrintSolutionRejectionReason: True

BenchmarkProblems:
  #######################################
  # TN - standard
  #######################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate:  True
      TransposeA: True
      TransposeB: False
      UseBeta: True
      Batched: True
      SupportUserArgs: True
      UseBias: 1
      Activation: True
      UseScaleAlphaVec: 1
      BiasDataTypeList: ['s', 'b']
      ActivationType:  hipblaslt_all

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 32, 1,  1,  2, 2,  2, 2 ] #64x64x512
          - [16, 16, 32, 1,  1,  8, 8,  2, 2 ] #256x256x64
        - DepthU: [64,512]
        - MaxLDS: [327680]
        - TransposeLDS: [-1]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - StaggerU: [0]
        - ScheduleIterAlg: [3]
        - PrefetchLocalRead: [1]
        - PrefetchGlobalRead: [2]
        - ClusterLocalRead: [1]
        - StoreRemapVectorWidth: [0]
        - GlobalSplitU: [1]
        - GlobalSplitUAlgorithm: [MultipleBuffer]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        - 1LDSBuffer: [-1]
        - WorkGroupMapping: [1]
        - StoreVectorWidth: [-1]
        - DirectToVgprA: [False]
        - WavefrontSize: [32]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [56, 19, 1, 512]
          - Exact: [257, 256, 1, 103]
        - BiasTypeArgs: ['s','b']
        - ActivationArgs:
          - [Enum: relu]
