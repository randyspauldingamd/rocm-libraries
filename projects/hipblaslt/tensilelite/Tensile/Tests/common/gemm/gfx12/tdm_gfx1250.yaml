TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported by arch
GlobalParameters:
  NumElementsToValidate: -1
  KernelTime: False
  BoundsCheck: False
  ValidationMaxToPrint: 4      # maximum number of mismatches to print
  ValidationPrintValids: False # print matches too
  PruneSparseMode: 0
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeD: 2
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  # PrintTensorC: 1
  # PrintTensorD: 1
  # PrintTensorRef: 1
  NumWarmups: 0
  EnqueuesPerSync: 1
  PrintWinnersOnly: True
  Architecture: gfx1250
  CpuThreads: 1
  KeepBuildTmp: True
  PrintLevel: 2
  CodeObjectVersion: 4
  ROCmAgentEnumeratorPath: rocm_agent_enumerator

BenchmarkProblems:
  -
    - # ProblemType, TN
      OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate:  True
      TransposeA: True
      TransposeB: False
      UseBeta: True
      Batched: True
      Activation: False
      SupportUserArgs: True
      UseBias: 0

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 32, 1,  1,  1, 1,  1, 1 ]
          - [16, 16, 32, 1,  1,  1, 1,  2, 2 ]
          - [16, 16, 32, 1,  1,  8, 4,  2, 2 ]
          # - [16, 16, 32, 1,  1,  1, 1,  4, 1 ]
          # - [16, 16, 32, 1,  1,  2, 2,  2, 2 ]
          # - [16, 16, 32, 1,  1,  2, 2,  2, 2]
        - DepthU: [64, 128]
        - TransposeLDS: [-1]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - LdsBlockSizePerPadA: [-1]
        - LdsBlockSizePerPadB: [-1]
        - LdsPadMetadata: [0]
        - TDMInst: [3]
        - TDMIterateMode: [-1, 0, 3]
        - LDSTrInst: [False]
        - StaggerU: [0, 4, 16]
        - StaggerUMapping: [0, 1]
        - ScheduleIterAlg: [0]
        - PrefetchLocalRead: [1]
        - PrefetchGlobalRead: [2]
        - StoreRemapVectorWidth: [0]
        - GlobalSplitU: [1]
        - GlobalSplitUAlgorithm: [MultipleBuffer]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        - VectorWidthA: [-1]
        - VectorWidthB: [-1]
        - LocalReadVectorWidth: [8]
        - 1LDSBuffer: [0]
        - SourceSwap: [0]
        - DirectToVgprSparseMetadata: [0]
        - WorkGroupMapping: [1]
        - StoreVectorWidth: [-1]
        - DirectToVgprA: [False]
        - DirectToVgprB: [False]
        - WavefrontSize: [32]
        # - AssertFree0ElementMultiple: [ 16 ]
        # - AssertFree1ElementMultiple: [ 16 ]
        # - AssertSummationElementMultiple: [ 32 ]
        - ExpandPointerSwap: [0]
        - GroupLoadStore: [False]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [64, 64, 1, 512]
          - Exact: [64, 64, 1, 127]
