TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201, skip-gfx1250] # not supported by arch

GlobalParameters:
  NumElementsToValidate: -1
  MinimumRequiredVersion: 5.0.0
  PrintLevel: 1
  PrintSolutionRejectionReason: True
  Device: 0
  CMakeBuildType: Release
  KernelTime: True
  MaxWorkspaceSize: 13421772800
  DataInitTypeA: 21
  DataInitTypeB: 21
  DataInitTypeC: 21
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  DataInitTypeBias: 21
  DataInitTypeScaleAlphaVec: 21
  NumElementsToValidate: -1
  BoundsCheck: 2

BenchmarkProblems:
  ########################################
  # FP8NHS
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: F8N
      DestDataType: h
      ComputeDataType: S
      HighPrecisionAccumulate: True
      TransposeA: 0
      TransposeB: 0
      UseBeta: True
      Batched: True
      Activation:    True
      ActivationType: hipblaslt_all
      UseScaleAB: "Scalar"
      UseScaleCD: True
      UseScaleAlphaVec: 1
      UseBias: 1
      BiasDataTypeList: [s]
    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16,16,32, 1, 1, 1,1, 1,1]  # 16x16
          - [16,16,32, 1, 1, 1,1, 2,1]  # 32x16
          - [16,16,32, 1, 1, 1,1, 4,1]  # 64x16
        - DepthU: [ 32, 64 ]
        - AssertFree0ElementMultiple: [1]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ClusterLocalRead: [1]
        - VectorWidthA: [1]
        - VectorWidthB: [1]
        - GlobalReadVectorWidthA: [1, 2, 4, 8, 16]
        - GlobalReadVectorWidthB: [1, 2, 4, 8, 16]
        - ScheduleIterAlg: [3]
        - InnerUnroll: [1]
        - ExpandPointerSwap: [1]
        - LdsBlockSizePerPadA: [0]
        - LdsBlockSizePerPadB: [0]
        - TransposeLDS: [1]
        - LdsPadA: [0]
        - LdsPadB: [0]
        - WaveSeparateGlobalReadA: [0, 1, 2]
        - WaveSeparateGlobalReadB: [0, 1, 2]
        - 1LDSBuffer: [-1]
        - GlobalSplitU: [1, 2]
        - GlobalSplitUAlgorithm: ["MultipleBuffer"]
        - GlobalReadPerMfma: [1]
        - LocalWritePerMfma: [-1]
        - StoreVectorWidth: [-1]
        - SourceSwap: [1]
        - NumElementsPerBatchStore: [0]
        - StorePriorityOpt: [0]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [13, 13, 1, 1]
          - Exact: [17, 17, 1, 1]
          - Exact: [25, 25, 1, 1]
          - Exact: [33, 33, 1, 1]
          - Exact: [65, 65, 1, 1]
          - Exact: [13, 13, 1, 3]
          - Exact: [17, 17, 1, 3]
          - Exact: [25, 25, 1, 3]
          - Exact: [33, 33, 1, 3]
          - Exact: [65, 65, 1, 3]
        - BiasTypeArgs: ['s']
        - ActivationArgs:
          - [Enum: none]

  ########################################
  # bf16 TN
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      UseBias: 1
      Batched: True
      Activation: True
      ActivationType: hipblaslt_all
    - # BenchmarkProblemSizeGroup - Standard - All problem
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16,16, 1,  1,   1, 1,  1,1 ]
          - [16, 16,16, 1,  1,   1, 1,  2,1 ]
          - [16, 16,16, 1,  1,   1, 1,  4,1 ]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ClusterLocalRead: [1]
        - DepthU: [32,64]
        - LocalReadVectorWidth: [8]
        - ScheduleIterAlg: [3]
        - ExpandPointerSwap: [0]
        - TransposeLDS: [1]
        - LdsBlockSizePerPadA: [-1]
        - LdsBlockSizePerPadB: [-1]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - 1LDSBuffer: [-1]
        - GlobalSplitU: [1, 2]
        - GlobalSplitUAlgorithm: ["MultipleBuffer"]
        - SourceSwap: [1]
        - WaveSeparateGlobalReadA: [0, 1, 2]
        - WaveSeparateGlobalReadB: [0, 1, 2]
        - GlobalReadVectorWidthA: [1, 2, 4, 8]
        - GlobalReadVectorWidthB: [1, 2, 4, 8]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [13, 13, 1, 1]
          - Exact: [17, 17, 1, 1]
          - Exact: [25, 25, 1, 1]
          - Exact: [33, 33, 1, 1]
          - Exact: [13, 13, 1, 5]
          - Exact: [17, 17, 1, 5]
          - Exact: [25, 25, 1, 5]
          - Exact: [33, 33, 1, 5]
          - Exact: [65, 65, 1, 5]
        - BiasTypeArgs: ['s']
        - ActivationArgs:
          - [Enum: none]
