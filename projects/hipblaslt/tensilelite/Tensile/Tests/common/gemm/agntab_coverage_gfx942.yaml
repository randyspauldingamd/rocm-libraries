TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201, skip-gfx1250] # not supported by arch

GlobalParameters:
  NumElementsToValidate: -1
  NumWarmups: 1
  MaxEnqueuesPerSync: 1
  SleepPercent: 0
  PrintSolutionRejectionReason: True
  DataInitTypeA: 23
  DataInitTypeB: 24
  DataInitTypeBeta: 0
  DataInitTypeAlpha: 1
  CSVExportWinner: 1
  CSVMergeSameProblemID: 1
  Device: 0
  MaxWorkspaceSize: 134217728
  KernelTime: True
  RotatingBufferSize: 512

.AdaptiveBase: &adaptive_base
  CustomKernels:
  InitialSolutionParameters:
  BenchmarkCommonParameters:
    - KernelLanguage: ["Assembly"]
  ForkParameters:
    - MatrixInstruction:
      - [16, 16, 16, 1, 1, 4, 4, 2, 2] # MT128x128, 4 waves; MFMA bf16 16x16x16
    - DepthU: [64]
    - 1LDSBuffer: [-1]
    - ExpandPointerSwap: [0]
    - StaggerU: [16]
    - TransposeLDS: [0]
    - WorkGroupMapping: [1]
    - WorkGroupMappingXCC: [8]
    # ============ feature axes under test ============
    - PrefetchGlobalRead: [2]
    - AdaptiveGemm: [0, 1]
    - AdaptiveGemmGSUA: [0, 1]
    - AdaptiveGemmNTAB: [0, 1]
    - OptNoLoadLoop: [0, 1]
    - TailloopInNll: [False, True]
    # - UseSubtileImpl: [0, 1]
    - Groups:
      - - GlobalSplitU: 0
          StreamK:      3
        - GlobalSplitU: -1
          StreamK:      0
  BenchmarkJoinParameters:
  BenchmarkFinalParameters:
    - ProblemSizes:
      - Exact: [128,    128, 1, 128]   # baseline       -> NTA0_NTB0  (loopIters=2; 'enough' is False)
      - Exact: [32768,  128, 1, 192]   # NTA4 fires     -> NTA4_NTB0  (skinnyA, longA, K/DU=3 > 2)
      - Exact: [128,  16384, 1, 256]   # NTB4 fires     -> NTA0_NTB4  (skinnyB, longB, K/DU=4 > 2)

BenchmarkProblems:
  # =================================================================
  # Adaptive coverage -- PGR=2 path: 4 transpose x 3 sizes
  # =================================================================
  - # NN adaptive (PGR=2)
    - OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: False
      TransposeB: False
      UseBeta: True
      Batched: True
    - <<: *adaptive_base

  - # TN adaptive (PGR=2)
    - OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: True
      TransposeB: False
      UseBeta: True
      Batched: True
    - <<: *adaptive_base

  - # NT adaptive (PGR=2)
    - OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: False
      TransposeB: True
      UseBeta: True
      Batched: True
    - <<: *adaptive_base

  - # TT adaptive (PGR=2)
    - OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: True
      TransposeB: True
      UseBeta: True
      Batched: True
    - <<: *adaptive_base
