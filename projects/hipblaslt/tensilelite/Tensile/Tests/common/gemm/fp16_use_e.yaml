TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102] # not supported by arch

GlobalParameters:
  NumElementsToValidate: -1
  KernelTime: True
  NewClient: 2
  BoundsCheck: False
  PrintSolutionRejectionReason: True
  ValidationMaxToPrint: 500      # maximum number of mismatches to print
  ValidationPrintValids: False # print matches too
  PruneSparseMode: 0
  DataInitTypeA: 1
  DataInitTypeB: 3
  DataInitTypeC: 0
  DataInitTypeD: 0
  DataInitTypeE: 16
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  # Tensor printing controls:
  PrintTensorA: 2          # Print TensorA after initialization
  PrintTensorB: 1          # Print TensorB after initialization
  # PrintTensorC: 0x3          # Print TensorC.  0x1=after init; 0x2=after copy-back; 0x3=both
  PrintTensorD: 0x3          # Print TensorD.  0x1=after init; 0x2=after copy-back; 0x3=both
  PrintTensorE: 0x3          # Print TensorD.  0x1=after init; 0x2=after copy-back; 0x3=both
  PrintTensorRef: 0x3
  NumWarmups: 1
  EnqueuesPerSync: 1
  PrintWinnersOnly: False
  MinKForGSU: 10
  Architecture: gfx1250
  CpuThreads: 1
  KeepBuildTmp: True
  PrintLevel: 2
  AMDGPUArchPath: rocm_agent_enumerator
  MaxWorkspaceSize: 3355443200

BenchmarkProblems:
# gradient
  ########################################
  # TN - standard
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: h
      DestDataType: h
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      Batched: True
      Gradient: True
      UseE: True
      UseBias:       0
      Activation:    True
      ActivationType: hipblaslt_all

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          # - [16, 16, 32, 1,  1,   2, 4,  2,2 ]
          - [16, 16, 32, 1,  1,  1, 1,  1, 1]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ClusterLocalRead: [1]
        - DepthU: [32]
        - WavefrontSize: [32]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        - LocalReadVectorWidth: [-1]
        - ScheduleIterAlg: [3]
        - ExpandPointerSwap: [0]
        - TransposeLDS: [-1]
        - LdsBlockSizePerPadA: [-1]
        - LdsBlockSizePerPadB: [-1]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - 1LDSBuffer: [-1]
        #- GlobalSplitU: [1,2]
        #- GlobalSplitUAlgorithm: ["MultipleBuffer"]
        - SourceSwap: [0]
        - ActivationFuncCall: [0]
        # - StoreVectorWidth: [1]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          # - Exact: [4608,1335,1, 640]
          # - Exact: [4608,1335,1,1280]
          # - Exact: [128,  128,1, 640]
          # - Exact: [4608,1408,1, 640]
          # - Exact: [256, 256, 1, 512]
          - Exact: [16, 16, 1, 128]
        - ActivationArgs:
          - [Enum: Dgelu]