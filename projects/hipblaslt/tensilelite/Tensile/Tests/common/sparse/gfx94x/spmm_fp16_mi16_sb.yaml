GlobalParameters:
  SyncsPerBenchmark: 0
  NumElementsToValidate: -1
  KernelTime: True
  NewClient: 2
  BoundsCheck: False
  # PrintSolutionRejectionReason: True
  PrintWinnersOnly: True
  ValidationMaxToPrint: 4      # maximum number of mismatches to print
  ValidationPrintValids: False # print matches too
  DataInitValueActivationArgs: [0.5, -1]
  PruneSparseMode: 0
  MinKForGSU: 1

BenchmarkProblems:
  #######################################
  # NN - standard
  #######################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: H
      DestDataType: H
      ComputeDataType: s
      HighPrecisionAccumulate:  True
      TransposeA: False
      TransposeB: False
      UseBeta: True
      Sparse: 2
      Batched: True
      Activation: True
      ActivationType: all
      UseBias: 3
      UseScaleAlphaVec: 3

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
        #- EdgeType: ["ShiftPtr"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 32, 1,  1,  1, 1,  1, 1 ]
        - DepthU: [32]
        - TransposeLDS: [-1]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - LdsPadMetadata: [-1]
        - StaggerU: [0]
        - ScheduleIterAlg: [3]
        - PrefetchLocalRead: [0]
        - ClusterLocalRead: [1]
        - PrefetchGlobalRead: [0]
        - StoreRemapVectorWidth: [-1]
        - GlobalSplitU: [1,2]
        - GlobalSplitUAlgorithm: [MultipleBuffer]
        - 1LDSBuffer: [-1]
        - DirectToVgprSparseMetadata: [0]
        - WorkGroupMapping: [18]
        - StoreVectorWidth: [-1]
        - AssertFree0ElementMultiple: [8]
        - SourceSwap: [1]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [16, 16, 1, 16] # classic format
          - Exact: [16, 16, 1, 32] # classic format
          - Exact: [256, 256, 1, 16] # classic format
          - Exact: [256, 256, 1, 32] # classic format
        - BiasTypeArgs: ['s','h']
        - FactorDimArgs: [0,1]
        - ActivationArgs:
          - [Enum: none]

