TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201, skip-gfx1250] # not supported yet
GlobalParameters:
  SyncsPerBenchmark: 0
  MinimumRequiredVersion: 5.0.0
  SleepPercent: 50
  NumElementsToValidate: -1
  #DataInitTypeBeta: 0
  #DataInitTypeAlpha: 1
  #DataInitTypeA: 8
  #DataInitTypeB: 8
  #DataInitTypeBias: 0
  NewClient: 2
  CSVExportWinner: 1
  CSVMergeSameProblemID: 1
  #Device: 0
  PruneSparseMode: 0
  MaxLDS: 163840
  DeviceLDS: 163840
  PrintSolutionRejectionReason: 1
BenchmarkProblems:
  #######################################
  # NT - standard
  #######################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: H
      DestDataType: H
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: False
      TransposeB: True
      UseBeta: True
      UseBias: 3
      Batched: True
      Activation: True
      ActivationType: all
      UseScaleAlphaVec: 3
      #ActivationHPA: True
      Sparse: 1

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
        #- EdgeType: ["ShiftPtr"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 64, 1, 1, 1, 1, 1, 1 ]
          - [16, 16, 64, 1, 1, 1, 1, 2, 2 ]
          - [16, 16, 64, 1, 1, 1, 3, 2, 2 ]
          - [16, 16, 64, 1, 1, 2, 1, 1, 4 ]
          - [16, 16, 64, 1, 1, 8, 6, 1, 1 ]
          - [16, 16, 64, 1, 1, 8, 8, 2, 2 ]
          - [16, 16, 64, 1, 1, 7, 2, 2, 2 ]
          - [16, 16, 64, 1, 1, 5, 9, 1, 4 ] # LDS 128K B
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [0,1,2]
        - ClusterLocalRead: [0,1]
        - DepthU: [64,128]
        #- LocalReadVectorWidth: [8] #
        - ScheduleIterAlg: [3]
        - ExpandPointerSwap: [0]       #
        - TransposeLDS: [-1]
        - LdsPadA: [0,-1]
        - LdsPadB: [0,-1]
        - LdsPadMetadata: [0,-1]
        - 1LDSBuffer: [-1]
        - GlobalSplitU: [1]
        - SourceSwap: [0]
        - StoreRemapVectorWidth: [-1]
        - LDSTrInst: [1]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [8, 8, 1, 32] # classic format
          - Exact: [8, 8, 1, 64] # classic format
          - Exact: [8, 8, 1, 128] # classic format
          - Exact: [8, 8, 1, 256] # classic format
          - Exact: [256, 256, 1, 32] # classic format
          - Exact: [256, 256, 1, 64] # classic format
          - Exact: [256, 256, 1, 128] # classic format
          - Exact: [256, 256, 1, 256] # classic format
          - Exact: [1024, 1024, 1, 1024] # classic format
        - BiasTypeArgs: ['s']
        - FactorDimArgs: [0]
        - ActivationArgs:
          - [Enum: none]

  #######################################
  # NT - standard
  #######################################
