TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported yet
GlobalParameters:
  NumElementsToValidate: -1
  KernelTime: True
  NewClient: 2
  BoundsCheck: False
  PrintSolutionRejectionReason: True
  PrintWinnersOnly: True
  ValidationMaxToPrint: 4      # maximum number of mismatches to print
  ValidationPrintValids: False # print matches too
  # DataInitValueActivationArgs: [0.5, -1]
  Architecture: gfx1250
  # DataInitTypeBeta: 0
  # DataInitTypeAlpha: 1
  # DataInitTypeBias: 0
  # DataInitTypeA: 1
  # DataInitTypeB: 8
  # DataInitTypeScaleAlphaVec: 1
  # PruneSparseMode: 1
  # PrintTensorA: 1
  # PrintTensorB: 1
  # PrintTensorC: 0
  # PrintTensorD: 1
  # PrintTensorRef: 1
  # GenerateSourcesAndExit: True
  ROCmAgentEnumeratorPath: rocm_agent_enumerator

BenchmarkProblems:
  #######################################
  # NN - standard
  #######################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: f8
      DestDataType: s
      ComputeDataType: s
      HighPrecisionAccumulate:  True
      TransposeA: False
      TransposeB: False
      UseBeta: True
      Sparse: 1
      Batched: True
      Activation: False
      UseBias: 0

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 128, 1, 1, 1, 1, 1, 1]
          - [16, 16, 128, 1, 1, 1, 1, 2, 2]
          - [16, 16, 128, 1, 1, 2, 2, 1, 1]
          - [16, 16, 128, 1, 1, 2, 2, 2, 2]
          - [16, 16, 128, 1, 1, 2, 1, 1, 4]
          - [16, 16, 128, 1, 1, 4, 4, 2, 2]
          - [16, 16, 128, 1, 1, 7, 2, 2, 2]
          # - [16, 16, 128, 1, 1, 8, 8, 2, 2]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        - DepthU: [128]
        - WavefrontSize: [32] # from 64 -> 32 !!!
        - TransposeLDS: [0]
        - SourceSwap: [0]
        - LdsPadA: [0]
        - LdsPadB: [0]
        - LdsPadMetadata: [0]
        - StaggerU: [0]
        - ScheduleIterAlg: [3]
        - PrefetchLocalRead: [0]
        - ClusterLocalRead: [0]
        - PrefetchGlobalRead: [0]
        - GlobalSplitU: [1]
        - GlobalSplitUAlgorithm: [MultipleBuffer]
        - 1LDSBuffer: [0]
        - DirectToVgprSparseMetadata: [0]
        - WorkGroupMapping: [1]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          # - Exact: [16, 16, 1, 32] # classic format
          # - Exact: [16, 16, 1, 64] # classic format
          - Exact: [16, 16, 1, 128] # classic format
          - Exact: [64, 64, 1, 128] # classic format
          - Exact: [256, 256, 1, 128] # classic format
          - Exact: [256, 256, 1, 256] # classic format
          - Exact: [256, 256, 1, 384] # classic format
          - Exact: [256, 256, 1, 512] # classic format
        - ActivationArgs:
          - [Enum: none]