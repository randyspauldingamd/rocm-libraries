          # - Exact: [256, 256, 1, 256] # classic format
          # - Exact: [1024, 1024, 1, 1024] # classic format
        - BiasTypeArgs: ['s']
        - FactorDimArgs: [0]
        - ActivationArgs:
          - [Enum: none]
