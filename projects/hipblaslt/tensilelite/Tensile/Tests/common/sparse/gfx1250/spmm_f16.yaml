BenchmarkProblems:
  #######################################
  # NN - standard
  #######################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: h
      DestDataType: h
      ComputeDataType: s
      HighPrecisionAccumulate:  True
      TransposeA: False
      TransposeB: False
      UseBeta: True
      UseBias: 3
      Batched: True
      Activation: True
      ActivationType: all
      UseScaleAlphaVec: 3
      Sparse: 1

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 64, 1, 1, 1, 1, 1, 1] # m, n = 16, k = 64
          - [16, 16, 64, 1, 1, 1, 1, 2, 2] # m, n = 16, k = 64
          - [16, 16, 64, 1, 1, 2, 2, 1, 1] # m, n = 16, k = 64
          # - [16, 16, 64, 1, 1, 2, 2, 2, 2] # m, n = 16, k = 64
          # - [16, 16, 64, 1, 1, 1, 3, 2, 2] # m, n = 16, k = 64
          # - [16, 16, 64, 1, 1, 3, 1, 2, 2] # m, n = 16, k = 64
          - [16, 16, 64, 1, 1, 4, 4, 2, 2] # m, n = 16, k = 64
          # - [16, 16, 64, 1, 1, 8, 8, 2, 2] # m, n = 16, k = 64
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - DepthU: [64, 128]
        - WavefrontSize: [32] # from 64 -> 32 !!!
        - ScheduleIterAlg: [3]
        - TransposeLDS: [-1]
        - SourceSwap: [0]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - LdsPadMetadata: [-1]
        - GlobalSplitU: [1, 2]
        - GlobalSplitUAlgorithm: [MultipleBuffer]
        - 1LDSBuffer: [-1, 1]
        - VectorWidthA: [-1]
        - VectorWidthB: [-1]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        #- AssertSummationElementMultiple: [8]
        - LDSTrInst: [True, False]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          # - Exact: [8, 8, 1, 64] # classic format
          # - Exact: [8, 8, 1, 128] # classic format
          # - Exact: [8, 8, 1, 256] # classic format
          # - Exact: [8, 8, 1, 16] # classic format
          # - Exact: [8, 8, 1, 48] # classic format
