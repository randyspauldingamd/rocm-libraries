TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported by arch
GlobalParameters:
  NumElementsToValidate: -1
  KernelTime: False
  # NewClient: 2
  BoundsCheck: False
  # PrintSolutionRejectionReason: True
  ValidationMaxToPrint: 4      # maximum number of mismatches to print
  ValidationPrintValids: False # print matches too
  PruneSparseMode: 0
  # DataInitTypeA: 1
  # DataInitTypeB: 8
  # DataInitTypeD: 0
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  # PrintTensorA: 1
  # PrintTensorB: 1
  # PrintTensorC: 0
  # PrintTensorD: 1
  # PrintTensorRef: 1
  NumWarmups: 0
  EnqueuesPerSync: 1
  PrintWinnersOnly: True
  # MinKForGSU: 1
  Architecture: gfx1250
  CpuThreads: 1
  KeepBuildTmp: True
  PrintLevel: 2
  ROCmAgentEnumeratorPath: rocm_agent_enumerator

BenchmarkProblems:
# ########################################################
# datatype = h (fp16), sparse A
  -
    - # ProblemType, TN
      OperationType: GEMM
      DataType: h
      DestDataType: s
      ComputeDataType: s
      HighPrecisionAccumulate:  True
      TransposeA: True
      TransposeB: False
      UseBeta: True
      Batched: True
      Activation: False
      SupportUserArgs: True
      UseBias: 0
      Sparse: 1

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          # - [16, 16, 64, 1,  1,  1, 1,  1, 1]
          - [16, 16, 64, 1,  1,  1, 1,  2, 2]
          - [16, 16, 64, 1,  1,  2, 2,  2, 2]
        # - DepthU: [128]
        - DepthU: [64, 128]
        - TransposeLDS: [-1]
        - LdsPadA: [0]
        - LdsPadB: [0]
        - LdsBlockSizePerPadA: [0]
        - LdsBlockSizePerPadB: [0]
        - LdsPadMetadata: [0]
        - LDSTrInst: [False]
        - TDMInst: [3]
        - StaggerU: [0]
        - ScheduleIterAlg: [0]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ClusterLocalRead: [0]
        - StoreRemapVectorWidth: [0]
        - GlobalSplitU: [1]
        - GlobalSplitUAlgorithm: [MultipleBuffer]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        - VectorWidthA: [-1]
        - VectorWidthB: [-1]
        - LocalReadVectorWidth: [-1]
        - 1LDSBuffer: [0]
        - SourceSwap: [0]
        - DirectToVgprSparseMetadata: [0]
        - WorkGroupMapping: [1]
        - StoreVectorWidth: [-1]
        - DirectToVgprA: [False]
        - DirectToVgprB: [False]
        - WavefrontSize: [32]
        - ExpandPointerSwap: [1]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          # - Exact: [256, 256, 1, 1024]
          # - Exact: [16, 16, 1, 64]
          - Exact: [32, 32, 1, 64]
          # - Exact: [32, 32, 1, 128]
          - Exact: [64, 64, 1, 128]
          - Exact: [128, 128, 1, 256]
        - ActivationArgs:
          - [Enum: none]

