TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported by arch
GlobalParameters:
  NumElementsToValidate: -1
  KernelTime: False
  NewClient: 2
  BoundsCheck: False
  PrintSolutionRejectionReason: True
  ValidationMaxToPrint: 4      # maximum number of mismatches to print
  ValidationPrintValids: False # print matches too
  PruneSparseMode: 0
  # DataInitTypeA: 1
  # DataInitTypeB: 8
  # DataInitTypeD: 0
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  # PrintTensorA: 1
  # PrintTensorB: 1
  # PrintTensorC: 0
  # PrintTensorD: 1
  # PrintTensorRef: 1
  NumWarmups: 0
  EnqueuesPerSync: 1
  PrintWinnersOnly: False
  # MinKForGSU: 1
  Architecture: gfx1250
  CpuThreads: 1
  KeepBuildTmp: True
  PrintLevel: 2
  # UseGPUTimer: False
  ForceGenerateKernel: [True]
  ROCmAgentEnumeratorPath: rocm_agent_enumerator

BenchmarkProblems:
########################################################
# ProblemType, TN, sparse A (Sparse=1)
########################################################
  -
    - 
      OperationType: GEMM
      DataType: h
      DestDataType: s
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: True
      TransposeB: False
      UseBeta: True
      Batched: True
      Activation: False
      SupportUserArgs: True
      UseBias: 0
      Sparse: 1

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          # - [16, 16, 64, 1,  1,  1, 1,  1, 1 ]  # 16x16
          - [16, 16, 64, 1,  1,  1, 1,  2, 2 ]  # 32x32
          - [16, 16, 64, 1,  1,  2, 2,  2, 2 ]  # 64x64
        - DepthU: [64]
        - TransposeLDS: [-1]
        - LdsPadA: [0]
        - LdsPadB: [0]
        - LdsBlockSizePerPadA: [0]
        - LdsBlockSizePerPadB: [0]
        - LdsPadMetadata: [0]
        - LDSTrInst: [False]
        - TDMInst: [3]
        - StaggerU: [0]
        - ScheduleIterAlg: [0]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ClusterLocalRead: [0]
        - StoreRemapVectorWidth: [0]
        - GlobalSplitU: [1]
        - GlobalSplitUAlgorithm: [MultipleBuffer]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        - VectorWidthA: [-1]
        - VectorWidthB: [-1]
        - LocalReadVectorWidth: [8]
        - 1LDSBuffer: [0]
        - SourceSwap: [0]
        - DirectToVgprSparseMetadata: [0]
        - WorkGroupMapping: [1]
        - StoreVectorWidth: [-1]
        - DirectToVgprA: [False]
        - DirectToVgprB: [False]
        - WavefrontSize: [32]
        - ExpandPointerSwap: [0]
        - GroupLoadStore: [False]
        - ClusterDim: [[1, 1], [2, 2], [2, 3]]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [128, 192, 1, 256]
        - ActivationArgs:
          - [Enum: none]

########################################################
# ProblemType, TN, sparse B (Sparse=2)
########################################################
  -
    - 
      OperationType: GEMM
      DataType: h
      DestDataType: s
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: True
      TransposeB: False
      UseBeta: True
      Batched: True
      Activation: False
      SupportUserArgs: True
      UseBias: 0
      Sparse: 2
      MetadataLayout: 1

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          # - [16, 16, 64, 1,  1,  1, 1,  1, 1 ]  # 16x16
          - [16, 16, 64, 1,  1,  1, 1,  2, 2 ]  # 32x32
          - [16, 16, 64, 1,  1,  2, 2,  2, 2 ]  # 64x64
        - DepthU: [64]
        - TransposeLDS: [-1]
        - LdsPadA: [0]
        - LdsPadB: [0]
        - LdsBlockSizePerPadA: [0]
        - LdsBlockSizePerPadB: [0]
        - LdsPadMetadata: [0]
        - LDSTrInst: [False]
        - TDMInst: [3]
        - StaggerU: [0]
        - ScheduleIterAlg: [0]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ClusterLocalRead: [0]
        - StoreRemapVectorWidth: [0]
        - GlobalSplitU: [1]
        - GlobalSplitUAlgorithm: [MultipleBuffer]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        - VectorWidthA: [-1]
        - VectorWidthB: [-1]
        - LocalReadVectorWidth: [8]
        - 1LDSBuffer: [0]
        - SourceSwap: [1]
        - DirectToVgprSparseMetadata: [0]
        - WorkGroupMapping: [1]
        - StoreVectorWidth: [-1]
        - DirectToVgprA: [False]
        - DirectToVgprB: [False]
        - WavefrontSize: [32]
        - ExpandPointerSwap: [0]
        - GroupLoadStore: [False]
        - ClusterDim: [[1, 1], [2, 2], [2, 3]]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [128, 192, 1, 256]
        - ActivationArgs:
          - [Enum: none]
