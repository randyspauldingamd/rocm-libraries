TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported yet
GlobalParameters:
  SyncsPerBenchmark: 0
  NumElementsToValidate: -1
  KernelTime: True
  NewClient: 2
  BoundsCheck: False
  PrintSolutionRejectionReason: True
  PrintWinnersOnly: True
  ValidationMaxToPrint: 4      # maximum number of mismatches to print
  ValidationPrintValids: False # print matches too
  # DataInitValueActivationArgs: [0.5, -1]
  Architecture: gfx1250
  # DataInitTypeBeta: 0
  # DataInitTypeAlpha: 1
  # DataInitTypeBias: 0
  # DataInitTypeA: 1
  # DataInitTypeB: 2
  # DataInitTypeScaleAlphaVec: 1
  # PruneSparseMode: 1
  # PrintTensorA: 1
  # PrintTensorB: 1
  # PrintTensorC: 0
  # PrintTensorD: 1
  # PrintTensorRef: 1
  # GenerateSourcesAndExit: True

BenchmarkProblems:
  #######################################
  # NN - standard
  #######################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: b8f8
      DestDataType: s
      ComputeDataType: s
      HighPrecisionAccumulate:  True
      TransposeA: False
      TransposeB: False
      UseBeta: True
      UseBias: 3
      Batched: True
      Activation: True
      ActivationType: all
      UseScaleAlphaVec: 3
      Sparse: 2
      MetadataLayout: 0

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 128, 1, 1, 1, 1, 1, 1]
          # - [16, 16, 128, 1, 1, 1, 1, 2, 2]
          # - [16, 16, 128, 1, 1, 1, 3, 2, 2]
          - [16, 16, 128, 1, 1, 2, 2, 2, 2]
          # - [16, 16, 128, 1, 1, 2, 1, 1, 4]
          - [16, 16, 128, 1, 1, 4, 4, 2, 2]
          # - [16, 16, 128, 1, 1, 7, 2, 2, 2]
          # - [16, 16, 128, 1, 1, 8, 8, 2, 2]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ClusterLocalRead: [1]        
        - DepthU: [128, 256]
        - WavefrontSize: [32] # from 64 -> 32 !!!
        - ScheduleIterAlg: [3]
        - TransposeLDS: [-1]
        - SourceSwap: [1]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - LdsPadMetadata: [-1]
        - GlobalSplitU: [1, 2]
        - GlobalSplitUAlgorithm: [MultipleBuffer]
        - 1LDSBuffer: [-1, 1]
        # - VectorWidthA: [1, 2, 4, 8]
        # - VectorWidthB: [1, 2, 4, 8]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        - LDSTrInst: [True, False]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          # - Exact: [16, 16, 1, 32] # classic format
          - Exact: [16, 16, 1, 64] # classic format
          - Exact: [16, 16, 1, 256] # classic format
          # - Exact: [24, 24, 1, 48] # classic format
          - Exact: [128, 128, 1, 128] # classic format
          # - Exact: [256, 256, 1, 16] # classic format
          # - Exact: [256, 256, 1, 32] # classic format
        - BiasTypeArgs: ['s']
        - FactorDimArgs: [0]
        - ActivationArgs:
          - [Enum: none]
          # - [Enum: relu]