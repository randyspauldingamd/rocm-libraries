TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201, skip-gfx1250] # not supported by arch

GlobalParameters:
  SyncsPerBenchmark: 0
  NumElementsToValidate: -1
  BoundsCheck: 0
  KernelTime: False
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  DataInitTypeA: 12
  DataInitTypeB: 13
  DataInitTypeC: 12
  MaxWorkspaceSize: 134217728
  NumWarmups: 0
  EnqueuesPerSync: 1
  SleepPercent: 50

BenchmarkProblems:

  - # SGEMM NT, StreamK force DP-only persistent mode
    - # ProblemType
      OperationType: GEMM
      DataType: s
      TransposeA: False
      TransposeB: True
      UseBeta: True
      Batched: True

    - # Force StreamK to use persistent DP only, with no SK region
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
        - PrefetchLocalRead: [1]
      ForkParameters:
        - 1LDSBuffer: [1]
        - DepthU: [16]
        - ExpandPointerSwap: [False]
        - GlobalReadVectorWidthA: [1]
        - GlobalReadVectorWidthB: [1]
        - GlobalSplitU: [0]
        - LocalReadVectorWidth: [1]
        - MatrixInstruction:
          - [16, 16, 4, 1, 1, 1,1, 2,2]
        - MIArchVgpr: [False]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [3]
        - SourceSwap: [True]
        - StoreRemapVectorWidth: [0]
        - StreamK: [3]
        - StreamKForceDPOnly: [1]
        - TransposeLDS: [0]
        - VectorWidthA: [1]
        - VectorWidthB: [1]
        - WorkGroupMapping: [1]

      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [1025, 1025, 1, 257]
