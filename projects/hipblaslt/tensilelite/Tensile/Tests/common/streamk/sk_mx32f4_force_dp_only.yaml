TestParameters:
  marks: [skip-gfx1250, skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201]

GlobalParameters:
  NumElementsToValidate: -1
  MinimumRequiredVersion: 5.0.0
  PrintLevel: 1
  Device: 0
  KernelTime: False
  MaxWorkspaceSize: 13421772800
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeC: 0
  DataInitTypeMXSA: 3
  DataInitTypeMXSB: 3
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  BoundsCheck: 0
  MaxFileName: 128
  DeviceLDS: 163840
  MaxLDS: 163840
  MXScaleFormat: 1

BenchmarkProblems:
  - # MXFP4 SGEMM, StreamK force DP-only persistent mode
    - # ProblemType
      OperationType: GEMM
      DataType: F4
      DestDataType: S
      ComputeDataType: S
      HighPrecisionAccumulate: True
      MXBlockA: 32
      MXBlockB: 32
      TransposeA: True
      TransposeB: False
      UseBeta: True
      Batched: True
      Activation: True
      ActivationType: hipblaslt_all
      UseScaleAlphaVec: 1
      UseBias: 1
      BiasDataTypeList: [s]

    - # Force StreamK to use persistent DP only, with no SK region
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 128, 1, 1, 2,4, 2,2]
        - ForceDisableShadowInit: [False]
        - UseSgprForGRO: [0]
        - DepthU: [256]
        - AssertFree0ElementMultiple: [1]
        - AssertFree1ElementMultiple: [1]
        - AssertSummationElementMultiple: [64]
        - LocalReadVectorWidth: [32]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - PreloadKernArgs: [true]
        - ClusterLocalRead: [1]
        - VectorWidthA: [1]
        - VectorWidthB: [1]
        - GlobalReadVectorWidthA: [16]
        - GlobalReadVectorWidthB: [16]
        - ScheduleIterAlg: [3]
        - InnerUnroll: [1]
        - TransposeLDS: [1]
        - WaveSeparateGlobalReadA: [0]
        - WaveSeparateGlobalReadB: [0]
        - 1LDSBuffer: [0]
        - GlobalReadPerMfma: [1.0]
        - LocalWritePerMfma: [-1]
        - StoreVectorWidth: [-1]
        - SourceSwap: [True]
        - StreamK: [3]
        - StreamKForceDPOnly: [1]
        - UseSubtileImpl: [true]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [2049, 2049, 1, 2048]
        - BiasTypeArgs: ['s']
        - ActivationArgs:
          - [Enum: none]
