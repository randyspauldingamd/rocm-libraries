TestParameters:
  marks: [skip-gfx1250, skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201]

GlobalParameters:
  NumElementsToValidate: -1
  MinimumRequiredVersion: 5.0.0
  PrintLevel: 1
  # PrintSolutionRejectionReason: True
  Device: 0
  CMakeBuildType: Debug
#  MergeFiles: False
  KernelTime: True
  MaxWorkspaceSize: 13421772800
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeC: 0
  DataInitTypeMXSA: 3
  DataInitTypeMXSB: 3
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  NumElementsToValidate: -1
  BoundsCheck: 0
  KeepBuildTmp: True
  MaxFileName: 128
  DeviceLDS: 163840
  MaxLDS: 163840
  MXScaleFormat: 1

BenchmarkProblems:
  ########################################
  # FP4SS
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: F4
      DestDataType: S
      ComputeDataType: S
      HighPrecisionAccumulate: True
      MXBlockA: 32
      MXBlockB: 32
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      Batched: True
      Activation: True
      ActivationType: hipblaslt_all
#      UseScaleAB: "Scalar"
#      UseScaleCD: True
      UseScaleAlphaVec: 1
      UseBias: 1
      BiasDataTypeList: [s]

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          # - [16, 16, 128, 1, 1, 1,1, 1,1]
          # - [16, 16, 128, 1, 1, 4,2, 2,2]
          - [16, 16, 128, 1, 1, 2,4, 2,2] # 64x128
          # - [16, 16, 128, 1, 1, 8,8, 2,2]
          # - [32, 32,  64, 1, 1, 1,1, 1,1]
          - [32, 32,  64, 1, 1, 2,2, 2,2] # 128x128
          # - [32, 32,  64, 1, 1, 4,2, 2,2]
          # - [32, 32,  64, 1, 1, 2,4, 2,2]
        - ForceDisableShadowInit: [True, False]
        # - UseSgprForGRO: [0,1]
        - UseSgprForGRO: [0]
        # - DepthU: [64, 128]
        - DepthU: [256]
        - AssertFree0ElementMultiple: [1]
        - AssertFree1ElementMultiple: [1]
        - AssertSummationElementMultiple: [64]
        - LocalReadVectorWidth: [32]
        # - PrefetchGlobalRead: [0,1,2]
        - PrefetchGlobalRead: [2]
        # - PrefetchLocalRead: [0,1]
        - PrefetchLocalRead: [1]
        # - PreloadKernArgs: [0,1]
        - PreloadKernArgs: [1]
        # - ClusterLocalRead: [0,1]
        - ClusterLocalRead: [1]
        - VectorWidthA: [1]
        - VectorWidthB: [1]
        - GlobalReadVectorWidthA: [16]
        - GlobalReadVectorWidthB: [16]
        - ScheduleIterAlg: [3]
        - InnerUnroll: [1]
        - TransposeLDS: [1]
        - WaveSeparateGlobalReadA: [0]
        - WaveSeparateGlobalReadB: [0]
        - 1LDSBuffer: [0]
        - GlobalReadPerMfma: [1]
        - LocalWritePerMfma: [-1]
        - StoreVectorWidth: [-1]
        - SourceSwap: [1]
        - StreamK: [3]
        - UseSubtileImpl: [1] # TODO: enable subtile
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [1025, 513, 1, 2048]
          - Exact: [1044, 532, 1, 2048]
          - Exact: [127, 127, 1, 640] #special cleanup case
          - Exact: [128, 128, 1, 128]
          - Exact: [129, 129, 1, 640]
        - BiasTypeArgs: ['s']
        - ActivationArgs:
          - [Enum: none]
