TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201, skip-gfx1250] # gfx950 only

GlobalParameters:
  SyncsPerBenchmark: 0
  NumElementsToValidate: -1
  BoundsCheck: False
  KernelTime: False
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  DataInitTypeA: 12
  DataInitTypeB: 13
  DataInitTypeC: 12
  DataInitTypeMXSA: 3
  DataInitTypeMXSB: 3
  MaxWorkspaceSize: 134217728
  NumWarmups: 0
  EnqueuesPerSync: 1
  SleepPercent: 50
  MXScaleFormat: 1
  PrintSolutionRejectionReason: True

BenchmarkProblems:
  - # MXFP4 GEMM TN
    - # ProblemType
      OperationType: GEMM
      DataType: F4
      DestDataType: S
      ComputeDataType: S
      HighPrecisionAccumulate: True
      MXBlockA: 32
      MXBlockB: 32
      TransposeA: True
      TransposeB: False
      UseBeta: True
      Batched: True

    - # MXFP4 GEMM TN - Dynamic Stream-K
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - 1LDSBuffer: [0]
        - AssertFree0ElementMultiple: [1]
        - AssertFree1ElementMultiple: [1]
        - AssertSummationElementMultiple: [64]
        - ClusterLocalRead: [1]
        - DepthU: [256]
        - ForceDisableShadowInit: [True]
        - GlobalReadPerMfma: [1]
        - GlobalReadVectorWidthA: [16]
        - GlobalReadVectorWidthB: [16]
        - GlobalSplitU: [0]
        - InnerUnroll: [1]
        - LocalReadVectorWidth: [32]
        - LocalWritePerMfma: [-1]
        - MatrixInstruction:
          - [16, 16, 128, 1, 1, 2,4, 2,2]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - PreloadKernArgs: [True]
        - ScheduleIterAlg: [3]
        - SourceSwap: [1]
        - StoreVectorWidth: [-1]
        - StreamK: [4]
        - TransposeLDS: [1]
        - UseSgprForGRO: [0]
        - UseSubtileImpl: [1]
        - VectorWidthA: [1]
        - VectorWidthB: [1]
        - WaveSeparateGlobalReadA: [0]
        - WaveSeparateGlobalReadB: [0]
        - WorkGroupMapping: [1]

      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [1025, 513, 1, 2048]
          - Exact: [4103, 4103, 1, 2048]
