TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201, skip-gfx1250] # not supported by arch
 
GlobalParameters:
  NumElementsToValidate: 128
  BoundsCheck: False
  KernelTime: False
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  DataInitTypeA: 12
  DataInitTypeB: 13
  DataInitTypeC: 12
  # DataInitTypeC: 1
  # ValidationPrintValids: True
  MaxWorkspaceSize: 134217728
  # PrintSolutionRejectionReason: True
  # ForceGenerateKernel: True
  # GenerateSourcesAndExit: True
  NumWarmups: 0
  EnqueuesPerSync: 1
  # NumBenchmarks: 10
  SleepPercent: 50

BenchmarkProblems:

  - # BGEMM NT
    - # ProblemType
      OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: False
      TransposeB: True
      UseBeta: True
      Batched: True

    # BGEMM NT - Test tile index calculation
    # Rounding error in tile index occurred in problem with large total iteration count and partial tiles
    # This test should be run at 255 or 510 WGs (510 currently selected at launch time)
    # TODO encode launch grid in test file for future-proofing
    -
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
        - PrefetchLocalRead: [True]
      ForkParameters:
        - 1LDSBuffer: [1]
        - DepthU: [ 32 ]
        - ExpandPointerSwap: [False]
        - GlobalReadVectorWidthA: [8]
        - GlobalReadVectorWidthB: [8]
        - GlobalSplitU: [0]
        # - LocalReadVectorWidth: [8]
        - MatrixInstruction:
          - [16, 16, 32, 1, 1, 4,6, 2,2]
        - MIArchVgpr: [0]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [3]
        - SourceSwap: [True]
        - StoreRemapVectorWidth: [0]
        # - StoreVectorWidth: [4]
        - StreamK: [3]
        - TransposeLDS: [0]
        # - VectorWidthA: [4]
        # - VectorWidthB: [4]
        - WorkGroupMapping: [1]

      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [8192, 57344, 1, 28672]
          # - Exact: [512, 512, 1, 512]
