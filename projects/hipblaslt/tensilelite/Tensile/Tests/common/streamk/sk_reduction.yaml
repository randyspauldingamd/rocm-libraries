GlobalParameters:
  NumElementsToValidate: -1
  BoundsCheck: False
  KernelTime: False
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  DataInitTypeA: 12
  DataInitTypeB: 13
  DataInitTypeC: 12
  # DataInitTypeC: 1
  # ValidationPrintValids: True
  MaxWorkspaceSize: 134217728
  # PrintSolutionRejectionReason: True
  # ForceGenerateKernel: True
  # GenerateSourcesAndExit: True
  NumWarmups: 0
  EnqueuesPerSync: 1
  # NumBenchmarks: 10
  SleepPercent: 50

BenchmarkProblems:
  - # Large-k test
    - # HHS NT
      OperationType: GEMM
      DataType: h
      DestDataType: h
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: False
      TransposeB: True
      UseBeta: True
      Batched: True

    - # Grid
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ['Assembly']
      ForkParameters:
        - MatrixInstruction:
          - [16,16,32,1, 1, 8,8, 2,2]
        - 1LDSBuffer: [-1]
        - ClusterLocalRead: [True]
        - DepthU: [32]
        - ExpandPointerSwap: [0]
        - GlobalReadVectorWidthA: [4]
        - GlobalReadVectorWidthB: [8]
        # - LdsBlockSizePerPadA: [-1]
        # - LdsBlockSizePerPadB: [-1]
        # - LdsPadA: [0]
        # - LdsPadB: [0]
        - LocalReadVectorWidth: [8]
        # - NonTemporalC: [0, 3, 4, 7]
        # - NonTemporalD: [0, 3, 4, 7]
        # - NumElementsPerBatchStore: [0, 16]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [3]
        - SourceSwap: [True]
        - StaggerU: [0]
        # - StaggerU: [0, 32]
        # - StaggerUStride: [-1]
        # - StaggerUMapping: [0, 1, 3]
        # - StorePriorityOpt: [False, True]
        # - StoreRemapVectorWidth: [0, 1, 2, 4, 8]
        - StoreVectorWidth: [-1]
        - StreamK: [3]
        - StreamKFixupTreeReduction: [0, 1]
        # - StreamKXCCMapping: [8]
        - TransposeLDS: [-1]
        # - UnrollLoopSwapGlobalReadOrder: [0, 1]
        - UseSgprForGRO: [0]
        # - VectorWidthA: [1, 2, 4, 8]
        # - VectorWidthB: [1, 2, 4, 8]
        # - WaveSeparateGlobalReadA: [0, 1]
        # - WaveSeparateGlobalReadB: [0, 1]
        - WorkGroupMapping: [6]
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [256, 256, 1, 65536]
          - Exact: [512, 256, 1, 65536]
          - Exact: [256, 512, 1, 65536]
          - Exact: [263, 263, 1, 65543]
          - Exact: [519, 263, 1, 65543]
          - Exact: [263, 519, 1, 65543]

