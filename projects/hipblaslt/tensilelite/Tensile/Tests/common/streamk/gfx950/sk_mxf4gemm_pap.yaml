TestParameters:
  marks: [skip-gfx1250, skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201]

GlobalParameters:
  NumElementsToValidate: -1
  MinimumRequiredVersion: 5.0.0
  PrintLevel: 1
  Device: 0
  CMakeBuildType: Debug
  KernelTime: True
  MaxWorkspaceSize: 13421772800
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeC: 0
  DataInitTypeMXSA: 3
  DataInitTypeMXSB: 3
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  BoundsCheck: 0
  KeepBuildTmp: True
  MXScaleFormat: 1

BenchmarkProblems:
  ########################################
  # FP4SS - known-good Subtile MX shape with PAP enabled
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: F4
      DestDataType: S
      ComputeDataType: S
      HighPrecisionAccumulate: True
      MXBlockA: 32
      MXBlockB: 32
      TransposeA: true
      TransposeB: false
      UseBeta: True
      Batched: True
      Activation: False
      UseBias: 0

    - # BenchmarkProblemSizeGroup
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 128, 1, 1, 2, 4, 2, 2]
          - [32, 32,  64, 1, 1, 2, 2, 2, 2]
        - ForceDisableShadowInit: [True, False]
        - UseSgprForGRO: [0, 1]
        - DepthU: [256]
        - AssertFree0ElementMultiple: [1]
        - AssertFree1ElementMultiple: [1]
        - AssertSummationElementMultiple: [64]
        - LocalReadVectorWidth: [32]
        - PrefetchAcrossPersistent: [1]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - PreloadKernArgs: [true]
        - ClusterLocalRead: [1]
        - VectorWidthA: [1]
        - VectorWidthB: [1]
        - GlobalReadVectorWidthA: [16]
        - GlobalReadVectorWidthB: [16]
        - ScheduleIterAlg: [3]
        - InnerUnroll: [1]
        - TransposeLDS: [1]
        - WaveSeparateGlobalReadA: [0]
        - WaveSeparateGlobalReadB: [0]
        - 1LDSBuffer: [0]
        - DirectToLds: [0, 1, 2, 3]
        - DirectToVgprA: [False]
        - DirectToVgprB: [False]
        - DirectToVgprMXSA: [False]
        - DirectToVgprMXSB: [False]
        - GlobalReadPerMfma: [1.0]
        - LocalWritePerMfma: [-1]
        - StoreVectorWidth: [-1]
        - SourceSwap: [true]
        - StaggerU: [0, 32]
        - StaggerUStride: [256]
        - WorkGroupMapping: [1, 8]
        - StreamK: [3]
        - StreamKForceDPOnly: [0, 1]
        - UseSubtileImpl: [true]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [4096, 2048, 1, 256]
          - Exact: [4104, 2056, 1, 256]
        - ActivationArgs:
          - [Enum: none]
