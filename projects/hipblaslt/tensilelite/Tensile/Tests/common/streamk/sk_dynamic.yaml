TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201, skip-gfx1250] # not supported by arch

GlobalParameters:
  SyncsPerBenchmark: 0
  NumElementsToValidate: -1
  BoundsCheck: False
  KernelTime: False
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  DataInitTypeA: 12
  DataInitTypeB: 13
  DataInitTypeC: 12
  # DataInitTypeC: 1
  # ValidationPrintValids: True
  MaxWorkspaceSize: 134217728
  # PrintSolutionRejectionReason: True
  # ForceGenerateKernel: True
  # GenerateSourcesAndExit: True
  NumWarmups: 0
  EnqueuesPerSync: 1
  # NumBenchmarks: 10
  SleepPercent: 50

BenchmarkProblems:

  - # SGEMM NT
    - # ProblemType
      OperationType: GEMM
      DataType: s
      TransposeA: False
      TransposeB: True
      UseBeta: True
      Batched: True

    - # SGEMM NT - Test MatrixInstruction variants
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
        - PrefetchLocalRead: [True]
      ForkParameters:
        - 1LDSBuffer: [1]
        - DepthU: [ 16 ]
        - ExpandPointerSwap: [False]
        - GlobalReadVectorWidthA: [1]
        - GlobalReadVectorWidthB: [1]
        - GlobalReadPerMfma: [1.0]
        - GlobalSplitU: [0]
        - LocalReadVectorWidth: [1]
        - MatrixInstruction:
          - [32, 32, 2, 1, 1, 4,4, 2,2]
          - [32, 32, 2, 1, 1, 3,3, 2,2]
          - [32, 32, 2, 1, 1, 2,2, 2,2]
          - [32, 32, 2, 1, 1, 1,1, 2,2]
          - [16, 16, 4, 1, 1, 8,8, 2,2]
          - [16, 16, 4, 1, 1, 8,4, 2,2]
          - [16, 16, 4, 1, 1, 8,2, 2,2]
          - [16, 16, 4, 1, 1, 8,1, 2,2]
          - [16, 16, 4, 1, 1, 4,8, 2,2]
          - [16, 16, 4, 1, 1, 4,4, 2,2]
          - [16, 16, 4, 1, 1, 4,2, 2,2]
          - [16, 16, 4, 1, 1, 4,1, 2,2]
          - [16, 16, 4, 1, 1, 2,8, 2,2]
          - [16, 16, 4, 1, 1, 2,4, 2,2]
          - [16, 16, 4, 1, 1, 2,2, 2,2]
          - [16, 16, 4, 1, 1, 2,1, 2,2]
          - [16, 16, 4, 1, 1, 1,8, 2,2]
          - [16, 16, 4, 1, 1, 1,4, 2,2]
          - [16, 16, 4, 1, 1, 1,2, 2,2]
          - [16, 16, 4, 1, 1, 1,1, 2,2]
        - MIArchVgpr: [False]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [3]
        - SourceSwap: [True]
        - StoreRemapVectorWidth: [0]
        # - StoreVectorWidth: [4]
        - StreamK: [4]
        - TransposeLDS: [0]
        - VectorWidthA: [1]
        - VectorWidthB: [1]
        - WorkGroupMapping: [1]

      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [512, 512, 1, 512]
          # - Exact: [4096, 4096, 1, 1024]
          # - Exact: [4103, 4096, 1, 1024]
          # - Exact: [4096, 4103, 1, 1024]
          # - Exact: [4096, 4096, 1, 1031]
          - Exact: [4103, 4103, 1, 1031]
          - Exact: [512, 512, 2, 128]

  - # HGEMM NT
