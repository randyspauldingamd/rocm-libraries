TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201]

GlobalParameters:
  NumElementsToValidate: -1
  BoundsCheck: 0
  KernelTime: False
  CpuThreads: 32
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  DataInitTypeA: 12
  DataInitTypeB: 13
  DataInitTypeC: 12
  Architecture: gfx1250
  PrintLevel: 2
  ISA: [[12, 5, 0]]

BenchmarkProblems:
  #######################################
  # SGEMM NT - StreamK PAP prefetch
  #######################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: s
      TransposeA: False
      TransposeB: True
      UseBeta: True
      Batched: True

    - # Non-TDM PAP prefetch
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
        - PrefetchLocalRead: [1]
      ForkParameters:
        - StreamK: [3]
        - StreamKForceDPOnly: [0, 1]
        - GlobalSplitU: [0]
        - WavefrontSize: [32]
        - DepthU: [64]
        - 1LDSBuffer: [-1]
        - TDMInst: [0]
        - DirectToLds: [0, 1]
        - ExpandPointerSwap: [False]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        - MatrixInstruction:
          - [16, 16, 4, 1, 1, 1, 1, 1, 2]
        - MIArchVgpr: [false]
        - PrefetchAcrossPersistent: [1]
        - PrefetchGlobalRead: [1, 2]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [3]
        - SourceSwap: [True]
        - StoreRemapVectorWidth: [0]
        - TransposeLDS: [0]
        - VectorWidthA: [1]
        - VectorWidthB: [1]
        - WorkGroupMapping: [1, 8]
        - DirectToVgprA: [False]
        - DirectToVgprB: [False]
        - UseSgprForGRO: [0, 1]
        - StaggerU: [0]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [512, 512, 1, 256]
          - Exact: [520, 520, 1, 256]

    - # TDM PAP prefetch
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
        - PrefetchLocalRead: [1]
      ForkParameters:
        - StreamK: [3]
        - StreamKForceDPOnly: [0, 1]
        - GlobalSplitU: [0]
        - WavefrontSize: [32]
        - DepthU: [64]
        - 1LDSBuffer: [-1]
        - TDMInst: [3]
        - DirectToLds: [0]
        - ExpandPointerSwap: [False]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        - MatrixInstruction:
          - [16, 16, 4, 1, 1, 1, 1, 1, 2]
        - MIArchVgpr: [false]
        - PrefetchAcrossPersistent: [1]
        - PrefetchGlobalRead: [1, 2]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [0]
        - SourceSwap: [True]
        - StoreRemapVectorWidth: [0]
        - TransposeLDS: [0]
        - VectorWidthA: [1]
        - VectorWidthB: [1]
        - WorkGroupMapping: [1, 8]
        - DirectToVgprA: [False]
        - DirectToVgprB: [False]
        - StaggerU: [0]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [512, 512, 1, 256]
          - Exact: [520, 520, 1, 256]
