TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201, skip-gfx1250] # not supported by arch

GlobalParameters:
  NumElementsToValidate: -1
  BoundsCheck: False
  KernelTime: False
  CpuThreads: 32
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeC: 3
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  DataInitTypeBias: 3
  DataInitTypeScaleA: 2
  DataInitTypeScaleB: 2
  DataInitTypeScaleC: 1
  DataInitTypeScaleD: 2
  DataInitTypeScaleAlphaVec: 21
  MaxWorkspaceSize: 134217728
  # PrintSolutionRejectionReason: True
  ISA: [[12, 5, 0]]

BenchmarkProblems:
  - # F8SS NN
    -
      OperationType: GEMM
      DataType: F8
      DestDataType: S
      ComputeDataType: S
      HighPrecisionAccumulate: True
      TransposeA: 0
      TransposeB: 0
      UseBeta: True
      Batched: True
      Activation:    True
    -
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - 1LDSBuffer: [-1]
        - ClusterLocalRead: [1]
        - DepthU: [ 128 ]
        - ExpandPointerSwap: [1]
        - GlobalReadPerMfma: [1]
        - GlobalReadVectorWidthA: [4]
        - GlobalReadVectorWidthB: [4]
        - GlobalSplitU: [0]
        - InnerUnroll: [1]
        - MatrixInstruction:
          - [16, 16, 64, 1, 1, 1,1, 1,2]
          - [16, 16, 64, 1, 1, 1,1, 2,1]
          - [16, 16, 128, 1, 1, 1,1, 1,2]
          - [16, 16, 128, 1, 1, 1,1, 2,1]
        - LdsBlockSizePerPadA: [0]
        - LdsBlockSizePerPadB: [0]
        - LdsPadA: [0]
        - LdsPadB: [0]
        - LocalWritePerMfma: [-1]
        - NumElementsPerBatchStore: [0]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [3]
        - SourceSwap: [1]
        - StorePriorityOpt: [0]
        - StoreVectorWidth: [-1]
        - StreamK: [3]
        - VectorWidthA: [1]
        - VectorWidthB: [1]
        - WavefrontSize: [32]
        - WaveSeparateGlobalReadB: [1]
        - WorkGroupMapping: [-4, 1, 4]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [127, 127, 1, 1024]
          - Exact: [128, 128, 1, 1024]
          - Exact: [129, 129, 1, 1024]
          - Exact: [511, 511, 1, 1024]
          - Exact: [512, 512, 1, 1024]
          - Exact: [513, 513, 1, 1024]
          - Exact: [127,   128, 1, 640]
          - Exact: [128,   128, 1, 640]
          - Exact: [129,   128, 1, 640]
          # - Exact: [1024, 1024, 1, 1024]
          # - Exact: [4096, 1024, 1, 1024]
          # - Exact: [1024, 4096, 1, 1024]
          # - Exact: [1024, 1024, 1, 4096]
          # - Exact: [4096, 4096, 1, 4096]
          # - Exact: [4111, 4096, 1, 4096]
          # - Exact: [4096, 4111, 1, 4096]
          # - Exact: [4096, 4096, 1, 4111]
          # - Exact: [4111, 4111, 1, 4111]
          # - Exact: [1024, 1024, 1, 512]
        - BiasTypeArgs: ['s']
        - ActivationArgs:
          - [Enum: none]
