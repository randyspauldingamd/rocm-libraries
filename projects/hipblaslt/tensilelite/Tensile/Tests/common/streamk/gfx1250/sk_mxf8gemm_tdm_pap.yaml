        - LdsBlockSizePerPadMXSB: [-1]
        - LdsPadMetadata: [0]
        - LDSTrInst: [False]
        - TDMInst: [3]
        - PrefetchAcrossPersistent: [1]
        - PrefetchGlobalRead: [1, 2]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [0]
        - SourceSwap: [false]
        - StoreRemapVectorWidth: [0]
        - GlobalSplitU: [0]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        - ExpandPointerSwap: [false]
        - VectorWidthA: [-1]
        - VectorWidthB: [-1]
        - LocalReadVectorWidth: [-1]
        - 1LDSBuffer: [0]
        - DirectToVgprSparseMetadata: [false]
        - StoreVectorWidth: [-1]
        - StreamK: [3]
        - StreamKForceDPOnly: [0, 1]
        - StaggerU: [0]
        - DirectToVgprA: [False]
        - DirectToVgprB: [False]
        - WavefrontSize: [32]
        - WorkGroupMapping: [1, 8]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
