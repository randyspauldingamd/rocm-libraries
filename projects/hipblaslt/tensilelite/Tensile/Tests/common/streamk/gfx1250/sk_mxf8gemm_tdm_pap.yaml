TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported by arch
GlobalParameters:
  NumElementsToValidate: -1
  BoundsCheck: 0
  KernelTime: False
  CpuThreads: 32
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeD: 2
  DataInitTypeMXSA: 3
  DataInitTypeMXSB: 3
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  Architecture: gfx1250
  PrintLevel: 2
  PrintSolutionRejectionReason: True
  ForceGenerateKernel: True
  ISA: [[12, 5, 0]]

BenchmarkProblems:
  #######################################
  # TN - TDM + PrefetchAcrossPersistent
  #######################################
  -
    - # ProblemType, TN
      OperationType: GEMM
      DataType: F8
      DestDataType: s
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: True
      TransposeB: False
      UseBeta: True
      Batched: True
      Activation: True
      SupportUserArgs: True
      UseBias: 0
      MXBlockA: 32
      MXBlockB: 32

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - UseSgprForGRO: [0]
        - ForceDisableShadowInit: [true]
        - MatrixInstruction:
          - [16, 16, 128, 1,  1,  1, 1,  2, 2]
          - [16, 16, 128, 1,  1,  2, 2,  2, 2]
          - [16, 16, 128, 1,  1,  4, 4,  2, 2]
