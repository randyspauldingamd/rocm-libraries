TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201, skip-gfx1250] # not supported by arch

GlobalParameters:
  NumElementsToValidate: -1
  BoundsCheck: False
  CpuThreads: 32
  KernelTime: False
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  DataInitTypeA: 12
  DataInitTypeB: 13
  DataInitTypeC: 12
  # DataInitTypeC: 1
  # ValidationPrintValids: True
  MaxWorkspaceSize: 134217728
  # PrintSolutionRejectionReason: True
  # ForceGenerateKernel: True
  # GenerateSourcesAndExit: True
  NumWarmups: 0
  EnqueuesPerSync: 1
  # NumBenchmarks: 10
  SleepPercent: 50
  ISA: [[12, 5, 0]]


BenchmarkProblems:

  - # HGEMM NT
    - # ProblemType
      OperationType: GEMM
      DataType: h
      DestDataType: h
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: False
      TransposeB: True
      UseBeta: True
      Batched: True

    - # HGEMM NT - Test MatrixInstruction variants
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
        - PrefetchLocalRead: [True]
      ForkParameters:
        - 1LDSBuffer: [-1]
        - DepthU: [ 32 ]
        - ExpandPointerSwap: [False]
        - GlobalSplitU: [0]
        - MatrixInstruction:
          - [16, 16, 32, 1, 1, 1,1, 1, 2]
          - [16, 16, 32, 1, 1, 1,1, 2, 1]
        - MIArchVgpr: [0]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [3]
        - SourceSwap: [True]
        - StoreRemapVectorWidth: [0]
        - StreamK: [3]
        - TransposeLDS: [0]
        - WavefrontSize: [32]
        - WorkGroupMapping: [1]

      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [127, 127, 1, 127]
          - Exact: [128, 128, 1, 128]
          - Exact: [129, 129, 1, 129]
          - Exact: [511, 511, 1, 511]
          - Exact: [512, 512, 1, 512]
          - Exact: [513, 513, 1, 513]
          # - Exact: [4096, 4096, 1, 1024]
          # - Exact: [4103, 4096, 1, 1024]
          # - Exact: [4096, 4103, 1, 1024]
          # - Exact: [4096, 4096, 1, 1031]
          # - Exact: [4103, 4103, 1, 1031]

    - # HGEMM NT - Test DepthU, WGM, VW
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
        - PrefetchLocalRead: [True]
      ForkParameters:
        - 1LDSBuffer: [1]
        - DepthU: [ 32, 64 ]
        - ExpandPointerSwap: [False]
        - GlobalReadVectorWidthA: [2, 4, 8]
        - GlobalReadVectorWidthB: [2, 4, 8]
        - GlobalSplitU: [0]
        - MatrixInstruction:
          # - [16, 16, 32, 1, 1, 8,8, 1,2]
          - [16, 16, 32, 1, 1, 4,4, 1,2]
        - MIArchVgpr: [0]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [3]
        - SourceSwap: [True]
        - StoreRemapVectorWidth: [0]
        # - StoreVectorWidth: [4]
        - StreamK: [3]
        - TransposeLDS: [0]
        # - VectorWidthA: [2, 4, 8]
        # - VectorWidthB: [2, 4, 8]
        - WavefrontSize: [32]
        - WorkGroupMapping: [0, 1, 2, 4, 8, 16, 32, 64] # works

      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [127, 127, 1, 127]
          - Exact: [128, 128, 1, 128]
          - Exact: [129, 129, 1, 129]
          # - Exact: [512, 512, 1, 512]
          # - Exact: [4096, 4096, 1, 1024]
          # - Exact: [4103, 4096, 1, 1024]
          # - Exact: [4096, 4103, 1, 1024]
          # - Exact: [4096, 4096, 1, 1031]
          # - Exact: [4103, 4103, 1, 1031]
          # - Exact: [2055, 2055, 1, 1031]

