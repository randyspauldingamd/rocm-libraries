################################################################################
# gfx1250 StreamK MX-FP8 -- *explicit* MXScaleFormat / MXLoadInst combos.
#
# The sibling `sk_mxf8gemm_tdm.yaml` covers TDM+InMemorySwizzle via the
# Auto-defaulting path (``MXLoadInst="Auto"`` + ``MXScaleFormat="Auto"``
# with ``TDMInst=3``). This file pins both parameters *explicitly* in
# ForkParameters, so it guards the YAML deserialization + ForkParameter
# expansion path for the string-valued MXLoadInst / MXScaleFormat parameters.
#
# NoSwizzle is not supported on gfx1250; only TDM+InMemorySwizzle is tested.
################################################################################
TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx950, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported by arch
GlobalParameters:
  NumElementsToValidate: -1
  BoundsCheck: False
  KernelTime: False
  CpuThreads: 32
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeD: 2
  DataInitTypeMXSA: 3
  DataInitTypeMXSB: 3
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 1
  Architecture: gfx1250
  PrintLevel: 2
  PrintSolutionRejectionReason: True
  ForceGenerateKernel: True
  ISA: [[12, 5, 0]]


BenchmarkProblems:
  #######################################
  # TN -- explicit TDM + InMemorySwizzle
  #######################################
  -
    - # ProblemType, TN
      OperationType: GEMM
      DataType: F8
      DestDataType: s
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: True
      TransposeB: False
      UseBeta: True
      Batched: True
      Activation: True
      SupportUserArgs: True
      UseBias: 0
      MXBlockA: 32
      MXBlockB: 32

    - # BenchmarkProblemSizeGroup
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - UseSgprForGRO: [0]
        - ForceDisableShadowInit: [1]
        - MatrixInstruction:
          - [16, 16, 128, 1,  1,  1, 1,  2, 2]
        - DepthU: [256]
        - ClusterLocalRead: [0]
        - TransposeLDS: [-1]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - LdsBlockSizePerPadA: [-1]
        - LdsBlockSizePerPadB: [-1]
        - LdsPadMXSA: [-1]
        - LdsPadMXSB: [-1]
        - LdsBlockSizePerPadMXSA: [-1]
        - LdsBlockSizePerPadMXSB: [-1]
        - LdsPadMetadata: [0]
        - LDSTrInst: [False]
        - PrefetchGlobalRead: [1]
        - PrefetchLocalRead: [1]
        - ScheduleIterAlg: [3]
        - SourceSwap: [0]
        - StoreRemapVectorWidth: [0]
        - GlobalSplitU: [0]
        - GlobalReadVectorWidthA: [-1]
        - GlobalReadVectorWidthB: [-1]
        - ExpandPointerSwap: [0]
        - VectorWidthA: [-1]
        - VectorWidthB: [-1]
        - LocalReadVectorWidth: [-1]
        - 1LDSBuffer: [0]
        - DirectToVgprSparseMetadata: [0]
        - StoreVectorWidth: [-1]
        - StreamK: [3]
        - StaggerU: [0]
        - DirectToVgprA: [False]
        - DirectToVgprB: [False]
        - WavefrontSize: [32]
        - WorkGroupMapping: [1]
        # --- the parameters under test ---
        - TDMInst: [3]
        - MXLoadInst: ["TDM"]
        - MXScaleFormat: ["InMemorySwizzle"]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [128, 128, 1, 1024]
          - Exact: [129, 129, 1, 1056]
        - ActivationArgs:
          - [Enum: none]
