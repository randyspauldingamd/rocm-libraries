[project]
name = "rocisa"
version = "0.1.0"
description = "A C++ code generator for ROCm ISA"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = []

[build-system]
requires = ["scikit-build-core>=0.10", "nanobind>=2.0"]
build-backend = "scikit_build_core.build"

[tool.scikit-build]
cmake.build-type = "Release"
cmake.args = ["-DHIPBLASLT_ENABLE_YAML=ON", "-DCMAKE_POLICY_VERSION_MINIMUM=3.5"]
# No pure-Python packages to scan; the wheel contents come entirely from
# cmake install() rules (_rocisa.so + __init__.py → rocisa/).
wheel.packages = []
# Persistent build tree so repeated editable installs recompile incrementally
# instead of from scratch. This makes the rocisa rebuild that `invoke
# build-client` triggers a fast no-op when nothing changed. {wheel_tag} keeps
# per-interpreter/ABI build trees separate.
build-dir = "build/{wheel_tag}"
