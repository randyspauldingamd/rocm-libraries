[tool.coverage.run]
branch = true
concurrency = ["multiprocessing"]
omit = [
    "*/Tests/*",
    "*/tests/*",
    "*/test_*.py",
    "*/__pycache__/*",
    "*/build_tmp/*",
    "*/build/*",
    "*/.tox/*",
    "*/site-packages/*",
    "*/conftest.py",
    "*/setup.py",
    "*/.eggs/*",
]

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false
skip_empty = true
sort = "Cover"
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "def __str__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstract",
    "@abstractmethod",
    "pass",
    "\\.\\.\\.",
]

[tool.coverage.html]
directory = "htmlcov"
title = "TensileLite Code Coverage Report"
show_contexts = true

[tool.coverage.xml]
output = "coverage.xml"

[tool.coverage.json]
output = "coverage.json"
show_contexts = true

[tool.pytest.ini_options]
# You can also move pytest config here if desired
testpaths = ["Tensile/Tests", "rocisa/test"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[project]
name = "tensile"
version = "5.0.0"
requires-python = ">=3.10"
description = "A code generation library for high-performance GEMM and tensor contraction kernels on AMD GPUs."
license = {text = "MIT"}
dependencies = [
    "packaging",
    "pyyaml",
    "msgpack",
    "joblib>=1.4.0",
    "simplejson",
    "ujson",
    "orjson",
    "yappi",
    "setuptools",
    "nanobind",
    "cmake",
    "numpy",
    "hip-python",
]

[project.scripts]
Tensile = "Tensile.Tensile:main"
TensileCreateLibrary = "Tensile.TensileCreateLibrary:run"
TensileVerifyStinkyElfText = "Tensile.verify_stinky_comment_vs_elf_text:main"
TensileGetPath = "Tensile:PrintTensileRoot"
TensileBenchmarkCluster = "Tensile.TensileBenchmarkCluster:main"
TensileRetuneLibrary = "Tensile.TensileRetuneLibrary:main"

[dependency-groups]
dev = [
    "rocisa",
    "pytest>=5.4.1",
    "pytest-xdist>=1.32.0",
    "pytest-cov",
    "filelock",
    "invoke",
]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["Tensile*"]

[tool.setuptools.package-data]
Tensile = ["cmake/*"]

[tool.uv.sources]
rocisa = { workspace = true }

[tool.uv.workspace]
members = ["rocisa"]
