[tox]
envlist = py3,lint
labels =
    static = format, isort

[testenv]
# Some versions of Pytest versions have a bug:
# https://github.com/pytest-dev/pytest/issues/5971 which causes the whole test
# process to crash if a multiprocessing job has an exception. Fixed in 5.3.3.
deps =
    cmake
    nanobind
    setuptools
    -r{toxinidir}/requirements.txt
    pytest>=5.4.1
    pytest-xdist>=1.32.0
    filelock
    invoke
setenv =
    TENSILE_CLIENT_STATIC = {env:TENSILE_CLIENT_STATIC:}
    TENSILELITE_CLIENT_ARGS = {env:TENSILELITE_CLIENT_ARGS:}
    HSA_ENABLE_SDMA = {env:HSA_ENABLE_SDMA}                     # TODO: Remove if not required
commands =
    pip install --upgrade pip
    pip install {toxinidir}/rocisa/
    pytest -v --basetemp={envtmpdir} --junit-xml={toxinidir}/rocisa_tests.xml --junit-prefix=rocisa --color=yes -n 4 {toxinidir}/rocisa/test
    pip install pytest-cov
    sh -c "ARCH=$(invoke get-gpu-arch); \
          export TENSILE_ARCHITECTURE=\$ARCH; \
          export TENSILELITE_CLIENT_ARGS='{env:TENSILELITE_CLIENT_ARGS:} --gpu-targets '$ARCH; \
          invoke build-client --build-dir {toxinidir}/build_tmp $TENSILELITE_CLIENT_ARGS; \
          pytest -v --basetemp={envtmpdir} --junit-xml={toxinidir}/python_tests.xml --junit-prefix={envname} --color=yes -n 4 --prebuilt-client={toxinidir}/build_tmp/tensilelite/client/tensilelite-client {posargs}"
allowlist_externals =
    mkdir
    sh
    cmake

[testenv:py3]
basepython = python3

[testenv:unit]
description = "Runs Python unit tests quickly, skipping the client build. Assumes a build has run before."
basepython = python3
# This environment inherits 'deps' and 'setenv' from [testenv]
commands =
    pip install {toxinidir}/rocisa/
    pytest -v --basetemp={envtmpdir} {posargs}


[testenv:lint]
basepython = python3
deps =
    -r{toxinidir}/requirements.txt
    joblib
    flake8
commands = flake8 {toxinidir}/Tensile

[testenv:format]
description = "Formats code so developers don't have to"
skip_install = true
deps = black==24.4
commands =
    black \
      --line-length=100 \
      {toxinidir}/Tensile/Common \
      {toxinidir}/Tensile/TensileCreateLibrary \
      {toxinidir}/Tensile/Utilities/Decorators \
      {posargs}

[testenv:isort]
description = "Sorts import statements for less merge conflicts"
skip_install = true
deps = isort==5.13.2
commands =
    isort \
      --profile=black \
      {toxinidir}/Tensile/Common \
      {toxinidir}/Tensile/TensileCreateLibrary \
      {toxinidir}/Tensile/Utilities/Decorators \
      {posargs}

[testenv:pre_commit]
basepython = python3
deps =
    -r{toxinidir}/requirements.txt
    joblib
    pytest>=5.4.1
    flake8
commands =
    flake8 {toxinidir}/Tensile
    py.test -q --basetemp={envtmpdir} --color=yes {toxinidir}/Tensile -m unit {posargs}

[flake8]
exclude = .git,build*,dist,.cache,*~
max-line-length = 132
# E/W class violations are errors/warnings reported by pycodestyle, respectively
# This mostly just leaves pyflake errors.
ignore = E, W
