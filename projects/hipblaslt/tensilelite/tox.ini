description = "Generate code coverage for common tests only (requires prebuilt client)"
basepython = python3
deps =
    {[testenv]deps}
    pytest-cov>=4.0.0
    coverage[toml]>=7.0.0
    scikit-build-core==0.10.0
setenv =
    {[testenv]setenv}
    # PYTHONPATH is required for coverage.py multiprocessing mode to track source in pytest-xdist workers
    PYTHONPATH = {toxinidir}
    COVERAGE_FILE = {toxinidir}/.coverage
commands =
    pip install --upgrade pip
