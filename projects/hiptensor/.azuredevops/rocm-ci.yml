resources:
  repositories:
  - repository: pipelines_repo
    type: github
    endpoint: ROCm
    name: ROCm/ROCm
    ref: ${{ parameters.pipelinesRepoRef }} 

parameters:
- name: pipelinesRepoRef
  type: string
  default: refs/heads/develop

variables:
- group: common
- template: /.azuredevops/variables-global.yml@pipelines_repo

trigger:
  batch: true
  branches:
    include:
    - develop
    - mainline
  paths:
    exclude:
    - .githooks
    - .github
    - .jenkins
    - docs
    - '.*.y*ml'
    - LICENSE
    - '*.md'

pr:
  autoCancel: true
  branches:
    include:
    - develop
    - mainline
  paths:
    exclude:
    - .githooks
    - .github
    - .jenkins
    - docs
    - '.*.y*ml'
    - LICENSE
    - '*.md'
  drafts: false

jobs:
  - template: ${{ variables.CI_COMPONENT_PATH }}/hipTensor.yml@pipelines_repo
