test_categories:
  quick:
    description: "Fast sanity checks - Run pre-commit (target: < 5 min)"
    test_patterns:
      - "*ArgIndexIterator"
      - "*BasicTests.GetVersion"
      - "*BatchMemcpyTests/*"
      - "*BlockScan"
      - "*ConfigDispatchTests.*"
      - "*ConstantIteratorTests/*"
      - "*CountingIteratorTests/*"
      - "*DeviceScanTests/*"
      - "*DiscardIteratorTests.Less"
      - "*ExchangeTests*"
      - "*FirstPart"
      - "*HipcubBlockRunLengthDecodeTest/*"
      - "*Histogram*"
      - "*HistogramAtomic*"
      - "*HistogramSortInput*"
      - "*IntrinsicsTests*"
      - "*InvokeResultBinOpTests/*"
      - "*InvokeResultUnOpTests/*"
      - "*MergeTests/*"
      - "*PartitionLargeInputTest/*"
      - "*PartitionTests/*"
      - "*PredicateIteratorTests.*"
      - "*RadixKeyCodecTest.*"
      - "*RadixMergeCompareTest/*"
      - "*RadixSort/*"
      - "*RadixSortIntegral/*"
      - "*ReduceByKey*"
      - "*ReduceInputArrayTestsFloating"
      - "*ReduceInputArrayTestsIntegral/*"
      - "*ReducePrecisionTests/*"
      - "*ReduceSingleValueTestsFloating"
      - "*ReduceSingleValueTestsIntegral"
      - "*ReduceTests/*"
      - "*ReverseIteratorTests.*"
      - "*RunLengthEncode/*"
      - "*SecondPart/*"
      - "*SegmentedReduce/*"
      - "*SelectLargeInputFlaggedTest/*"
      - "*SelectTests/*"
      - "*ShuffleTestsFloating/*"
      - "*ShuffleTestsIntegral*"
      - "*SortBitonicTestsIntegral/*"
      - "*ThirdPart/*"
      - "*ThreadOperationTests/*"
      - "*ThreadTests/*"
      - "*TransformIteratorTests/*"
      - "*TransformTests/*"
      - "*VectorizationTests*"
      - "*WarpExchangeScatterTest/*"
      - "*WarpExchangeTest/*"
      - "*WarpLoadTest/*"
      - "*WarpReduceTestsFloating/*"
      - "*WarpReduceTestsIntegral/*"
      - "*WarpScanTests*"
      - "*WarpSortShuffleBasedTestsIntegral/*"
      - "*ceIntegral/*"
      - "*tyIntegral/*"
      - "TestHipGraphBasic"
    exclude:
    labels:
      - "quick"

  standard:
    description: "Full gtest run (filter '*') - shared across PR / nightly / weekly tiers"
    test_patterns:
      - "*"
    exclude:
    labels:
      - "standard"
      - "comprehensive"
      - "full"

  ffm-quick:
    description: "Quick FFM tests"
    test_patterns:
      - "BitCastPairTest*"
      - "CustomForward*"
      - "DoubleBufferTest*"
      - "EmptyTuple*"
      - "FutureValueTest*"
      - "Get*"
      - "HipAsyncCopyTests*"
      - "HipcubBlockRunLengthDecodeTest*"
      - "HIPTests*"
      - "IsFinalTrait*"
      - "KeyValuePairTest*"
      - "MakeTuple*"
      - "OrderedBlockId*"
      - "RadixKeyCodecTest*"
      - "RadixMergeCompareTest*"
      - "RocprimAccumulator*"
      - "RocprimArgIndexIterator*"
      - "RocprimBasicTests*"
      - "RocprimBlockAdjacentDifference*"
      - "RocprimBlockDiscontinuity*"
      - "RocprimBlockExchangeTests*"
      - "RocprimBlockHistogram*"
      - "RocprimBlockLoadStoreClassTests*"
      - "*RocprimBlockRadixRank*"
      - "RocprimBlockReduce*"
      - "RocprimBlockScan*"
      - "RocprimBlockShuffleTests*"
      - "RocprimConstantIterator*"
      - "RocprimCountingIterator*"
      - "RocprimDeviceBatchMemcpy*"
      - "RocprimDeviceBinarySearch*"
      - "RocprimDeviceMergeTests*"
      - "RocprimDeviceNthelement*"
      - "RocprimDeviceRunLengthEncode*"
      - "RocprimDiscardIterator*"
      - "RocprimFloatingPointTests*"
      - "RocprimIntegralTests*"
      - "RocprimInternalMergePathTests*"
      - "RocprimIntrinsicsTests*"
      - "RocprimInvokeResult*"
      - "RocprimLookbackReproducibilityTests*"
      - "RocprimNthelementKeySameTests*"
      - "RocprimPredicateIterator*"
      - "RocprimReverseIterator*"
      - "RocprimSortCheckerTests*"
      - "RocprimTemporaryStoragePartitioningTests*"
      - "RocprimThreadOperationTests*"
      - "RocprimThreadTests*"
      - "RocprimTransformIterator*"
      - "RocprimTupleTests*"
      - "RocprimVectorizationTests*"
      - "RocprimWarpReduceTests*"
      - "RocprimWarpScanTests*"
      - "RocprimZipIterator*"
      - "TestHipGraphAlgs*"
      - "TestLinking*"
      - "TieIgnore*"
      - "TraitsInterface*"
      - "Tuple*"
      - "TypedRadixKeyCodecTest*"
      - "UninitializedArrayTest*"
      - "WarpLoadTest*"
      - "WarpStoreTest*"
    exclude:
    labels:
      - "ffm-quick"
      - "ffm-full"

exclude_gpu:
  exclude_gpu_gfx110X_windows:
    # Windows-only: all gfx110X variants (gfx1100, gfx1101, gfx1102, ...)
    # this block is ignored entirely when configuring on Linux.
    test_patterns:
      # tests from test_block_discontinuity binary
      - "RocprimBlockDiscontinuity*/*"
      # tests from test_device_merge_sort binary
      - "RocprimDeviceSortTests/*"
      - "RocprimDeviceSortTests.*"
      # tests from test_device_reduce binary
      - "RocprimDeviceReduceTests/*"
      - "RocprimDeviceReduceTests.*"
      - "RocprimDeviceReducePrecisionTests/*"
      # tests from test_device_reduce_by_key binary
      - "RocprimDeviceReduceByKey/*"
      - "RocprimDeviceReduceByKey.*"
    labels:
      - "ex_gpu_gfx110X"
      - "quick"
      - "standard"
      - "comprehensive"
      - "full"

  exclude_gpu_gfx1151_windows:
    # Windows-only: gfx1151 skips test_device_merge_sort and
    # test_device_radix_sort. Ignored when configuring on Linux.
    test_patterns:
      # test_device_merge_sort
      - "RocprimDeviceSortTests/*"
      - "RocprimDeviceSortTests.*"
      # tests from test_device_radix_sort binary
      - "*/RocprimDeviceRadixSort/*"
      - "RocprimDeviceRadixSort.*"
    labels:
      - "quick"
      - "standard"
      - "full"
      - "comprehensive"
      - "ex_gpu_gfx1151"

execution_settings:
  default_timeout: 300
  timeout_multiplier: 1 # Multiplier for all timeouts (1, 1.5, 1.75, 2, etc.)
  category_timeouts:
    quick: 300          # 5 minutes
    standard: 14400     # 4 hours (longest tier the standard entry serves)
    ffm-quick: 7200     # 2 hours
