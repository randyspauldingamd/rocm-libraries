# hipblas Test Categories Configuration
# Aligned with rocJenkins job types (precheckin, extended, weekly) and Test Filter Standardization POC.

test_categories:
  quick:
    description: "Smoke - same as Jenkins smoke (timeout: 5 mins)"
    test_patterns:
      # TODO use different yaml not different filter
      - "*quick*"
    exclude:
      - "*known_bug*"
    labels:
      - "smoke"
      - "quick"

  standard:
    description: "Precheckin - same as Jenkins precheckin (timeout: 30 mins)"
    test_patterns:
      - "*quick*"
      - "*pre_checkin*"
    exclude:
      - "*known_bug*"
    labels:
      - "standard"
      - "pr"
      - "precheckin"

  comprehensive:
    description: "Extended - same as Jenkins extended/nightly (timeout: 2 hours)"
    test_patterns:
      - "*quick*"
      - "*pre_checkin*"
    exclude:
      - "*known_bug*"
    labels:
      - "comprehensive"
      - "nightly"
      - "extended"

  full:
    description: "Stress / weekly - same as Jenkins weekly"
    test_patterns:
      - "*quick*"
      - "*pre_checkin*"
    exclude:
      - "*known_bug*"
    labels:
      # TODO TheRock lacks real stress test run, this is just standard compbined comprehensive for now
      - "stress"
      - "weekly"
      - "full"

# GPU-specific exclusions can be added here when needed (see shared/ctest/README.md).
# exclude_gpu:
#   exclude_gpu_gfxXXXX:
#     test_patterns: [...]
#     labels: ["quick", "standard", "comprehensive", "stress", "ex_gpu_gfxXXXX"]

execution_settings:
  default_timeout: 900
  timeout_multiplier: 1
  environment:
    OPENBLAS_NUM_THREADS: "48"
    OMP_NUM_THREADS: "48"
  category_timeouts:
    quick: 900    # 15 mins
    standard: 3600    # 1 hours
    comprehensive: 3600   # 1 hours
    full: 7200       # 2 hours
