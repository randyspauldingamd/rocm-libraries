---
include: hipblas_common.yaml

Definitions:
  - &size_range
    - { N:  -1, K:  -1, lda:  -1, ldc:  -1 }
    - { N: 200, K:  16, lda: 200, ldc: 200 }
    - { N: 32,  K:  33, lda:  64, ldc:  64 }

  - &alpha_beta_range
    - { alpha: 1.0, alphai: 0.0, beta: 1.0, betai:  0.0 }

Tests:

  - name: syrk_ex_bad_arg
    category: pre_checkin
    function:
      - syrk_ex_bad_arg: *syrk_ex_precisions
    api: [ FORTRAN, C ]
    backend_flags: AMD

  - name: syrk_ex_general
    category: pre_checkin
    function:
    - syrk_ex: *syrk_ex_precisions
    uplo: [ 'L', 'U' ]
    transA: [ 'N', 'T' ]
    matrix_size: *size_range
    alpha_beta: *alpha_beta_range
    api: [ FORTRAN, C ]
    backend_flags: AMD
