operation:
  name: "ResampleFwd"
  class_name: "ResampleFwdOperationDescriptor"
  fbs_table: "ResampleFwdAttributes"
  fbs_generated_header: "resample_fwd_attributes_generated.h"

  descriptor_type:
    enum_name: "HIPDNN_BACKEND_OPERATION_RESAMPLE_FWD_DESCRIPTOR"

  operation_attr_prefix: "HIPDNN_ATTR_OPERATION_RESAMPLE_FWD"

  error_label: "resample"
  packer_operation_label: "resample forward"
  packer_finalize_label: "resample"
  test_params_method_name: "setResampleParams"
  data_fields_section_label: "Resample Parameters"
  build_node_attrs_var: "poolAttrs"

  operation_type_enum: "HIPDNN_OPERATION_TYPE_RESAMPLE_FWD"

  frontend:
    packer_function: "createResampleFwdOperation"
    unpacker_function: "unpackResampleFwdOperation"
    node_class: "ResampleFwdNode"
    attributes_class: "ResampleFwdAttributes"
    attributes_include: "ResampleFwdAttributes"

    inputs:
      - name: "x"
        enum_name: "X"
        required: true
        getter_name: "get_x"
        setter_name: "set_x"
    outputs:
      - name: "y"
        enum_name: "Y"
        required: true
        getter_name: "get_y"
        setter_name: "set_y"
      - name: "index"
        enum_name: "INDEX"
        required: false
        getter_name: "get_index"
        setter_name: "set_index"
    graph_method_name: "resample_fwd"
    graph_method_params:
      - name: "x"
        tensor_name: "x"
    graph_return_type: "single"
    graph_return_outputs:
      - "y"
    node_type_enum: "NodeType::RESAMPLE_FWD"
    node_attributes_union_type: "ResampleFwdAttributes"
    compatibility_typedef: "Resample_fwd_attributes"

  infer_properties:
    strategy: "stub"
    dimension_formula: "output = (input + pre_padding + post_padding - window) / stride + 1"

  validation:
    required_input_tensors:
      - "x"
    required_input_dims:
      - "x"
    custom_checks:
      - "Validate stride > 0 for each spatial dimension"
      - "Validate window > 0 for each spatial dimension"

  tensor_fields:
    - name: "x"
      fbs_field: "x_tensor_uid"
      attr_suffix: "X"
      required: true
      frontend_getter: "get_x()"

    - name: "y"
      fbs_field: "y_tensor_uid"
      attr_suffix: "Y"
      required: true
      frontend_getter: "get_y()"

    - name: "index"
      fbs_field: "index_tensor_uid"
      attr_suffix: "INDEX"
      required: false
      frontend_getter: "get_index()"

  data_fields:
    - name: "pre_padding"
      fbs_field: "pre_padding"
      attr_name: "HIPDNN_ATTR_RESAMPLE_PRE_PADDINGS"
      type: "vector_int64"
      required: true
      frontend_getter: "get_pre_padding()"
      test_label: "Resample"
      test_value: [1, 1]

    - name: "post_padding"
      fbs_field: "post_padding"
      attr_name: "HIPDNN_ATTR_RESAMPLE_POST_PADDINGS"
      type: "vector_int64"
      required: true
      frontend_getter: "get_post_padding()"
      test_label: "Resample"
      test_value: [1, 1]
      build_node_check: false

    - name: "stride"
      fbs_field: "stride"
      attr_name: "HIPDNN_ATTR_RESAMPLE_STRIDES"
      type: "vector_int64"
      required: true
      frontend_getter: "get_stride()"
      test_label: "Resample"
      test_value: [2, 2]

    - name: "window"
      fbs_field: "window"
      attr_name: "HIPDNN_ATTR_RESAMPLE_WINDOW_DIMS"
      type: "vector_int64"
      required: true
      frontend_getter: "get_window()"
      test_label: "Resample"
      test_value: [3, 3]

    - name: "resample_mode"
      fbs_field: "resample_mode"
      attr_name: "HIPDNN_ATTR_RESAMPLE_MODE"
      type: "mode"
      cpp_enum: "hipdnn_data_sdk::data_objects::ResampleMode"
      frontend_type: "ResampleMode"
      default_value: "ResampleMode::MAX"
      required: false
      frontend_getter: "get_resample_mode()"
      backend_setter: "setResampleMode"
      backend_getter: "getResampleMode"
      backend_converter: "toBackendResampleMode"
      frontend_inverse_converter: "fromHipdnnResampleMode"
      backend_type_name: "HIPDNN_TYPE_RESAMPLE_MODE"
      test_enum_value: "MAXPOOL"
      test_alt_enum_value: "AVERAGE"
      test_backend_value: "HIPDNN_RESAMPLE_MAXPOOL"
      test_c_type: "hipdnnResampleMode_t"
      test_default_value: "HIPDNN_RESAMPLE_AVGPOOL_EXCLUDE_PADDING"
      enum_def:
        backend_header: "HipdnnResampleMode.h"
        backend_prefix: "HIPDNN_RESAMPLE_"
        values:
          - { name: "UNSET", value: 0, sentinel: true }
          - { name: "MAX", value: 1, sdk_name: "MAXPOOL", description: "Maximum resample" }
          - { name: "AVERAGE", value: 2, description: "Average resample (excludes padding)" }
          - { name: "AVERAGE_INCLUSIVE", value: 3, description: "Average resample (includes padding)" }

    - name: "padding_mode"
      fbs_field: "padding_mode"
      attr_name: "HIPDNN_ATTR_RESAMPLE_PADDING_MODE"
      type: "mode"
      cpp_enum: "hipdnn_data_sdk::data_objects::PaddingMode"
      frontend_type: "PaddingMode"
      default_value: "PaddingMode::ZERO_PAD"
      required: false
      frontend_getter: "get_padding_mode()"
      backend_setter: "setPaddingMode"
      backend_getter: "getPaddingMode"
      backend_converter: "toBackendPaddingMode"
      frontend_inverse_converter: "fromHipdnnPaddingMode"
      backend_type_name: "HIPDNN_TYPE_PADDING_MODE"
      test_enum_value: "ZERO_PAD"
      test_alt_enum_value: "NEG_INF_PAD"
      test_backend_value: "HIPDNN_PADDING_ZERO_PAD"
      test_c_type: "hipdnnPaddingMode_t"
      test_default_value: "HIPDNN_PADDING_NEG_INF_PAD"
      enum_def:
        backend_header: "HipdnnPaddingMode.h"
        backend_prefix: "HIPDNN_PADDING_"
        values:
          - { name: "PADDING_NOT_SET", value: 0, sentinel: true, frontend_name: "NOT_SET" }
          - { name: "NEG_INF_PAD", value: 1, description: "Pad with negative infinity" }
          - { name: "ZERO_PAD", value: 2, description: "Pad with zeros" }

    - name: "generate_index"
      fbs_field: "generate_index"
      attr_name: "HIPDNN_ATTR_RESAMPLE_GENERATE_INDEX_EXT"
      type: "bool"
      default_value: "false"
      required: false
      frontend_getter: "get_generate_index()"
      backend_type_name: "HIPDNN_TYPE_BOOLEAN"
      test_value: false
      test_alt_value: true

  tensor_array_fields: []

  has_compute_data_type: true
  compute_data_type_attr: "HIPDNN_ATTR_RESAMPLE_COMP_TYPE"

  test_data:
    constants_include: "ResampleFwdConstants"
    tensor_uids: { x: 40, y: 41, index: 42 }
    tensor_configs:
      x: { dims: [1, 3, 32, 32], strides: [3072, 1024, 32, 1] }
      y: { dims: [1, 3, 16, 16], strides: [768, 256, 16, 1] }
      index: { dims: [1, 3, 16, 16], strides: [768, 256, 16, 1] }
    field_values:
      pre_padding: [1, 1]
      post_padding: [1, 1]
      stride: [2, 2]
      window: [3, 3]
