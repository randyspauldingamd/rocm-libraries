[build-system]
requires = ["scikit-build-core>=0.10", "nanobind>=2.12.0", "cmake>=3.26"]
build-backend = "scikit_build_core.build"

[project]
name = "hipdnn-frontend"
# Static wheel metadata; keep in sync with frontend/version.json (the frontend
# component version). SKBUILD wheel builds are standalone (no umbrella CMake) so
# this is the version of record for the wheel.
version = "0.2.0"
description = "Python bindings for the hipDNN frontend library"
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [
    {name = "Advanced Micro Devices, Inc."},
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "numpy>=1.19.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=6.0",
    "numpy",
]

[tool.scikit-build]
cmake.build-type = "Release"
wheel.packages = []
wheel.py-api = "cp312"

[tool.pytest.ini_options]
markers = [
    "gpu: marks tests requiring GPU",
]
