# hipRAND Test Categories Configuration (CTest)
# hipRAND has got only a few tests which are executed in all categories.

test_categories:
  quick:
    description: "hipRAND quick tests"
    test_patterns:
      - ".*"
    exclude:
    labels:
      - "quick"
      - "standard"
      - "comprehensive"
      - "full"
      - "ffm-quick"
      - "ffm-full"
