# rocSOLVER Test Categories Configuration
# Aligned with rocJenkins job types and Test Filter Standardization.
#
# rocSOLVER uses a three-tier naming convention:
#   checkin_* - Fast tests for precheckin validation
#   daily_*   - Comprehensive tests for nightly/extended runs
#   weekly_*  - Very large matrix size tests

test_categories:
  quick:
    description: "Fast sanity checks (target: < 5 min) - matches test_rocsolver.py quick subset"
    # Mirrors quick_tests in
    # TheRock/build_tools/github_actions/test_executable_scripts/test_rocsolver.py,
    # which itself was lifted from projects/rocsolver/rtest.xml.
    # Keep this list in sync with that script until the legacy path is removed.
    test_patterns:
      - "checkin*BDSQR*"
      - "checkin*STEBZ*"
      - "checkin*STEIN*"
      - "checkin*STERF*"
      - "checkin*STEQR*"
      - "checkin*SYEVJ*"
      - "checkin*HEEVJ*"
      - "checkin*LARFG*"
      - "checkin*LARF*"
      - "checkin*LARFT*"
      - "checkin*GETF2*"
      - "checkin*POTF2*"
      - "checkin*GEQR2*"
      - "checkin*GELQ2*"
      - "checkin*SPLITLU*"
      - "checkin*REFACTLU*"
      - "checkin*REFACTCHOL*"
    exclude:
      # From test_rocsolver.py: gtest_filter trailing "-*LARFB*:*known_bug*"
      - "*LARFB*"
      - "*known_bug*"
      - "*DISABLED*"
    labels:
      - "quick"
      - "pre-commit"
      - "smoke"

  standard:
    description: "Pre-checkin validation (target: < 45 min) - same as Jenkins precheckin"
    test_patterns:
      - "checkin_*"
    exclude:
      - "*DISABLED*"
    labels:
      - "standard"
      - "pr"
      - "precheckin"

  comprehensive:
    description: "Nightly comprehensive tests (target: < 7 hours) - same as Jenkins extended"
    test_patterns:
      - "daily_*"
    exclude:
      - "*DISABLED*"
    labels:
      - "comprehensive"
      - "nightly"
      - "extended"

  full:
    description: "Complete test suite - all tests including daily and weekly"
    test_patterns:
      - "checkin_*"
      - "daily_*"
      - "weekly_*"
    exclude:
      - "*DISABLED*"
    labels:
      - "full"
      - "weekly"
      - "all"

execution_settings:
  default_timeout: 300
  timeout_multiplier: 1
  category_timeouts:
    quick: 300      # 5 minutes
    standard: 2700  # 45 minutes (matches Jenkins precheckin timeout)
    comprehensive: 25200  # 7 hours (matches Jenkins extended timeout)
    full: 28800     # 8 hours
