  - *double_precision
  - *single_precision_complex
  - *double_precision_complex
  - *float16_float32_axpby_precision
  - *bfloat16_float32_axpby_precision

SpMV mixed precisions: &spmv_mixed_precisions
  - *int8_int8_int32_int32_axyt_precision
  - *int8_int8_float32_float32_axyt_precision
  - *float16_float16_float32_float32_axyt_precision
  - *float16_float16_float16_float32_axyt_precision
  - *bfloat16_bfloat16_float32_float32_axyt_precision
  - *bfloat16_bfloat16_bfloat16_float32_axyt_precision
  - *float32_float64_float64_float64
  - *cmplx32_cmplx64_cmplx64_cmplx64
  - *float32_cmplx32_cmplx32_cmplx32_axyt_precision
  - *float64_cmplx64_cmplx64_cmplx64_axyt_precision

# The Arguments struct passed directly to C++. See hipsparse_arguments.hpp.
# The order of the entries is significant, so it can't simply be a dictionary.
# The types on the RHS are eval'd for Python-recognized types including ctypes
# and datatypes defined in Datatypes above. T*n represents array of length n.
Arguments:
  - M: c_int
  - N: c_int
  - K: c_int
  - nnz: c_int
  - block_dim: c_int
  - row_block_dimA: c_int
  - col_block_dimA: c_int
  - row_block_dimB: c_int
  - col_block_dimB: c_int
  - lda: c_int
  - ldb: c_int
  - ldc: c_int
  - batch_count: c_int
  - index_type_I: hipsparseIndexType_t
  - index_type_J: hipsparseIndexType_t
  - a_type: hipDataType
  - x_type: hipDataType
  - y_type: hipDataType
  - compute_type: hipDataType
  - alpha: c_double
  - alphai: c_double
  - beta: c_double
  - betai: c_double
  - threshold: c_double
  - percentage: c_double
  - c: c_double
  - s: c_double
  - transA: hipsparseOperation_t
  - transB: hipsparseOperation_t
  - baseA: hipsparseIndexBase_t
  - baseB: hipsparseIndexBase_t
  - baseC: hipsparseIndexBase_t
  - baseD: hipsparseIndexBase_t
  - action: hipsparseAction_t
  - part: hipsparseHybPartition_t
  - diag_type: hipsparseDiagType_t
  - fill_mode: hipsparseFillMode_t
  - solve_policy: hipsparseSolvePolicy_t
  - dirA: hipsparseDirection_t
  - orderA: hipsparseOrder_t
  - orderB: hipsparseOrder_t
  - orderC: hipsparseOrder_t
  - formatA: hipsparseFormat_t
  - formatB: hipsparseFormat_t
  - csr2csc_alg: hipsparseCsr2CscAlg_t
  - dense2sparse_alg: hipsparseDenseToSparseAlg_t
  - sparse2dense_alg: hipsparseSparseToDenseAlg_t
  - sddmm_alg: hipsparseSDDMMAlg_t
  - spgemm_alg: hipsparseSpGEMMAlg_t
  - spmm_alg: hipsparseSpMMAlg_t
  - spmv_alg: hipsparseSpMVAlg_t
  - spsm_alg: hipsparseSpSMAlg_t
  - spsv_alg: hipsparseSpSVAlg_t
  - numericboost: c_int
  - boosttol: c_double
  - boostval: c_double
  - boostvali: c_double
  - slice_size: c_int
  - ell_width: c_int
  - permute: c_int
  - gtsv_alg: c_int
  - gpsv_alg: c_int
  - unit_check: c_int
  - timing: c_int
  - iters: c_int
  - graph_test: c_bool
  - filename: c_char*192
  - function: c_char*64
  - category: c_char*32

# These named dictionary lists [ {dict1}, {dict2}, etc. ] supply subsets of
# test arguments in a structured way. The dictionaries are applied to the test
# one at a time, to generate combinations.  If one of this table's entries is
# a dictionary of size one, it means that the argument named by its key takes
# on values paired with argument named by its value. For example:
#
# - function: precision
#
# when used with the code:
#
# function:
#   func1: prec1
#   func2: prec2
#   func3: prec3
#
# causes (function, precision) to take on the values (func1, prec1),
# (func2, prec2), (func3, prec3), etc.

Dictionary lists to expand:
  - arguments
  - M_N
  - M_N_K
  - transA_transB
  - alpha_beta
  - alpha_alphai
  - beta_betai
  - alphai_betai
  - boostval_boostvali
  - indextype
  - precision
  - function: precision

# In case an array argument needs to be passed directly to C as an array,
# it needs to be listed here to avoid being expanded into multiple test
# cases with each of its elements.
Lists to not expand:
  - e.g., an array argument not to be expanded

# Defaults
Defaults:
  M: -1
  N: -1
  K: -1
  nnz: -1
  block_dim: 2
  row_block_dimA: 2
  col_block_dimA: 2
  row_block_dimB: 2
  col_block_dimB: 2
  lda: 1
  ldb: 1
  ldc: 1
  batch_count: -1
  index_type_I: i32
  index_type_J: i32
  a_type: f32_r
  x_type: f32_r
  y_type: f32_r
  compute_type: f32_r
  x_type: f32_r
  y_type: f32_r
  alpha: 1.0
  alphai: 0.0
  beta: 0.0
  betai: 0.0
  threshold: 1.0
  percentage: 0.0
  c: 1.0
  s: 1.0
  transA: HIPSPARSE_OPERATION_NON_TRANSPOSE
  transB: HIPSPARSE_OPERATION_NON_TRANSPOSE
  baseA: HIPSPARSE_INDEX_BASE_ZERO
  baseB: HIPSPARSE_INDEX_BASE_ZERO
  baseC: HIPSPARSE_INDEX_BASE_ZERO
  baseD: HIPSPARSE_INDEX_BASE_ZERO
  action: HIPSPARSE_ACTION_NUMERIC
  part: HIPSPARSE_HYB_PARTITION_AUTO
  diag_type: HIPSPARSE_DIAG_TYPE_NON_UNIT
  fill_mode: HIPSPARSE_FILL_MODE_LOWER
  solve_policy: HIPSPARSE_SOLVE_POLICY_USE_LEVEL
  dirA: HIPSPARSE_DIRECTION_ROW
  orderA: HIPSPARSE_ORDER_COL
  orderB: HIPSPARSE_ORDER_COL
  orderC: HIPSPARSE_ORDER_COL
  formatA: HIPSPARSE_FORMAT_CSR
  formatB: HIPSPARSE_FORMAT_CSR
  csr2csc_alg: HIPSPARSE_CSR2CSC_ALG_DEFAULT
  dense2sparse_alg: HIPSPARSE_DENSETOSPARSE_ALG_DEFAULT
  sparse2dense_alg: HIPSPARSE_SPARSETODENSE_ALG_DEFAULT
  sddmm_alg: HIPSPARSE_SDDMM_ALG_DEFAULT
  spgemm_alg: HIPSPARSE_SPGEMM_DEFAULT
  spmm_alg: HIPSPARSE_SPMM_ALG_DEFAULT
  spmv_alg: HIPSPARSE_SPMV_ALG_DEFAULT
  spsm_alg: HIPSPARSE_SPSM_ALG_DEFAULT
  spsv_alg: HIPSPARSE_SPSV_ALG_DEFAULT
  numericboost: 0
  boosttol: 0.0
  boostval: 1.0
  boostvali: 0.0
  slice_size: 2
  ell_width: 0
  permute: 0
  gtsv_alg: 0
  gpsv_alg: 0
  unit_check: 1
  timing: 0
  iters: 10
  graph_test: false
  filename: '*'
  function: '*'
  category: '*'