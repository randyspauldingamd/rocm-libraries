# Data types are defined as either aliases to Python-recognized ctypes,
# or enums defined with c_int base clases and attributes.
Datatypes:
  - hipsparseIndexType_t:
      bases: [ c_int ]
      attr:
        u16: 1
        i32: 2
        i64: 3
  - hipDataType:
      bases: [ c_int ]
      attr:
        f32_r: 0
        f64_r: 1
        f16_r: 2
        i8_r:  3
        f32_c: 4
        f64_c: 5
        u8_r:  8
        i32_r: 10
        u32_r: 12
        bf16_r: 14
  - { single: f32_r, double: f64_r }
  - { single complex: f32_c, double complex: f64_c }
  - hipsparseOperation_t:
      bases: [ c_int ]
      attr:
        HIPSPARSE_OPERATION_NON_TRANSPOSE: 0
        HIPSPARSE_OPERATION_TRANSPOSE: 1
        HIPSPARSE_OPERATION_CONJUGATE_TRANSPOSE: 2
  - hipsparseIndexBase_t:
      bases: [ c_int ]
      attr:
        HIPSPARSE_INDEX_BASE_ZERO: 0
        HIPSPARSE_INDEX_BASE_ONE: 1
  - hipsparseDiagType_t:
      bases: [ c_int ]
      attr:
        HIPSPARSE_DIAG_TYPE_NON_UNIT: 0
        HIPSPARSE_DIAG_TYPE_UNIT: 1
  - hipsparseFillMode_t:
      bases: [ c_int ]
      attr:
        HIPSPARSE_FILL_MODE_LOWER: 0
        HIPSPARSE_FILL_MODE_UPPER: 1
  - hipsparseAction_t:
      bases: [ c_int ]
      attr:
        HIPSPARSE_ACTION_SYMBOLIC: 0
        HIPSPARSE_ACTION_NUMERIC: 1
  - hipsparseHybPartition_t:
      bases: [ c_int ]
      attr:
        HIPSPARSE_HYB_PARTITION_AUTO: 0
        HIPSPARSE_HYB_PARTITION_USER: 1
        HIPSPARSE_HYB_PARTITION_MAX: 2
  - hipsparseSolvePolicy_t:
      bases: [ c_int ]
      attr:
        HIPSPARSE_SOLVE_POLICY_NO_LEVEL: 0
        HIPSPARSE_SOLVE_POLICY_USE_LEVEL: 1
  - hipsparseDirection_t:
      bases: [ c_int ]
      attr:
        HIPSPARSE_DIRECTION_ROW: 0
        HIPSPARSE_DIRECTION_COLUMN: 1
  - hipsparseOrder_t:
      bases: [c_int ]
      attr:
        HIPSPARSE_ORDER_COL: 1
        HIPSPARSE_ORDER_ROW: 2
  - hipsparseFormat_t:
      bases: [c_int ]
      attr:
        HIPSPARSE_FORMAT_CSR: 1
        HIPSPARSE_FORMAT_CSC: 2
        HIPSPARSE_FORMAT_COO: 3
        HIPSPARSE_FORMAT_COO_AOS: 4
        HIPSPARSE_FORMAT_BLOCKED_ELL: 5
  - hipsparseCsr2CscAlg_t:
      bases: [c_int ]
      attr:
        HIPSPARSE_CSR2CSC_ALG_DEFAULT: 0
        HIPSPARSE_CSR2CSC_ALG1: 1
        HIPSPARSE_CSR2CSC_ALG2: 2
  - hipsparseDenseToSparseAlg_t:
      bases: [c_int ]
      attr:
        HIPSPARSE_DENSETOSPARSE_ALG_DEFAULT: 0
  - hipsparseSparseToDenseAlg_t:
      bases: [c_int ]
      attr:
        HIPSPARSE_SPARSETODENSE_ALG_DEFAULT: 0
  - hipsparseSDDMMAlg_t:
      bases: [c_int ]
      attr:
        HIPSPARSE_SDDMM_ALG_DEFAULT: 0
  - hipsparseSpGEMMAlg_t:
      bases: [c_int ]
      attr:
        HIPSPARSE_SPGEMM_DEFAULT: 0
  - hipsparseSpMVAlg_t:
      bases: [c_int ]
      attr:
        HIPSPARSE_SPMV_ALG_DEFAULT: 0
        HIPSPARSE_SPMV_COO_ALG1: 1
        HIPSPARSE_SPMV_CSR_ALG1: 2
        HIPSPARSE_SPMV_CSR_ALG2: 3
        HIPSPARSE_SPMV_COO_ALG2: 4
        HIPSPARSE_SPMV_SELL_ALG1: 5
  - hipsparseSpSVAlg_t:
      bases: [c_int ]
      attr:
        HIPSPARSE_SPSV_ALG_DEFAULT: 0
  - hipsparseSpSMAlg_t:
      bases: [c_int ]
      attr:
        HIPSPARSE_SPSM_ALG_DEFAULT: 0
  - hipsparseSpMMAlg_t:
      bases: [c_int ]
      attr:
        HIPSPARSE_SPMM_ALG_DEFAULT: 0
        HIPSPARSE_SPMM_COO_ALG1: 1
        HIPSPARSE_SPMM_COO_ALG2: 2
        HIPSPARSE_SPMM_COO_ALG3: 3
        HIPSPARSE_SPMM_COO_ALG4: 5
        HIPSPARSE_SPMM_CSR_ALG1: 4
        HIPSPARSE_SPMM_CSR_ALG2: 6
        HIPSPARSE_SPMM_CSR_ALG3: 12
        HIPSPARSE_SPMM_BLOCKED_ELL_ALG1: 13
  - hipsparseSPGEMMAlg_t:
      bases: [c_int ]
      attr:
        HIPSPARSE_SPGEMM_DEFAULT: 0
        HIPSPARSE_SPGEMM_CSR_ALG_DETERMINISTIC: 1
        HIPSPARSE_SPGEMM_CSR_ALG_NONDETERMINISTIC: 2
        HIPSPARSE_SPGEMM_ALG1: 3
        HIPSPARSE_SPGEMM_ALG2: 4
        HIPSPARSE_SPGEMM_ALG3: 5

indextype i32: &i32
  - index_type_I: i32
    index_type_J: i32

indextype i64i32 mixture: &i64i32
  - index_type_I: i64
    index_type_J: i32

indextype i64: &i64
  - index_type_I: i64
    index_type_J: i64

indextype i32 and i64: &i32_i64
  - index_type_I: i32
    index_type_J: i32
  - index_type_I: i64
    index_type_J: i64

indextype i32 i64i32 mixture and i64: &i32i32_i64i32_i64i64
  - index_type_I: i32
    index_type_J: i32
  - index_type_I: i64
    index_type_J: i32
  - index_type_I: i64
    index_type_J: i64

Real precisions: &real_precisions
  - &int8_int8_int32_xyt_precision
    { x_type: i8_r, y_type: i8_r, compute_type: i32_r }
  - &int8_int8_float32_xyt_precision
    { x_type: i8_r, y_type: i8_r, compute_type: f32_r }
  - &float16_float16_float32_xyt_precision
    { x_type: f16_r, y_type: f16_r, compute_type: f32_r }
  - &int8_int8_int32_int32_axyt_precision
    { a_type: i8_r, x_type: i8_r, y_type: i32_r, compute_type: i32_r }
  - &int8_int8_float32_float32_axyt_precision
    { a_type: i8_r, x_type: i8_r, y_type: f32_r, compute_type: f32_r }
  - &float16_float16_float32_float32_axyt_precision
    { a_type: f16_r, x_type: f16_r, y_type: f32_r, compute_type: f32_r }
  - &float16_float16_float16_float32_axyt_precision
    { a_type: f16_r, x_type: f16_r, y_type: f16_r, compute_type: f32_r }
  - &bfloat16_bfloat16_float32_float32_axyt_precision
    { a_type: bf16_r, x_type: bf16_r, y_type: f32_r, compute_type: f32_r }
  - &bfloat16_bfloat16_bfloat16_float32_axyt_precision
    { a_type: bf16_r, x_type: bf16_r, y_type: bf16_r, compute_type: f32_r }
  - &int8_int8_int32_int32_abct_precision
    { a_type: i8_r, b_type: i8_r, c_type: i32_r, compute_type: i32_r }
  - &int8_int8_float32_float32_abct_precision
    { a_type: i8_r, b_type: i8_r, c_type: f32_r, compute_type: f32_r }
  - &float16_float16_float32_float32_abct_precision
    { a_type: f16_r, b_type: f16_r, c_type: f32_r, compute_type: f32_r }
  - &int8_precision
    { a_type: i8_r, b_type: i8_r, c_type: i8_r, x_type: i8_r, y_type: i8_r, compute_type: i8_r }
  - &half_precision
    { a_type: f16_r, b_type: f16_r, c_type: f16_r, x_type: f16_r, y_type: f16_r, compute_type: f16_r }
  - &bfloat16_precision
    { a_type: bf16_r, b_type: bf16_r, c_type: bf16_r, x_type: bf16_r, y_type: bf16_r, compute_type: bf16_r }
  - &single_precision
    { a_type: f32_r, b_type: f32_r, c_type: f32_r, x_type: f32_r, y_type: f32_r, compute_type: f32_r }
  - &double_precision
    { a_type: f64_r, b_type: f64_r, c_type: f64_r, x_type: f64_r, y_type: f64_r, compute_type: f64_r }
  - &float32_float64_float64_float64
    { a_type: f32_r, x_type: f64_r, y_type: f64_r, compute_type: f64_r }
  - &float16_float32_axpby_precision
    { x_type: f16_r, y_type: f16_r, compute_type: f32_r }
  - &bfloat16_float32_axpby_precision
    { x_type: bf16_r, y_type: bf16_r, compute_type: f32_r }

Complex precisions: &complex_precisions
  - &float32_cmplx32_cmplx32_cmplx32_axyt_precision
    { a_type: f32_r, x_type: f32_c, y_type: f32_c, compute_type: f32_c }
  - &float64_cmplx64_cmplx64_cmplx64_axyt_precision
    { a_type: f64_r, x_type: f64_c, y_type: f64_c, compute_type: f64_c }
  - &single_precision_complex
    { a_type: f32_c, b_type: f32_c, c_type: f32_c, x_type: f32_c, y_type: f32_c, compute_type: f32_c }
  - &double_precision_complex
    { a_type: f64_c, b_type: f64_c, c_type: f64_c, x_type: f64_c, y_type: f64_c, compute_type: f64_c }
  - &cmplx32_cmplx64_cmplx64_cmplx64
    { a_type: f32_c, x_type: f64_c, y_type: f64_c, compute_type: f64_c }

C precisions real: &single_only_precisions
  - *single_precision

C precisions real: &double_only_precisions
  - *double_precision

C precisions real: &single_double_precisions
  - *single_precision
  - *double_precision

C precisions complex: &single_only_precisions_complex
  - *single_precision_complex

C precisions complex: &double_only_precisions_complex
  - *double_precision_complex

C precisions complex: &single_double_precisions_complex
  - *single_precision_complex
  - *double_precision_complex

C precisions complex and real: &single_double_precisions_complex_real
  - *single_precision
  - *double_precision
  - *single_precision_complex
  - *double_precision_complex

C precisions complex and real: &single_only_precisions_complex_real
  - *single_precision
  - *single_precision_complex

C precisions complex and real: &double_only_precisions_complex_real
  - *double_precision
  - *double_precision_complex

C precisions scatter: &scatter_precisions
  - *int8_precision
  - *half_precision
  - *bfloat16_precision
  - *single_precision
  - *double_precision
  - *single_precision_complex
  - *double_precision_complex

C precisions axpby mixed: &axpby_mixed_precisions
  - *float16_float32_axpby_precision
  - *bfloat16_float32_axpby_precision

C precisions axpby all: &axpby_all_precisions
