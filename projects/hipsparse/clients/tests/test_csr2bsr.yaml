---
include: hipsparse_common.yaml


Tests:
- name: csr2bsr_bad_arg
  category: pre_checkin
  function: csr2bsr_bad_arg
  precision: *single_double_precisions_complex_real

- name: csr2bsr
  category: quick
  function: csr2bsr
  precision: *single_double_precisions_complex_real
  M: [0, 872, 21453]
  N: [0, 623, 29285]
  block_dim: [1, 2, 4, 7, 16]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]
  baseB: [HIPSPARSE_INDEX_BASE_ONE]
  dirA: [HIPSPARSE_DIRECTION_ROW, HIPSPARSE_DIRECTION_COLUMN]

- name: csr2bsr_file
  category: pre_checkin
  function: csr2bsr
  precision: *single_double_precisions
  M: 1
  block_dim: [5]
  baseA: [HIPSPARSE_INDEX_BASE_ONE]
  baseB: [HIPSPARSE_INDEX_BASE_ONE]
  dirA: [HIPSPARSE_DIRECTION_ROW, HIPSPARSE_DIRECTION_COLUMN]
  filename: [scircuit,
             nos2,
             nos4,
             nos6,
             sme3Dc]

