---
include: hipsparse_common.yaml


Tests:
- name: csr2coo_bad_arg
  category: pre_checkin
  function: csr2coo_bad_arg
  precision: *single_precision

- name: csr2coo
  category: quick
  function: csr2coo
  precision: *single_double_precisions_complex_real
  M: [0, 10, 500, 872, 1000]
  N: [0, 33, 242, 623, 1000]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]

- name: csr2coo_file
  category: pre_checkin
  function: csr2coo
  precision: *single_double_precisions_complex_real
  M: 1
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  filename: [rma10,
             mac_econ_fwd500,
             bibd_22_8,
             mc2depi,
             scircuit,
             ASIC_320k,
             bmwcra_1,
             nos1,
             nos2,
             nos3,
             nos4,
             nos5,
             nos6,
             nos7,
             amazon0312,
             Chebyshev4,
             sme3Dc,
             webbase-1M,
             shipsec1]
             

