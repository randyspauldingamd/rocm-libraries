---
include: hipsparse_common.yaml


Tests:
- name: spmv_csr_bad_arg
  category: pre_checkin
  function: spmv_csr_bad_arg
  indextype: *i32_i64
  precision: *single_double_precisions_complex_real

- name: spmv_csr
  category: quick
  function: spmv_csr
  indextype: *i32_i64
  precision: *single_double_precisions_complex_real
  M: [50]
  N: [84]
  alpha: [2.0]
  alphai: [0.0]
  beta: [1.0]
  betai: [0.0]
  transA: [HIPSPARSE_OPERATION_NON_TRANSPOSE]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  spmv_alg: [HIPSPARSE_SPMV_ALG_DEFAULT, 
             HIPSPARSE_SPMV_CSR_ALG1,
             HIPSPARSE_SPMV_CSR_ALG2]

# Test transpose operations with default algorithm (tests fix for rocsparse fallback)
- name: spmv_csr_transpose
  category: quick
  function: spmv_csr
  indextype: *i32_i64
  precision: *single_double_precisions_complex_real
  M: [50]
  N: [84]
  alpha: [2.0]
  alphai: [0.0]
  beta: [1.0]
  betai: [0.0]
  transA: [HIPSPARSE_OPERATION_TRANSPOSE, HIPSPARSE_OPERATION_CONJUGATE_TRANSPOSE]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  spmv_alg: [HIPSPARSE_SPMV_ALG_DEFAULT]

- name: spmv_csr
  category: pre_checkin
  function: spmv_csr
  indextype: *i32_i64
  precision: *single_double_precisions_complex_real
  M: 1
  N: 1
  alpha: [2.0]
  alphai: [0.0]
  beta: [1.0]
  betai: [0.0]
  transA: [HIPSPARSE_OPERATION_NON_TRANSPOSE]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  spmv_alg: [HIPSPARSE_SPMV_ALG_DEFAULT, 
             HIPSPARSE_SPMV_CSR_ALG1,
             HIPSPARSE_SPMV_CSR_ALG2]
  filename: [nos1,
             nos2,
             nos3,
             nos4, 
             nos5,
             nos6,
             nos7]

- name: spmv_csr
  category: pre_checkin
  function: spmv_csr
  indextype: *i32
  precision: *double_only_precisions
  M: 1
  N: 1
  alpha: [2.0]
  alphai: [0.0]
  beta: [1.0]
  betai: [0.0]
  transA: [HIPSPARSE_OPERATION_NON_TRANSPOSE]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]
  spmv_alg: [HIPSPARSE_SPMV_ALG_DEFAULT, 
             HIPSPARSE_SPMV_CSR_ALG1,
             HIPSPARSE_SPMV_CSR_ALG2]
  filename: [Chebyshev4,
             shipsec1,
             bibd_22_8,
             scircuit,
             rma10,
             sme3Dc,
             bmwcra_1,
             webbase-1M,
             ASIC_320k,
             mac_econ_fwd500,
             mc2depi]
             