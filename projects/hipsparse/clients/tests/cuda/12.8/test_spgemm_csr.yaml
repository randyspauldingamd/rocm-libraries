  K: 1
  alpha: [2.0]
  alphai: [0.0]
  baseA: [HIPSPARSE_INDEX_BASE_ONE]
  baseB: [HIPSPARSE_INDEX_BASE_ONE]
  baseC: [HIPSPARSE_INDEX_BASE_ONE]
  spgemm_alg: [HIPSPARSE_SPGEMM_DEFAULT]
  filename: [bibd_22_8]
