  category: pre_checkin
  function: spgemm_csr_bad_arg
  indextype: *i32
  precision: *single_double_precisions_complex_real

- name: spgemm_csr
  category: quick
  function: spgemm_csr
  indextype: *i32
  precision: *single_double_precisions_complex_real
  M: [567, 1149]
  K: [649, 2148]
  alpha: [2.0]
  alphai: [0.0]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]
  baseB: [HIPSPARSE_INDEX_BASE_ZERO]
  baseC: [HIPSPARSE_INDEX_BASE_ZERO]
  spgemm_alg: [HIPSPARSE_SPGEMM_DEFAULT]

- name: spgemm_csr
  category: pre_checkin
  function: spgemm_csr
  indextype: *i32
  precision: *single_double_precisions_complex_real
  M: 1
  K: 1
  alpha: [2.0]
  alphai: [0.0]
  baseA: [HIPSPARSE_INDEX_BASE_ONE]
  baseB: [HIPSPARSE_INDEX_BASE_ONE]
  baseC: [HIPSPARSE_INDEX_BASE_ONE]
  spgemm_alg: [HIPSPARSE_SPGEMM_DEFAULT]
  filename: [nos1,
             nos2, 
             nos3,
             nos4, 
             nos5,
             nos6, 
             nos7]

- name: spgemm_csr
  category: pre_checkin
