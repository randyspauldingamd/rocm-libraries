---
include: hipsparse_common.yaml


Tests:
- name: cscsort_bad_arg
  category: pre_checkin
  function: cscsort_bad_arg

- name: cscsort
  category: quick
  function: cscsort
  M: [10, 500, 872, 1000]
  N: [33, 242, 623, 1000]
  permute: [0, 1]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]

- name: cscsort_file
  category: pre_checkin
  function: cscsort
  M: 1
  N: 1
  permute: [0, 1]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  filename: [nos1, 
             nos2,
             nos3,
             nos4, 
             nos5, 
             nos6, 
             nos7]

- name: cscsort_file
  category: nightly
  function: cscsort
  M: 1
  N: 1
  permute: [0, 1]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  filename: [mac_econ_fwd500, 
             mc2depi, 
             ASIC_320k,  
             amazon0312, 
             sme3Dc, 
             shipsec1]