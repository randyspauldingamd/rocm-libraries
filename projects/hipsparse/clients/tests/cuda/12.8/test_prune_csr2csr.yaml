---
include: hipsparse_common.yaml


Tests:
- name: prune_csr2csr_bad_arg
  category: pre_checkin
  function: prune_csr2csr_bad_arg
  precision: *single_double_precisions

- name: prune_csr2csr
  category: quick
  function: prune_csr2csr
  precision: *single_double_precisions
  M: [10, 500, 872, 27463]
  N: [33, 242, 623, 29837]
  threshold: [0.0, 0.0012, 0.08736, 0.33333, 0.5, 1.7]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]
  baseB: [HIPSPARSE_INDEX_BASE_ZERO]

- name: prune_csr2csr_file
  category: pre_checkin
  function: prune_csr2csr
  precision: *single_double_precisions
  M: 1
  threshold: [0.0, 0.05, 0.2, 0.67, 0.75, 1.0]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  baseB: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  filename: [nos1,
             nos2,
             nos3,
             nos4,
             nos5,
             nos6,
             nos7]

- name: prune_csr2csr_file
  category: nightly
  function: prune_csr2csr
  precision: *single_only_precisions
  M: 1
  threshold: [0.0, 0.1, 0.45]
  baseA: [HIPSPARSE_INDEX_BASE_ONE]
  baseB: [HIPSPARSE_INDEX_BASE_ONE]
  filename: [rma10,
             shipsec1,
             scircuit,
             sme3Dc]

