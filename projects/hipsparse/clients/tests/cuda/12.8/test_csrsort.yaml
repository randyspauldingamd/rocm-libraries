---
include: hipsparse_common.yaml


Tests:
- name: csrsort_bad_arg
  category: pre_checkin
  function: csrsort_bad_arg

- name: csrsort
  category: quick
  function: csrsort
  M: [0, 10, 500, 872, 1000]
  N: [0, 33, 242, 623, 1000]
  permute: [0, 1]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]

- name: csrsort_file
  category: pre_checkin
  function: csrsort
  M: 1
  N: 1
  permute: [0, 1]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  filename: [nos1, 
             nos2,
             nos3,
             nos4,
             nos5,
             nos6,
             nos7]

- name: csrsort_file
  category: nightly
  function: csrsort
  M: 1
  N: 1
  permute: [0, 1]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]
  filename: [rma10, 
             bibd_22_8, 
             scircuit, 
             bmwcra_1,
             Chebyshev4,
             webbase-1M]