---
include: hipsparse_common.yaml


Tests:
- name: bsrmm_bad_arg
  category: pre_checkin
  function: bsrmm_bad_arg
  precision: *single_double_precisions_complex_real
  
- name: bsrmm
  category: quick
  function: bsrmm
  precision: *single_double_precisions_complex_real
  M: [42, 2059]
  N: [5, 7]
  K: [50, 1375]
  block_dim: [4, 7]
  alpha: [-0.5]
  alphai: [0.7]
  beta: [0.5]
  betai: [1.5]
  dirA: [HIPSPARSE_DIRECTION_ROW, HIPSPARSE_DIRECTION_COLUMN]
  transA: [HIPSPARSE_OPERATION_NON_TRANSPOSE]
  transB: [HIPSPARSE_OPERATION_NON_TRANSPOSE, HIPSPARSE_OPERATION_TRANSPOSE]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]

- name: bsrmm
  category: pre_checkin
  function: bsrmm
  precision: *single_only_precisions
  M: 1
  N: [4, 9, 23]
  K: 1
  block_dim: [2, 3, 5]
  alpha: [0.75]
  alphai: [0.4]
  beta: [-0.5]
  betai: [1.0]
  dirA: [HIPSPARSE_DIRECTION_ROW, HIPSPARSE_DIRECTION_COLUMN]
  transA: [HIPSPARSE_OPERATION_NON_TRANSPOSE]
  transB: [HIPSPARSE_OPERATION_NON_TRANSPOSE, HIPSPARSE_OPERATION_TRANSPOSE]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  filename: [nos1,
             nos2,
             nos3,
             nos4,
             nos5,
             nos6,
             nos7]

- name: bsrmm
  category: pre_checkin
  function: bsrmm
  precision: *double_only_precisions
  M: 1
  N: [3, 8, 15]
  K: 1
  block_dim: [6, 8, 10]
  alpha: [0.75]
  alphai: [0.4]
  beta: [-0.5]
  betai: [1.0]
  dirA: [HIPSPARSE_DIRECTION_ROW, HIPSPARSE_DIRECTION_COLUMN]
  transA: [HIPSPARSE_OPERATION_NON_TRANSPOSE]
  transB: [HIPSPARSE_OPERATION_NON_TRANSPOSE, HIPSPARSE_OPERATION_TRANSPOSE]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  filename: [nos1,
             nos2,
             nos3,
             nos4,
             nos5,
             nos6,
             nos7]
  graph_test: [true]

- name: bsrmm
  category: nightly
  function: bsrmm
  precision: *double_only_precisions
  M: 1
  N: [30, 60]
  K: 1
  block_dim: [2]
  alpha: [0.75]
  alphai: [0.4]
  beta: [-0.5]
  betai: [1.0]
  dirA: [HIPSPARSE_DIRECTION_COLUMN]
  transA: [HIPSPARSE_OPERATION_NON_TRANSPOSE]
  transB: [HIPSPARSE_OPERATION_NON_TRANSPOSE]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]
  filename: [rma10, 
             scircuit, 
             bmwcra_1]

- name: bsrmm
  category: nightly
  function: bsrmm
  precision: *double_only_precisions
  M: 1
  N: [41, 57]
  K: 1
  block_dim: [9]
  alpha: [0.75]
  alphai: [0.4]
  beta: [-0.5]
  betai: [1.0]
  dirA: [HIPSPARSE_DIRECTION_COLUMN]
  transA: [HIPSPARSE_OPERATION_NON_TRANSPOSE]
  transB: [HIPSPARSE_OPERATION_TRANSPOSE]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]
  filename: [mac_econ_fwd500,
             mc2depi,
             sme3Dc]