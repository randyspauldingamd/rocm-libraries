---
include: hipsparse_common.yaml


Tests:
- name: gemmi_bad_arg
  category: pre_checkin
  function: gemmi_bad_arg
  precision: *single_double_precisions_complex_real

- name: gemmi
  category: quick
  function: gemmi
  precision: *single_double_precisions_complex_real
  M: [0, 19, 78, 482]
  N: [0, 275, 759]
  K: [0, 173, 1375]
  alpha: [-0.5]
  alphai: [-0.5]
  beta: [0.5]
  betai: [-0.5]

- name: gemmi
  category: pre_checkin
  function: gemmi
  precision: *single_double_precisions_complex_real
  M: [300, 980, 2310]
  N: 1
  K: 1
  alpha: [-0.5]
  alphai: [-0.5]
  beta: [0.5]
  betai: [-0.5]
  filename: [nos1,
             nos2,
             nos3,
             nos4,
             nos5,
             nos6,
             nos7]

- name: gemmi
  category: nightly
  function: gemmi
  precision: *double_only_precisions
  M: [12, 21]
  N: 1
  K: 1
  alpha: [-0.5]
  alphai: [-0.5]
  beta: [0.5]
  betai: [-0.5]
  filename: [mc2depi,
             ASIC_320k,
             bibd_22_8,
             webbase-1M,
             rma10,
             scircuit,
             bmwcra_1,
             shipsec1,
             sme3Dc]

- name: gemmi
  category: pre_checkin
  function: gemmi
  precision: *single_only_precisions
  M: [230]
  N: 1
  K: 1
  alpha: [1.5]
  alphai: [-0.75]
  beta: [0.75]
  betai: [-1.5]
  filename: [nos6]
  graph_test: [true]