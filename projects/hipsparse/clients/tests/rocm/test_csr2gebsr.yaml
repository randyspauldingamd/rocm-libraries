---
include: hipsparse_common.yaml


Tests:
- name: csr2gebsr_bad_arg
  category: pre_checkin
  function: csr2gebsr_bad_arg
  precision: *single_double_precisions_complex_real

- name: csr2gebsr
  category: quick
  function: csr2gebsr
  precision: *single_double_precisions_complex_real
  M: [0, 3309]
  N: [0, 2276]
  row_block_dimA: [1, 3, 7]
  col_block_dimA: [1, 3, 7]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]
  baseB: [HIPSPARSE_INDEX_BASE_ONE]
  dirA: [HIPSPARSE_DIRECTION_ROW, HIPSPARSE_DIRECTION_COLUMN]

- name: csr2gebsr_file
  category: pre_checkin
  function: csr2gebsr
  precision: *single_double_precisions_complex_real
  M: 1
  row_block_dimA: [2, 5, 6]
  col_block_dimA: [2, 5, 6]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  baseB: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  dirA: [HIPSPARSE_DIRECTION_ROW, HIPSPARSE_DIRECTION_COLUMN]
  filename: [nos1,
             nos2,
             nos3,
             nos4,
             nos5,
             nos6,
             nos7]

- name: csr2gebsr_file
  category: nightly
  function: csr2gebsr
  precision: *single_only_precisions
  M: 1
  row_block_dimA: [4, 8]
  col_block_dimA: [5, 9]
  baseA: [HIPSPARSE_INDEX_BASE_ONE]
  baseB: [HIPSPARSE_INDEX_BASE_ONE]
  dirA: [HIPSPARSE_DIRECTION_ROW, HIPSPARSE_DIRECTION_COLUMN]
  filename: [rma10,
             mac_econ_fwd500,
             scircuit,
             bmwcra_1]

- name: csr2gebsr_graph_test
  category: pre_checkin
  function: csr2gebsr
  precision: *single_double_precisions_complex_real
  M: [1309]
  N: [1276]
  row_block_dimA: [3]
  col_block_dimA: [3]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]
  baseB: [HIPSPARSE_INDEX_BASE_ZERO]
  dirA: [HIPSPARSE_DIRECTION_ROW]
  graph_test: true
