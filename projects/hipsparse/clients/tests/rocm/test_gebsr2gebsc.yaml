---
include: hipsparse_common.yaml


Tests:
- name: gebsr2gebsc_bad_arg
  category: pre_checkin
  function: gebsr2gebsc_bad_arg
  precision: *single_double_precisions_complex_real
  
- name: gebsr2gebsc
  category: quick
  function: gebsr2gebsc
  precision: *single_double_precisions_complex_real
  M: [0, 981]
  N: [0, 1286]
  row_block_dimA: [2, 5]
  col_block_dimA: [3, 7]
  action: [HIPSPARSE_ACTION_NUMERIC]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]

- name: gebsr2gebsc_file
  category: pre_checkin
  function: gebsr2gebsc
  precision: *single_double_precisions_complex_real
  M: 1
  row_block_dimA: [3, 7, 11]
  col_block_dimA: [5, 9]
  action: [HIPSPARSE_ACTION_NUMERIC]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  filename: [nos1,
             nos2,
             nos3,
             nos4,
             nos5,
             nos6,
             nos7]

- name: gebsr2gebsc_file
  category: nightly
  function: gebsr2gebsc
  precision: *single_only_precisions
  M: 1
  row_block_dimA: [4]
  col_block_dimA: [6]
  action: [HIPSPARSE_ACTION_NUMERIC]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]
  filename: [mc2depi,
             rma10,
             scircuit]