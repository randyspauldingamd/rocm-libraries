---
include: hipsparse_common.yaml


Tests:
- name: bsrilu02_bad_arg
  category: pre_checkin
  function: bsric02_bad_arg
  precision: *single_double_precisions_complex_real
  
- name: bsrilu02
  category: quick
  function: bsrilu02
  precision: *single_double_precisions_complex_real
  M: [0, 50, 426]
  block_dim: [1, 3, 5, 9]
  numericboost: [0]
  boosttol: [1.1]
  boostval: [0.3]
  boostvali: [0.2]
  dirA: [HIPSPARSE_DIRECTION_ROW, HIPSPARSE_DIRECTION_COLUMN]
  solve_policy: [HIPSPARSE_SOLVE_POLICY_NO_LEVEL, HIPSPARSE_SOLVE_POLICY_USE_LEVEL]
  baseA: [HIPSPARSE_INDEX_BASE_ONE]

- name: bsrilu02
  category: pre_checkin
  function: bsrilu02
  precision: *single_double_precisions
  M: 1
  block_dim: [1, 3, 5, 9]
  numericboost: [0]
  boosttol: [1.1]
  boostval: [0.3]
  boostvali: [0.2]
  dirA: [HIPSPARSE_DIRECTION_ROW, HIPSPARSE_DIRECTION_COLUMN]
  solve_policy: [HIPSPARSE_SOLVE_POLICY_NO_LEVEL, HIPSPARSE_SOLVE_POLICY_USE_LEVEL]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  filename: [nos1,
             nos2,
             nos3,
             nos4,
             nos5, 
             nos6, 
             nos7]