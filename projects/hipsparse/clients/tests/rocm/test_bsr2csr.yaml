---
include: hipsparse_common.yaml


Tests:
- name: bsr2csr_bad_arg
  category: pre_checkin
  function: bsr2csr_bad_arg
  precision: *single_double_precisions_complex_real
  
- name: bsr2csr
  category: quick
  function: bsr2csr
  precision: *single_double_precisions_complex_real
  M: [0, 872, 2145]
  N: [0, 1276, 2928]
  block_dim: [1, 2, 4, 7, 16]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]
  baseB: [HIPSPARSE_INDEX_BASE_ZERO]
  dirA: [HIPSPARSE_DIRECTION_ROW, HIPSPARSE_DIRECTION_COLUMN]

- name: bsr2csr_file
  category: pre_checkin
  function: bsr2csr
  precision: *single_double_precisions_complex_real
  M: 1
  block_dim: [3, 5, 6, 8, 11, 12, 14]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  baseB: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  dirA: [HIPSPARSE_DIRECTION_ROW, HIPSPARSE_DIRECTION_COLUMN]
  filename: [nos1,
             nos2,
             nos3,
             nos4,
             nos5,
             nos6,
             nos7]

- name: bsr2csr_file
  category: nightly
  function: bsr2csr
  precision: *single_only_precisions
  M: 1
  block_dim: [9]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]
  baseB: [HIPSPARSE_INDEX_BASE_ONE]
  dirA: [HIPSPARSE_DIRECTION_ROW, HIPSPARSE_DIRECTION_COLUMN]
  filename: [bmwcra_1,
             shipsec1,
             rma10,
             scircuit,
             sme3Dc]

- name: bsr2csr_graph_test
  category: pre_checkin
  function: bsr2csr
  precision: *single_double_precisions_complex_real
  M: [1472]
  N: [1976]
  block_dim: [4]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]
  baseB: [HIPSPARSE_INDEX_BASE_ZERO]
  dirA: [HIPSPARSE_DIRECTION_ROW]
  graph_test: true
