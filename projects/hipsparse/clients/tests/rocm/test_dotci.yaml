---
include: hipsparse_common.yaml


Tests:
- name: dotci_bad_arg
  category: pre_checkin
  function: dotci_bad_arg
  precision: *single_double_precisions_complex

- name: dotci
  category: quick
  function: dotci
  precision: *single_only_precisions_complex
  N: [5000]
  nnz: [0, 500, 2500, 5000]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]

- name: dotci
  category: pre_checkin
  function: dotci
  precision: *single_double_precisions_complex
  N: [15332, 22031]
  nnz: [0, 1543, 7111, 10000, 15332]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]

- name: dotci
  category: nightly
  function: dotci
  precision: *double_only_precisions_complex
  N: [20000000, 40000000]
  nnz: [0, 2000000, 3000000]
  baseA: [HIPSPARSE_INDEX_BASE_ONE]
