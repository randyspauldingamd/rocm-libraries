---
include: hipsparse_common.yaml

Tests:
- name: bsrmv_bad_arg
  category: pre_checkin
  function: bsrmv_bad_arg
  precision: *single_double_precisions_complex_real
  
- name: bsrmv
  category: quick
  function: bsrmv
  precision: *single_double_precisions_complex_real
  M: [0, 500, 7111]
  N: [0, 842, 4441]
  block_dim: [1, 3, 5, 9]
  alpha: [0.5]
  alphai: [-0.2]
  beta: [0.7]
  betai: [1.7]
  dirA: [HIPSPARSE_DIRECTION_ROW, HIPSPARSE_DIRECTION_COLUMN]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]

- name: bsrmv
  category: pre_checkin
  function: bsrmv
  precision: *single_double_precisions_complex_real
  M: [1]
  N: [1]
  block_dim: [2, 4, 6, 7]
  alpha: [0.6]
  alphai: [-1.2]
  beta: [0.5]
  betai: [0.7]
  dirA: [HIPSPARSE_DIRECTION_ROW, HIPSPARSE_DIRECTION_COLUMN]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  filename: [nos1,
             nos2,
             nos3,
             nos4,
             nos5,
             nos6,
             nos7]

- name: bsrmv
  category: nightly
  function: bsrmv
  precision: *double_only_precisions
  M: [1]
  N: [1]
  block_dim: [2, 5, 8, 12]
  alpha: [2.0]
  alphai: [-0.5]
  beta: [1.0]
  betai: [1.1]
  dirA: [HIPSPARSE_DIRECTION_ROW, HIPSPARSE_DIRECTION_COLUMN]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]
  filename: [shipsec1,
             scircuit,
             bmwcra_1,
             rma10,
             mc2depi,
             sme3Dc]

- name: bsrmv
  category: pre_checkin
  function: bsrmv
  precision: *double_only_precisions_complex_real
  M: [1]
  N: [1]
  block_dim: [4, 6]
  alpha: [0.8]
  alphai: [1.2]
  beta: [-0.5]
  betai: [0.2]
  dirA: [HIPSPARSE_DIRECTION_ROW]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]
  filename: [nos7,
             mc2depi]
  graph_test: [true]