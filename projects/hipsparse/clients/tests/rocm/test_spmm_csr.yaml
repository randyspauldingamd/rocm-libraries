---
include: hipsparse_common.yaml


Tests:
- name: spmm_csr_bad_arg
  category: pre_checkin
  function: spmm_csr_bad_arg
  indextype: *i32_i64
  precision: *single_double_precisions_complex_real

- name: spmm_csr
  category: quick
  function: spmm_csr
  indextype: *i32_i64
  precision: *single_double_precisions_complex_real
  M: [102]
  N: [56]
  K: [83]
  alpha: [2.0]
  alphai: [0.0]
  beta: [1.0]
  betai: [0.0]
  transA: [HIPSPARSE_OPERATION_NON_TRANSPOSE, HIPSPARSE_OPERATION_TRANSPOSE]
  transB: [HIPSPARSE_OPERATION_NON_TRANSPOSE, HIPSPARSE_OPERATION_TRANSPOSE]
  orderB: [HIPSPARSE_ORDER_COL, HIPSPARSE_ORDER_ROW]
  orderC: [HIPSPARSE_ORDER_COL, HIPSPARSE_ORDER_ROW]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  spmm_alg: [HIPSPARSE_SPMM_ALG_DEFAULT, 
             HIPSPARSE_SPMM_CSR_ALG1,
             HIPSPARSE_SPMM_CSR_ALG2]

- name: spmm_csr
  category: pre_checkin
  function: spmm_csr
  indextype: *i32_i64
  precision: *single_double_precisions_complex_real
  M: 1
  N: [25]
  K: 1
  alpha: [2.0]
  alphai: [0.0]
  beta: [1.0]
  betai: [0.0]
  transA: [HIPSPARSE_OPERATION_NON_TRANSPOSE, HIPSPARSE_OPERATION_TRANSPOSE]
  transB: [HIPSPARSE_OPERATION_NON_TRANSPOSE, HIPSPARSE_OPERATION_TRANSPOSE]
  orderB: [HIPSPARSE_ORDER_COL, HIPSPARSE_ORDER_ROW]
  orderC: [HIPSPARSE_ORDER_COL, HIPSPARSE_ORDER_ROW]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  spmm_alg: [HIPSPARSE_SPMM_ALG_DEFAULT, 
             HIPSPARSE_SPMM_CSR_ALG1,
             HIPSPARSE_SPMM_CSR_ALG2]
  filename: [nos1,
             nos4, 
             nos5]

- name: spmm_csr
  category: nightly
  function: spmm_csr
  indextype: *i32
  precision: *double_only_precisions
  M: 1
  N: [15]
  K: 1
  alpha: [2.0]
  alphai: [0.0]
  beta: [1.0]
  betai: [0.0]
  transA: [HIPSPARSE_OPERATION_NON_TRANSPOSE, HIPSPARSE_OPERATION_TRANSPOSE]
  transB: [HIPSPARSE_OPERATION_NON_TRANSPOSE, HIPSPARSE_OPERATION_TRANSPOSE]
  orderB: [HIPSPARSE_ORDER_COL, HIPSPARSE_ORDER_ROW]
  orderC: [HIPSPARSE_ORDER_COL, HIPSPARSE_ORDER_ROW]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]
  spmm_alg: [HIPSPARSE_SPMM_ALG_DEFAULT, 
             HIPSPARSE_SPMM_CSR_ALG1,
             HIPSPARSE_SPMM_CSR_ALG2]
  filename: [Chebyshev4]

- name: spmm_csr
  category: pre_checkin
  function: spmm_csr
  indextype: *i64
  precision: *double_only_precisions
  M: 1
  N: [64]
  K: 1
  alpha: [2.0]
  alphai: [0.0]
  beta: [1.0]
  betai: [0.0]
  transA: [HIPSPARSE_OPERATION_TRANSPOSE]
  transB: [HIPSPARSE_OPERATION_NON_TRANSPOSE]
  orderB: [HIPSPARSE_ORDER_ROW]
  orderC: [HIPSPARSE_ORDER_COL]
  baseA: [HIPSPARSE_INDEX_BASE_ONE]
  spmm_alg: [HIPSPARSE_SPMM_ALG_DEFAULT, 
             HIPSPARSE_SPMM_CSR_ALG1,
             HIPSPARSE_SPMM_CSR_ALG2]
  filename: [nos5]
  graph_test: true