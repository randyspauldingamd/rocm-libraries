---
include: hipsparse_common.yaml


Tests:
- name: prune_dense2csr_by_percentage_bad_arg
  category: pre_checkin
  function: prune_dense2csr_by_percentage_bad_arg
  precision: *single_double_precisions
  
- name: prune_dense2csr_by_percentage
  category: quick
  function: prune_dense2csr_by_percentage
  precision: *single_double_precisions
  M: [10, 500, 872]
  N: [33, 242, 623]
  lda: [1000]
  percentage: [0, 50, 100]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]

- name: prune_dense2csr_by_percentage
  category: pre_checkin
  function: prune_dense2csr_by_percentage
  precision: *single_double_precisions
  M: [1243, 1482]
  N: [1428, 1874]
  lda: [2000]
  percentage: [0, 60, 100]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]

- name: prune_dense2csr_by_percentage
  category: nightly
  function: prune_dense2csr_by_percentage
  precision: *single_only_precisions
  M: [2347, 5476]
  N: [2983, 6234]
  lda: [6000]
  percentage: [0, 20, 50, 80, 100]
  baseA: [HIPSPARSE_INDEX_BASE_ONE]

