---
include: hipsparse_common.yaml


Tests:
- name: spmv_sell_bad_arg
  category: pre_checkin
  function: spmv_sell_bad_arg
  indextype: *i32_i64
  precision: *single_double_precisions_complex_real

- name: spmv_sell
  category: quick
  function: spmv_sell
  indextype: *i32_i64
  precision: *single_double_precisions_complex_real
  M: [50]
  N: [84]
  slice_size: [2, 3, 4]
  alpha: [2.0]
  alphai: [0.2]
  beta: [1.0]
  betai: [0.4]
  transA: [HIPSPARSE_OPERATION_NON_TRANSPOSE]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  spmv_alg: [HIPSPARSE_SPMV_ALG_DEFAULT, 
             HIPSPARSE_SPMV_SELL_ALG1]

- name: spmv_sell
  category: pre_checkin
  function: spmv_sell
  indextype: *i32_i64
  precision: *single_double_precisions_complex_real
  M: 1
  N: 1
  slice_size: [5, 6, 7]
  alpha: [2.0]
  alphai: [-1.0]
  beta: [1.0]
  betai: [0.8]
  transA: [HIPSPARSE_OPERATION_NON_TRANSPOSE]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  spmv_alg: [HIPSPARSE_SPMV_ALG_DEFAULT, 
             HIPSPARSE_SPMV_SELL_ALG1]
  filename: [nos1,
             nos2,
             nos3,
             nos4, 
             nos5,
             nos6,
             nos7]

- name: spmv_sell
  category: pre_checkin
  function: spmv_sell
  indextype: *i32
  precision: *double_only_precisions
  M: 1
  N: 1
  slice_size: [2, 8, 9]
  alpha: [2.0]
  alphai: [0.0]
  beta: [1.0]
  betai: [0.0]
  transA: [HIPSPARSE_OPERATION_NON_TRANSPOSE]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]
  spmv_alg: [HIPSPARSE_SPMV_ALG_DEFAULT, 
             HIPSPARSE_SPMV_SELL_ALG1]
  filename: [Chebyshev4,
             shipsec1,
             bibd_22_8,
             scircuit]