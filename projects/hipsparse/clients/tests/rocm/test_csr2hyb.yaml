---
include: hipsparse_common.yaml


Tests:
- name: csr2hyb_bad_arg
  category: pre_checkin
  function: csr2hyb_bad_arg
  precision: *single_double_precisions_complex_real

- name: csr2hyb
  category: quick
  function: csr2hyb
  precision: *single_double_precisions_complex_real
  M: [0, 10, 500, 872]
  N: [0, 33, 242, 623]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]
  part: [HIPSPARSE_HYB_PARTITION_AUTO, HIPSPARSE_HYB_PARTITION_MAX, HIPSPARSE_HYB_PARTITION_USER]
  ell_width: [-33, -1, 0, 2147483647]

- name: csr2hyb_file
  category: pre_checkin
  function: csr2hyb
  precision: *single_double_precisions_complex_real
  M: 1
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  part: [HIPSPARSE_HYB_PARTITION_AUTO, HIPSPARSE_HYB_PARTITION_MAX, HIPSPARSE_HYB_PARTITION_USER]
  ell_width: [-33, -1, 0, 2147483647]
  filename: [nos1,
             nos2,
             nos3,
             nos4,
             nos5,
             nos6,
             nos7]
