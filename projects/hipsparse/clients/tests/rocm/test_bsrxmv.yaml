---
include: hipsparse_common.yaml

Tests:
- name: bsrxmv_bad_arg
  category: pre_checkin
  function: bsrxmv_bad_arg
  precision: *single_double_precisions_complex_real

- name: bsrxmv
  category: quick
  function: bsrxmv
  precision: *single_double_precisions_complex_real
  M: [500, 7111]
  N: [842, 4441]
  block_dim: [3, 5, 9]
  alpha: [0.5]
  alphai: [-0.2]
  beta: [0.7]
  betai: [1.7]
  dirA: [HIPSPARSE_DIRECTION_ROW, HIPSPARSE_DIRECTION_COLUMN]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]

- name: bsrxmv
  category: pre_checkin
  function: bsrxmv
  precision: *single_double_precisions_complex_real
  M: [1]
  N: [1]
  block_dim: [2, 4, 6, 7]
  alpha: [0.5]
  alphai: [-0.2]
  beta: [0.7]
  betai: [1.7]
  dirA: [HIPSPARSE_DIRECTION_ROW, HIPSPARSE_DIRECTION_COLUMN]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  filename: [nos1,
             nos2,
             nos3,
             nos4,
             nos5,
             nos6,
             nos7]