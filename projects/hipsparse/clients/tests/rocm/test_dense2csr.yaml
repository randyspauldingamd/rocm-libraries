---
include: hipsparse_common.yaml


Tests:
- name: dense2csr_bad_arg
  category: pre_checkin
  function: dense2csr_bad_arg
  precision: *single_double_precisions_complex_real
  
- name: dense2csr
  category: quick
  function: dense2csr
  precision: *single_double_precisions_complex_real
  M: [0, 40, 400, 781]
  N: [0, 27, 364, 635]
  lda: [1000]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]

- name: dense2csr
  category: pre_checkin
  function: dense2csr
  precision: *single_double_precisions_complex_real
  M: [1000, 2000]
  N: [1000]
  lda: [2000]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]

- name: dense2csr
  category: nightly
  function: dense2csr
  precision: *single_double_precisions_complex_real
  M: [4000]
  N: [4000]
  lda: [4000]
  baseA: [HIPSPARSE_INDEX_BASE_ONE]