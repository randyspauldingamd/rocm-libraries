---
include: hipsparse_common.yaml

Tests:
- name: roti_bad_arg
  category: pre_checkin
  function: roti_bad_arg
  precision: *single_double_precisions

- name: roti
  category: quick
  function: roti
  precision: *single_only_precisions
  N: [5000]
  nnz: [0, 10, 500, 2500, 5000]
  c: [0.0, 1.0]
  s: [0.0, 4.0]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]

- name: roti
  category: pre_checkin
  function: roti
  precision: *single_double_precisions
  N: [12000, 15332, 22031]
  nnz: [0, 5, 10, 500, 1000, 7111, 10000, 12000]
  c: [-2.0, 0.0, 1.0]
  s: [-3.0, 0.0, 4.0]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]

- name: roti
  category: nightly
  function: roti
  precision: *single_double_precisions
  N: [100000, 500000]
  nnz: [0, 1000, 10000, 50000, 100000]
  c: [-2.0, 0.0, 1.0]
  s: [-3.0, 0.0, 4.0]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]

- name: roti
  category: pre_checkin
  function: roti
  precision: *single_double_precisions
  N: [16586]
  nnz: [6879]
  c: [0.8]
  s: [0.6]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]
  graph_test: true
