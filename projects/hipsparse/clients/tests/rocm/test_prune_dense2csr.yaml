---
include: hipsparse_common.yaml


Tests:
- name: prune_dense2csr_bad_arg
  category: pre_checkin
  function: prune_dense2csr_bad_arg
  precision: *single_double_precisions
  
- name: prune_dense2csr
  category: quick
  function: prune_dense2csr
  precision: *single_double_precisions
  M: [10, 500, 872]
  N: [33, 242, 623]
  lda: [1000]
  threshold: [0.0, 0.07, 0.33333, 0.5, 1.7]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]

- name: prune_dense2csr
  category: pre_checkin
  function: prune_dense2csr
  precision: *single_double_precisions
  M: [687, 1285]
  N: [1652]
  lda: [1300]
  threshold: [0.0, 0.06, 0.43, 1.0]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]

- name: prune_dense2csr
  category: nightly  
  function: prune_dense2csr
  precision: *single_double_precisions
  M: [4592, 6710]
  N: [4330]
  lda: [7000]
  threshold: [0.75, 0.87]
  baseA: [HIPSPARSE_INDEX_BASE_ONE]

