---
include: hipsparse_common.yaml


Tests:
- name: csrsm2_bad_arg
  category: pre_checkin
  function: csrsm2_bad_arg
  precision: *single_double_precisions_complex_real
  
- name: csrsm2
  category: quick
  function: csrsm2
  precision: *single_double_precisions_complex_real
  M: [0, 647]
  N: [17]
  alpha: [0.3]
  alphai: [0.5]
  diag_type: [HIPSPARSE_DIAG_TYPE_NON_UNIT]
  fill_mode: [HIPSPARSE_FILL_MODE_LOWER, HIPSPARSE_FILL_MODE_UPPER]
  solve_policy: [HIPSPARSE_SOLVE_POLICY_NO_LEVEL, HIPSPARSE_SOLVE_POLICY_USE_LEVEL]
  transA: [HIPSPARSE_OPERATION_NON_TRANSPOSE, HIPSPARSE_OPERATION_TRANSPOSE]
  transB: [HIPSPARSE_OPERATION_NON_TRANSPOSE, HIPSPARSE_OPERATION_TRANSPOSE]
  baseA: [HIPSPARSE_INDEX_BASE_ONE]

- name: csrsm2
  category: pre_checkin
  function: csrsm2
  precision: *double_only_precisions
  M: 1
  N: [23]
  alpha: [2.3]
  alphai: [-0.2]
  diag_type: [HIPSPARSE_DIAG_TYPE_NON_UNIT]
  fill_mode: [HIPSPARSE_FILL_MODE_LOWER, HIPSPARSE_FILL_MODE_UPPER]
  solve_policy: [HIPSPARSE_SOLVE_POLICY_NO_LEVEL, HIPSPARSE_SOLVE_POLICY_USE_LEVEL]
  transA: [HIPSPARSE_OPERATION_NON_TRANSPOSE, HIPSPARSE_OPERATION_TRANSPOSE]
  transB: [HIPSPARSE_OPERATION_NON_TRANSPOSE, HIPSPARSE_OPERATION_TRANSPOSE]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  filename: [nos1,
             nos2,
             nos3,
             nos4,
             nos5,
             nos6,
             nos7]

- name: csrsm2
  category: nightly
  function: csrsm2
  precision: *double_only_precisions
  M: 1
  N: [45]
  alpha: [1.3]
  alphai: [-1.2]
  diag_type: [HIPSPARSE_DIAG_TYPE_NON_UNIT]
  fill_mode: [HIPSPARSE_FILL_MODE_LOWER, HIPSPARSE_FILL_MODE_UPPER]
  solve_policy: [HIPSPARSE_SOLVE_POLICY_NO_LEVEL, HIPSPARSE_SOLVE_POLICY_USE_LEVEL]
  transA: [HIPSPARSE_OPERATION_NON_TRANSPOSE, HIPSPARSE_OPERATION_TRANSPOSE]
  transB: [HIPSPARSE_OPERATION_NON_TRANSPOSE, HIPSPARSE_OPERATION_TRANSPOSE]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]
  filename: [bmwcra_1,
             shipsec1]

- name: csrsm2
  category: pre_checkin
  function: csrsm2
  precision: *double_only_precisions
  M: 1
  N: [33]
  alpha: [2.3]
  alphai: [-0.2]
  diag_type: [HIPSPARSE_DIAG_TYPE_NON_UNIT]
  fill_mode: [HIPSPARSE_FILL_MODE_LOWER]
  solve_policy: [HIPSPARSE_SOLVE_POLICY_NO_LEVEL]
  transA: [HIPSPARSE_OPERATION_NON_TRANSPOSE, HIPSPARSE_OPERATION_TRANSPOSE]
  transB: [HIPSPARSE_OPERATION_NON_TRANSPOSE, HIPSPARSE_OPERATION_TRANSPOSE]
  baseA: [HIPSPARSE_INDEX_BASE_ONE]
  filename: [nos5]
  graph_test: [true]

