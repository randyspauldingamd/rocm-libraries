---
include: hipsparse_common.yaml


Tests:
- name: csrgeam_bad_arg
  category: pre_checkin
  function: csrgeam_bad_arg
  precision: *single_double_precisions_complex_real

- name: csrgeam
  category: quick
  function: csrgeam
  precision: *single_double_precisions_complex_real
  M: [0, 687, 3756]
  N: [0, 928, 1928]
  alpha: [-1.0]
  alphai: [0.5]
  beta: [-2.0]
  betai: [0.25]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  baseB: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  baseC: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]

- name: csrgeam
  category: pre_checkin
  function: csrgeam
  precision: *single_double_precisions
  M: 1
  N: 1
  alpha: [1.0]
  alphai: [-0.75]
  beta: [2.0]
  betai: [0.75]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  baseB: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  baseC: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  filename: [nos1,
             nos2,
             nos3,
             nos4,
             nos5,
             nos6,
             nos7]

- name: csrgeam
  category: pre_checkin
  function: csrgeam
  precision: *single_double_precisions_complex
  M: [534, 876]
  N: [423, 654]
  alpha: [1.0]
  alphai: [-0.75]
  beta: [2.0]
  betai: [0.75]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  baseB: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  baseC: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]

- name: csrgeam
  category: pre_checkin
  function: csrgeam
  precision: *double_only_precisions
  M: 1
  N: 1
  alpha: [1.0]
  alphai: [-0.75]
  beta: [2.0]
  betai: [0.75]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO]
  baseB: [HIPSPARSE_INDEX_BASE_ONE]
  baseC: [HIPSPARSE_INDEX_BASE_ZERO]
  filename: [mac_econ_fwd500,
             mc2depi,
             scircuit]
            
