# hipSPARSE Test Categories Configuration
# Organizes GTest suites into CTest categories for CI/CD pipeline efficiency.
#
# The hipsparse-test binary uses INSTANTIATE_TEST_SUITE_P with category prefixes:
#   quick/testclass.category/suffix
#   pre_checkin/testclass.category/suffix
#   nightly/testclass.category/suffix
#   stress/testclass.category/suffix
#   known_bug/testclass.category/suffix

test_categories:
  quick:
    description: "Fast sanity checks (target: < 5 min)"
    test_patterns:
      - "quick/*"
    exclude:
      - "*known_bug*"
    labels:
      - "quick"
      - "pre-commit"

  standard:
    description: "Pre-checkin validation (target: < 30 min)"
    test_patterns:
      - "quick/*"
      - "pre_checkin/*"
    exclude:
      - "*known_bug*"
    labels:
      - "standard"
      - "pr"

  comprehensive:
    description: "Nightly comprehensive tests (target: < 4 hours)"
    test_patterns:
      - "quick/*"
      - "pre_checkin/*"
      - "nightly/*"
    exclude:
      - "*known_bug*"
    labels:
      - "comprehensive"
      - "nightly"

  full:
    description: "Test full suite including stress tests"
    test_patterns:
      - "quick/*"
      - "pre_checkin/*"
      - "nightly/*"
      - "stress/*"
    exclude:
      - "*known_bug*"
    labels:
      - "full"
      - "weekly"

  ffm-quick:
    description: "FFM NPI simulation tests for PR pipelines (target: < 2 hours on FFM runner)"
    test_patterns:
      - "quick/*"
    exclude:
      - "*known_bug*"
    labels:
      - "ffm-quick"
      - "ffm"

  ffm-full:
    description: "FFM NPI nightly tests (initially alias for ffm-quick; expand as capacity grows)"
    test_patterns:
      - "quick/*"
    exclude:
      - "*known_bug*"
    labels:
      - "ffm-full"
      - "ffm"

# GPU-specific CTest suites (hipsparse-test_{category}_gfx1151_suite) exclude f64 real/complex
# parameterized tests on Strix Halo (gfx1151). Run those *_gfx1151_* tests on that hardware;
# other GPUs use the standard category suites without these exclusions.
exclude_gpu:
  exclude_gpu_gfx1151:
    test_patterns:
      - "*f64_r*"
      - "*f64_c*"
    labels:
      - quick
      - standard
      - comprehensive
      - full
      - ex_gpu_gfx1151

execution_settings:
  timeout_multiplier: 1
  category_timeouts:
    quick: 300
    standard: 1800
    comprehensive: 14400
    full: 28800
    ffm-quick: 7200    # 2 hours — hard FFM PR budget
    ffm-full: 7200     # 2 hours — initially same as ffm-quick
