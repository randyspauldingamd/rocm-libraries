# hipSPARSELt Test Categories Configuration
# Aligned with rocJenkins job types (precheckin, extended, weekly) and Test Filter Standardization POC.

test_categories:
  quick:
    description: "Smoke - same as Jenkins smoke (timeout: 5 mins)"
    test_patterns:
      - "*smoke*"
    exclude:
      - "*known_bug*"
      - "*spmm*"
    labels:
      - "smoke"
      - "quick"
      - "precheckin"
      - "standard"
      - "comprehensive"
      - "nightly"
      - "extended"      
      - "stress"
      - "weekly"      
      - "full"

  standard:
    description: "Precheckin - same as Jenkins precheckin (timeout: 30 mins)"
    test_patterns:
      - "*quick*"
      - "*pre_checkin*"
    exclude:
      - "*known_bug*"
      - "*spmm*"
    labels:
      - "precheckin"
      - "standard"
      - "comprehensive"
      - "nightly"
      - "extended"
      - "stress"
      - "weekly"
      - "full"

  comprehensive:
    description: "Extended - same as Jenkins extended/nightly (timeout: 2 hours)"
    test_patterns:
      - "*nightly*"
    exclude:
      - "*known_bug*"
      - "*spmm*"
    labels:
      - "comprehensive"
      - "nightly"
      - "extended"
      - "stress"
      - "weekly" 
      - "full"

  full:
    description: "Stress / weekly - same as Jenkins weekly (stress + HMM)"
    test_patterns:
      - "*HMM*"
    exclude:
      - "*known_bug*"
      - "*spmm*"
    labels:
      - "stress"
      - "weekly"
      - "full"

  spmm_quick:
    description: "Smoke - sparse kernel only (timeout: 5 mins)"
    test_patterns:
      - "*smoke*spmm*"
    exclude:
      - "*known_bug*"
    labels:
      - "spmm"
      - "spmm_quick"
      - "spmm_smoke"
      - "spmm_precheckin"
      - "spmm_standard"
      - "spmm_comprehensive"
      - "spmm_nightly"
      - "spmm_extended"
      - "spmm_stress"
      - "spmm_weekly"
      - "spmm_full"

  spmm_standard:
    description: "Precheckin - sparse kernel only (timeout: 30 mins)"
    test_patterns:
      - "*quick*spmm*"
      - "*pre_checkin*spmm*"
    exclude:
      - "*known_bug*"
    labels:
      - "spmm"
      - "spmm_precheckin"
      - "spmm_standard"
      - "spmm_comprehensive"
      - "spmm_nightly"
      - "spmm_extended"
      - "spmm_stress"
      - "spmm_weekly"
      - "spmm_full"

  spmm_comprehensive:
    description: "Extended - sparse kernel only (timeout: 2 hours)"
    test_patterns:
      - "*nightly*spmm*"
    exclude:
      - "*known_bug*"
    labels:
      - "spmm"
      - "spmm_comprehensive"
      - "spmm_nightly"
      - "spmm_extended"
      - "spmm_stress"
      - "spmm_weekly"
      - "spmm_full"

  spmm_full:
    description: "Stress / weekly - sparse kernel only (stress + HMM)"
    test_patterns:
      - "*HMM*spmm*"
    exclude:
      - "*known_bug*"
    labels:
      - "spmm"
      - "spmm_stress"
      - "spmm_weekly"
      - "spmm_full"

# GPU-specific exclusions can be added here when needed (see shared/ctest/README.md).
# exclude_gpu:
#   exclude_gpu_gfxXXXX:
#     test_patterns: [...]
#     labels: ["quick", "standard", "comprehensive", "stress", "ex_gpu_gfxXXXX"]

execution_settings:
  default_timeout: 300
  timeout_multiplier: 1
  environment:
    OPENBLAS_NUM_THREADS: "48"
    OMP_NUM_THREADS: "48"
  category_timeouts:
    quick: 300    # 5 mins (quick suite can exceed 300s on some systems)
    standard: 1800    # 30 mins (standard can take over an hour)
    comprehensive: 7200   # 2 hours
    full: 86400       # 24 hours
    spmm_quick: 300
    spmm_standard: 1800
    spmm_comprehensive: 7200
    spmm_full: 86400