# rocRAND Test Categories Configuration
#
# Drives the shared rocm-libraries CTest categorization defined in
# rocm-libraries/shared/ctest/. For each rocRAND test binary, the parser
# generates one CTest entry per category below, invoking the binary with a
# `--gtest_filter` built from `test_patterns` (positives) and `exclude`
# (negatives), and tagging the entry with the category `labels` and timeout.
#
# Patterns are GoogleTest filter patterns (`*` = any characters). They are
# applied to every rocRAND test binary; binaries whose tests do not match a
# given pattern simply run zero tests for that category and pass quickly.
#
# Useful invocations:
#   ctest -L quick
#   ctest -L standard
#
# After install, run from the project's install bindir:
#   cd ${ROCM_PATH}/bin/rocRAND && ctest -L quick

test_categories:
  quick:
    description: "Fast sanity checks - mirrors TheRock test_rocrand.py QUICK_TESTS (target: < 5 min)"
    test_patterns:
      - "*basic_tests*"
      - "*config_dispatch_tests.*"
      - "*cpp_utils_tests.*"
      - "*cpp_wrapper*"
      - "*distributions/*"
      - "*generate_host_test/*"
      - "*generate_long_long_tests/*"
      - "*generate_normal_tests/*"
      - "*generate_uniform_tests/*"
      - "*generator_type_tests.*"
      - "*kernel_lfsr113*"
      - "*kernel_lfsr113_poisson/*"
      - "*kernel_mrg/*"
      - "*kernel_mtgp32*"
      - "*kernel_mtgp32_poisson/*"
      - "*kernel_philox4x32_10*"
      - "*kernel_philox4x32_10_poisson/*"
      - "*kernel_scrambled_sobol32*"
      - "*kernel_scrambled_sobol32_poisson/*"
      - "*kernel_scrambled_sobol64*"
      - "*kernel_scrambled_sobol64_poisson/*"
      - "*kernel_sobol32*"
      - "*kernel_sobol32_poisson/*"
      - "*kernel_sobol64*"
      - "*kernel_sobol64_poisson/*"
      - "*kernel_threefry2x32_20*"
      - "*kernel_threefry2x32_20_poisson/*"
      - "*kernel_threefry2x64_20*"
      - "*kernel_threefry2x64_20_poisson/*"
      - "*kernel_threefry4x32_20*"
      - "*kernel_threefry4x32_20_poisson/*"
      - "*kernel_threefry4x64_20*"
      - "*kernel_threefry4x64_20_poisson/*"
      - "*kernel_xorwow*"
      - "*kernel_xorwow_poisson/*"
      - "*lfsr113_engine_api_tests.*"
      - "*lfsr113_generator/*"
      - "*lfsr113_generator_prng_tests/*"
      - "*linkage_tests.*"
      - "*log_normal_distribution_tests.*"
      - "*log_normal_tests.*"
      - "*mrg/*"
      - "*mrg_generator_prng_tests.*"
      - "*mrg_log_normal_distribution_tests/*"
      - "*mrg_normal_distribution_tests/*"
      - "*mrg_prng_engine_tests/*"
      - "*mrg_uniform_distribution_tests/*"
      - "*mtgp32_generator/*"
      - "*normal_distribution_tests.*"
      - "*philox4x32_10_generator/*"
      - "*philox_prng_state_tests.*"
      - "*poisson_distribution_tests/*"
      - "*poisson_tests.*"
      - "*rocrand_generate_tests.*"
      - "*rocrand_hipgraph_generate_tests.*"
      - "*sobol_log_normal_distribution_tests/*"
      - "*sobol_normal_distribution_tests.*"
      - "*sobol_qrng_tests/*"
      - "*threefry2x32_20_generator/*"
      - "*threefry2x64_20_generator/*"
      - "*threefry4x32_20_generator/*"
      - "*threefry4x64_20_generator/*"
      - "*threefry_prng_state_tests.*"
      - "*xorwow_engine_type_test.*"
      - "*xorwow_generator/*"
    exclude:
      # Trailing negative filter from TheRock's QUICK_TESTS list:
      #   "-*basic_tests/rocrand_basic_tests.rocrand_create_destroy_generator_test/10*"
      - "*basic_tests/rocrand_basic_tests.rocrand_create_destroy_generator_test/10*"
    labels:
      - "quick"

  standard:
    description: "Full gtest run (filter '*') - shared across PR / nightly / weekly tiers"
    test_patterns:
      - "*"
    exclude:
    labels:
      - "standard"
      - "comprehensive"
      - "full"

  ffm-quick:
    description: "Fast FFM tests (target: < 120 min)"
    test_patterns:
      - "*basic_tests*"
      - "*kernel_lfsr113*"
      - "*kernel_lfsr113_poisson/*"
      - "*kernel_mrg/*"
      - "*kernel_mtgp32*"
      - "*kernel_mtgp32_poisson/*"
      - "*kernel_philox4x32_10*"
      - "*kernel_philox4x32_10_poisson/*"
      - "*kernel_sobol32*"
      - "*kernel_sobol32_poisson/*"
      - "*kernel_sobol64*"
      - "*kernel_sobol64_poisson/*"
      - "*kernel_threefry2x32_20*"
      - "*kernel_threefry2x32_20_poisson/*"
      - "*kernel_threefry2x64_20*"
      - "*kernel_threefry2x64_20_poisson/*"
      - "*kernel_threefry4x32_20*"
      - "*kernel_threefry4x32_20_poisson/*"
      - "*kernel_threefry4x64_20*"
      - "*kernel_threefry4x64_20_poisson/*"
      - "*kernel_xorwow*"
      - "*kernel_xorwow_poisson/*"
      - "*linkage_tests.*"
      - "*cpp_utils_tests.*"
      - "*log_normal_distribution_tests.*"
      - "*normal_distribution_tests.*"
      - "*poisson_distribution_tests/*"
      - "*config_dispatch_tests.*"
      - "*generator_type_tests.*"
      - "*log_normal_tests.*"
      - "*mrg31k3pTest.*"
      - "*mrg32k3aTest.*"
      - "*Mt19937OctoEngineTest.*"
      - "*Mt19937OctoEngineAccessorTest.*"
      - "*mtgp32_generator/*"
      - "*philox4x32_10_generator/*"
      - "*sobol_qrng_tests/*"
    exclude:
    # ffm-full is an alias of ffm-quick: tests labeled here are picked up
    # by both `ctest -L ffm-quick` and `ctest -L ffm-full`. There is no
    # separate ffm-full category entry at the moment.
    labels:
      - "ffm-quick"
      - "ffm-full"

# GPU-architecture-specific exclusions.
#
# Any keys under `exclude_gpu` follow the schema
#   exclude_gpu_<arch>             -> OS-agnostic
#   exclude_gpu_<arch>_windows     -> only when configuring on Windows
#   exclude_gpu_<arch>_linux       -> only when configuring on Linux
# Use the wildcard 'X' for hierarchical matching, e.g. `gfx11X` matches
# `gfx1100`, `gfx1101`, `gfx1102`, etc. For each entry the parser emits an
# additional CTest suite per applicable category, named
# `<target>_<category>_<arch>_suite`, that excludes the listed patterns.
#
# Add real entries here as rocRAND-specific GPU-quirks are identified.
exclude_gpu: {}

execution_settings:
  default_timeout: 600
  timeout_multiplier: 1   # Multiplier for all timeouts (1, 1.5, 1.75, 2, ...)
  category_timeouts:
    quick: 300            # 5 minutes (matches TheRock CI quick budget)
    standard: 14400       # 4 hours (longest tier the standard entry serves)
    ffm-quick: 7200       # 2 hours (also applies to the ffm-full alias label)
