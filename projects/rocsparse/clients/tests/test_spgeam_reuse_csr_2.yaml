---
include: rocsparse_common.yaml


Definitions:
  - &alpha_beta_range_quick
    - { alpha:   -1.0, beta:   1.0, alphai:  0.5, betai: -0.5 }

  - &alpha_beta_range_checkin
    - { alpha: 0.0, beta:   1.5, alphai:  0.0, betai: 0.3 }
    - { alpha:   2.0, beta: 0.0, alphai:  0.5, betai: 0.3 }
    - { alpha:   3.0, beta:   1.7, alphai: -0.5, betai: 0.8 }

  - &alpha_beta_range_nightly
    - { alpha:  -0.5, beta:  -0.2, alphai:  1.0, betai: 1.9 }

Tests:
# C = alpha * A + beta * B

# Quick
- name: spgeam_mult_reuse_csr_file_2
  category: quick
  function: spgeam_reuse_csr_2
  indextype: *i32i32_i64i32_i64i64
  precision: *single_double_precisions
  M: 1
  N: [222]
  K: 1
  alpha_beta: *alpha_beta_range_quick
  transA: [rocsparse_operation_none]
  transB: [rocsparse_operation_none]
  baseA: [rocsparse_index_base_one]
  baseB: [rocsparse_index_base_zero]
  baseC: [rocsparse_index_base_one]
  matrix: [rocsparse_matrix_file_rocalution]
  spgeam_alg: [rocsparse_spgeam_alg_default]
  filename: [nos1,
             nos2,
             nos3,
             nos4,
             nos5,
             nos6,
             nos7]

- name: spgeam_mult_reuse_csr_file_2
  category: quick
  function: spgeam_reuse_csr_2
  indextype: *i32i32_i64i32_i64i64
  precision: *single_double_precisions_complex
  M: 1
  N: [167]
  K: 1
  alpha_beta: *alpha_beta_range_quick
  transA: [rocsparse_operation_none]
  transB: [rocsparse_operation_none]
  baseA: [rocsparse_index_base_zero]
  baseB: [rocsparse_index_base_zero]
  baseC: [rocsparse_index_base_one]
  matrix: [rocsparse_matrix_file_rocalution]
  spgeam_alg: [rocsparse_spgeam_alg_default]
  filename: [Chevron2]

