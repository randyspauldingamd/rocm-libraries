---
include: rocsparse_common.yaml


Tests:
- name: roti_bad_arg
  category: pre_checkin
  function: roti_bad_arg
  precision: *single_double_precisions

- name: roti
  category: quick
  function: roti
  precision: *single_only_precisions
  M: [300]
  nnz: [5, 10]
  baseA: [rocsparse_index_base_zero, rocsparse_index_base_one]

- name: roti
  category: quick
  function: roti
  precision: *double_only_precisions
  M: [567]
  nnz: [5, 10, 500]
  baseA: [rocsparse_index_base_zero, rocsparse_index_base_one]

- name: roti
  category: pre_checkin
  function: roti
  precision: *single_double_precisions
  M: [12758]
  nnz: [0, 1543, 7111, 10000]
  baseA: [rocsparse_index_base_zero, rocsparse_index_base_one]

- name: roti
  category: nightly
  function: roti
  precision: *single_double_precisions
  M: [651243]
  nnz: [23512, 84412, 311983]
  baseA: [rocsparse_index_base_zero, rocsparse_index_base_one]

- name: roti_graph_test
  category: pre_checkin
  function: roti
  precision: *single_only_precisions
  M: [2000]
  nnz: [5, 10]
  baseA: [rocsparse_index_base_zero, rocsparse_index_base_one]
  graph_test: true

- name: roti_graph_test
  category: pre_checkin
  function: roti
  precision: *double_only_precisions
  M: [2000]
  nnz: [5, 10, 500]
  baseA: [rocsparse_index_base_zero, rocsparse_index_base_one]
  graph_test: true

- name: roti_graph_test
  category: pre_checkin
  function: roti
  precision: *single_only_precisions
  M: [2000]
  nnz: [500]
  baseA: [rocsparse_index_base_zero, rocsparse_index_base_one]
  graph_test: true

- name: roti
  category: quick
  function: roti
  precision: *single_only_precisions
  M: [575]
  nnz: [500]
  baseA: [rocsparse_index_base_zero, rocsparse_index_base_one]
