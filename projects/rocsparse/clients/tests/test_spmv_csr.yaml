---
include: rocsparse_common.yaml
Definitions:
  - &alpha_beta_range_quick
    - { alpha:   1.0, beta: -1.0, alphai:  1.0, betai: -0.5 }

  - &alpha_beta_range_checkin
    - { alpha:   0.0, beta:  1.0,  alphai:  1.5, betai:  0.5 }

  - &alpha_beta_range_nightly
    - { alpha:  -0.5, beta:  0.5,  alphai:  1.0, betai: -0.5 }
    - { alpha:  -1.0, beta: -0.5,  alphai:  0.0, betai:  0.0 }

  - &M_N_range_quick
    - { M: 12, N: 12 }

  - &M_N_range_checkin
    - { M: 0,    N: 0 }
  - &M_N_range_nightly
    - { M: 10354,   N: 10354 }
    - { M: 31057,  N: 31057 }
    - { M: 38564,  N: 38564 }
    - { M: 56748,  N: 56748 }
    - { M: 237462, N: 237462 }
    - { M: 457294, N: 457294 }
    - { M: 692846, N: 692846 }
    - { M: 791842, N: 791842 }
    - { M: 823710, N: 823710 }
    - { M: 910387, N: 910387 }
    - { M: 1029843, N: 1029843 }

Tests:
- name: spmv_csr_bad_arg
  category: pre_checkin
  function: spmv_csr_bad_arg
  indextype: *i32i32_i64i32_i64i64
  precision: *single_double_precisions_complex_real

#
# Test rocsparse_spmv_alg_default dispatch:
# - CSR format + default algo + transpose/conjugate_transpose should use rowsplit internally
# - CSR format + default algo + none should use adaptive internally
#

- name: spmv_csr_default_alg
  category: quick
  function: spmv_csr
  indextype: *i32i32_i64i32_i64i64
  precision: *single_double_precisions_complex_real
  M: [10, 500]
  N: [33, 842]
  alpha_beta: *alpha_beta_range_quick
  transA: *all_rocsparse_operation
  baseA: [rocsparse_index_base_zero]
  matrix: [rocsparse_matrix_random]
  matrix_type: [rocsparse_matrix_type_general]
  spmv_alg: [rocsparse_spmv_alg_default]

- name: spmv_csr_default_alg
  category: pre_checkin
  function: spmv_csr
  indextype: *i32i32_i64i32_i64i64
  precision: *single_double_precisions_complex_real
  M: [0, 7111]
  N: [0, 4441]
  alpha_beta: *alpha_beta_range_checkin
  transA: *all_rocsparse_operation
  baseA: [rocsparse_index_base_one]
  matrix: [rocsparse_matrix_random]
  matrix_type: [rocsparse_matrix_type_general]
  spmv_alg: [rocsparse_spmv_alg_default]
  call_stage_analysis: [false, true]

