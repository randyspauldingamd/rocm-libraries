---
include: rocsparse_common.yaml


Definitions:
  - &M_N_csr_range_quick
    - { M:   8, N:   8 }
    - { M:   64, N:   64 }

  - &M_N_csr_range_checkin
    - { M:   128, N:   128 }
    - { M:   1024, N:  1024 }

  - &M_N_csr_range_nightly
    - { M:   9381, N:   9381 }
    - { M:  37017, N:  37017 }

  - &alpha_csr_range_quick
    - { alpha:   1.0, alphai: -0.2 }

  - &alpha_csr_range_checkin
    - { alpha:   2.0, alphai:  0.0 }

  - &alpha_csr_range_nightly
    - { alpha:   0.0,  alphai: -0.75 }
    - { alpha:  -0.75, alphai:  0.25 }
    - { alpha:  -0.5, alphai:  0.1 }


  - &M_N_coo_range_quick
    - { M:   8, N:   8 }
    - { M:   64, N:   64 }

  - &M_N_coo_range_checkin
    - { M:   128, N:   128 }
    - { M:   1024, N:  1024 }

  - &M_N_coo_range_nightly
    - { M:   9381, N:   9381 }
    - { M:  37017, N:  37017 }

  - &alpha_coo_range_quick
    - { alpha:   1.0, alphai: -0.2 }

  - &alpha_coo_range_checkin
    - { alpha:   2.0, alphai:  0.0 }


  - &alpha_coo_range_nightly
    - { alpha:   0.0,  alphai: -0.75 }
    - { alpha:  -0.75, alphai:  0.25 }
    - { alpha:  -0.5, alphai:  0.1 }


Tests:
- name: sptrsv_bad_arg
  category: pre_checkin
  function: sptrsv_bad_arg
  precision: *single_double_precisions_complex_real
  formatA: [rocsparse_format_csr]

