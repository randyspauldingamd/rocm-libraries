  alpha_alphai: *alpha_csr_range_checkin
  transA: [rocsparse_operation_none]
  diag: *all_rocsparse_diag_type
  uplo: *all_rocsparse_fill_mode
  baseA: [rocsparse_index_base_zero]
  apol: *all_rocsparse_analysis_policy
  sptrsv_alg: [rocsparse_sptrsv_alg_default]
  matrix: [rocsparse_matrix_random]
  matrix_type: [rocsparse_matrix_type_general]
  formatA: [rocsparse_format_csr]
  batch_count: [2,4]

