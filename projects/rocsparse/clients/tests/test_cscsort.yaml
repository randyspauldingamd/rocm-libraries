---
include: rocsparse_common.yaml


Tests:
- name: cscsort_bad_arg
  category: pre_checkin
  function: cscsort_bad_arg
  precision: *single_precision

- name: cscsort
  category: quick
  function: cscsort
  precision: *single_precision
  M: [10]
  N: [33]
  baseA: [rocsparse_index_base_zero, rocsparse_index_base_one]
  matrix: [rocsparse_matrix_zero]
  algo: [0, 1]

- name: cscsort
  category: quick
  function: cscsort
  precision: *single_precision
  M: [10, 300]
  N: [33, 242]
  baseA: [rocsparse_index_base_zero, rocsparse_index_base_one]
  matrix: [rocsparse_matrix_random]
  algo: [0, 1]

- name: cscsort_file
  category: quick
  function: cscsort
  precision: *single_precision
  M: 1
  N: 1
  baseA: [rocsparse_index_base_zero, rocsparse_index_base_one]
  matrix: [rocsparse_matrix_file_rocalution]
  algo: [0, 1]
  filename: [nos1,
             nos2,
             nos3,
             nos4,
             nos5,
             nos6,
             nos7]

- name: cscsort
  category: pre_checkin
  function: cscsort
  precision: *single_precision
  M: [8, 2000]
  N: [8, 1623]
  baseA: [rocsparse_index_base_zero, rocsparse_index_base_one]
  matrix: [rocsparse_matrix_random]
  algo: [0, 1]

- name: cscsort_file
  category: pre_checkin
  function: cscsort
  precision: *single_precision
  M: 1
  N: 1
  baseA: [rocsparse_index_base_zero, rocsparse_index_base_one]
  matrix: [rocsparse_matrix_file_rocalution]
  algo: [0, 1]
  filename: [bmwcra_1,
             amazon0312,
             rma10,
             mc2depi,
             ASIC_320k]

- name: cscsort
  category: nightly
  function: cscsort
  precision: *single_precision
  M: [5000]
  N: [4586, 5000]
  baseA: [rocsparse_index_base_zero, rocsparse_index_base_one]
  matrix: [rocsparse_matrix_random]
  algo: [0, 1]

- name: cscsort_file
  category: nightly
  function: cscsort
  precision: *single_precision
  M: 1
  N: 1
  baseA: [rocsparse_index_base_zero, rocsparse_index_base_one]
  matrix: [rocsparse_matrix_file_rocalution]
  algo: [0, 1]
  filename: [bibd_22_8,
             Chebyshev4,
             sme3Dc,
             webbase-1M,
             shipsec1,
             Chevron3,
             Chevron4]
