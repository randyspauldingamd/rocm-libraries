---
include: rocsparse_common.yaml


Definitions:
  - &M_N_range_quick
    - { M:  50, N:  50 }
    - { M: 187, N: 187 }

  - &M_N_range_checkin
    - { M:  79, N:  79 }
    - { M: 428, N: 428 }

  - &M_N_range_nightly
    - { M:   9381, N:   9381 }
    - { M:  37017, N:  37017 }
    - { M: 505194, N: 505194 }

  - &M_N_range_extra
    - { M: 10, N: 10 }
    - { M: 235, N: 235 }
    - { M: 600, N: 600 }
    - { M: 1200, N: 1200 }

Tests:
- name: spildlt0_bad_arg
  category: pre_checkin
  function: spildlt0_bad_arg
  precision: *single_double_precisions_complex_real
  formatA: [rocsparse_format_csr]
  indextype: *i32

- name: spildlt0_extra
  category: pre_checkin
  M_N: *M_N_range_extra
  apol: [rocsparse_analysis_policy_reuse, rocsparse_analysis_policy_force]
  baseA: [rocsparse_index_base_zero, rocsparse_index_base_one]
  formatA: [rocsparse_format_csr]
  function: spildlt0_extra
  indextype: *i32
  batch_count: [1]

- name: spildlt0
  category: quick
  function: spildlt0
  precision: *single_double_precisions_complex_real
  M_N: *M_N_range_quick
  apol: [rocsparse_analysis_policy_reuse, rocsparse_analysis_policy_force]
  baseA: [rocsparse_index_base_zero, rocsparse_index_base_one]
  formatA: [rocsparse_format_csr]
  matrix: [rocsparse_matrix_zero]
  indextype: *i32
  batch_count: [1]

- name: spildlt0
  category: quick
  function: spildlt0
  precision: *single_double_precisions_complex_real
  M_N: *M_N_range_quick
  apol: [rocsparse_analysis_policy_reuse, rocsparse_analysis_policy_force]
  baseA: [rocsparse_index_base_zero, rocsparse_index_base_one]
  formatA: [rocsparse_format_csr]
  matrix: [rocsparse_matrix_random]
  indextype: *i32
  batch_count: [1, 2]

- name: spildlt0
  category: quick
  function: spildlt0
  precision: *single_double_precisions_complex_real
  M_N: *M_N_range_quick
  numericboost: [0, 1]
  boosttol: [0.05, 0.5]
  boostval: [1.0]
  apol: [rocsparse_analysis_policy_reuse]
  baseA: [rocsparse_index_base_zero]
  formatA: [rocsparse_format_csr]
  matrix: [rocsparse_matrix_random]
  indextype: *i32
  batch_count: [1]

- name: spildlt0
  category: pre_checkin
  function: spildlt0
  precision: *double_only_precisions_complex
  M_N:
