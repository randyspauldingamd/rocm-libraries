- name: csrmv
  category: stress
  function: csrmv
  precision: *single_only_precisions
  M: [1000000, 10000000]
  N: [1000000, 10000000]
  alpha_beta: *alpha_beta_range_stress
  transA: [rocsparse_operation_none]
