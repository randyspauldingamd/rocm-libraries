---
include: rocsparse_common.yaml
Definitions:
  - &alpha_beta_range_quick
    - { alpha:   1.0, beta: -1.0, alphai:  1.0, betai: -0.5 }

  - &alpha_beta_range_checkin
    - { alpha:   2.0, beta:  0.0,  alphai:  1.5, betai:  0.5 }

  - &alpha_beta_range_1
    - { alpha:   2.0, beta:  -4.0,  alphai:  1.0, betai:  1.0 }

  - &alpha_beta_range_nightly
    - { alpha:   0.0, beta:  0.0,  alphai:  1.5, betai:  0.5 }
    - { alpha:   3.0, beta:  1.0,  alphai:  1.5, betai:  0.0 }
    - { alpha:  -0.5, beta:  0.5,  alphai:  1.0, betai: -0.5 }
    - { alpha:  -1.0, beta: -0.5,  alphai:  0.0, betai:  0.0 }

  - &alpha_beta_range_stress
    - { alpha:   0.6, beta:  -0.5, alphai:  0.5, betai:  0.7 }

  - &M_N_range_quick
    - { M: 10, N: 10 }

  - &M_N_range_checkin
    - { M: 0,    N: 0 }
  - &M_N_range_nightly
    - { M: 29348,  N: 29348 }
    - { M: 37017,  N: 37017 }
    - { M: 39385,  N: 39385 }
    - { M: 193482, N: 193482 }
    - { M: 340123, N: 340123 }
    - { M: 710341, N: 710341 }
    - { M: 894736, N: 894736 }
    - { M: 917463, N: 917463 }

Tests:
- name: csrmv_bad_arg
  category: pre_checkin
  function: csrmv_bad_arg
  precision: *single_double_precisions_complex_real

#
# general matrix type
#

- name: csrmv
  category: quick
  function: csrmv
  precision: *single_double_precisions_complex_real
  M: [100]
  N: [142]
  alpha_beta: *alpha_beta_range_quick
  transA: [rocsparse_operation_none]
  baseA: [rocsparse_index_base_one]
  matrix: [rocsparse_matrix_zero]
  matrix_type: [rocsparse_matrix_type_general]
  spmv_alg: [rocsparse_spmv_alg_csr_adaptive]

- name: csrmv
  category: quick
  function: csrmv
  precision: *single_double_precisions_complex_real
  M: [10, 300]
  N: [33, 300]
  alpha_beta: *alpha_beta_range_quick
  transA: [rocsparse_operation_none]
  baseA: [rocsparse_index_base_zero]
  matrix: [rocsparse_matrix_random]
  matrix_type: [rocsparse_matrix_type_general]
  spmv_alg: [rocsparse_spmv_alg_csr_adaptive]

- name: csrmv
  category: quick
  function: csrmv
  precision: *single_double_precisions_complex_real
  M: [10, 300]
  N: [33, 300]
  alpha_beta: *alpha_beta_range_quick
  transA: [rocsparse_operation_transpose]
  baseA: [rocsparse_index_base_one]
  matrix: [rocsparse_matrix_random]
  matrix_type: [rocsparse_matrix_type_general]
  spmv_alg: [rocsparse_spmv_alg_csr_rowsplit]

- name: csrmv
  category: pre_checkin
  function: csrmv
  precision: *single_double_precisions_complex_real
  M: [8, 2000]
  N: [8, 2000]
  alpha_beta: *alpha_beta_range_checkin
  transA: [rocsparse_operation_none]
  baseA: [rocsparse_index_base_zero]
  matrix: [rocsparse_matrix_random]
  matrix_type: [rocsparse_matrix_type_general]
  spmv_alg: [rocsparse_spmv_alg_csr_adaptive]
  call_stage_analysis: [false]

#
# For code coverage.
#
- name: csrmv
  category: pre_checkin
  function: csrmv
  precision: *single_double_precisions
  M: [512]
  N: [128, 256]
  percentage: [1.0]
  alpha_beta: *alpha_beta_range_1
  transA: [rocsparse_operation_none]
  baseA: [rocsparse_index_base_zero]
  matrix: [rocsparse_matrix_random]
  matrix_type: [rocsparse_matrix_type_general]
  spmv_alg: [rocsparse_spmv_alg_csr_adaptive]

- name: csrmv
  category: nightly
  function: csrmv
  precision: *single_double_precisions_complex_real
  M: [5000]
  N: [5000]
  alpha_beta: *alpha_beta_range_nightly
  transA: [rocsparse_operation_none]
  baseA: [rocsparse_index_base_zero]
  matrix: [rocsparse_matrix_random]
  matrix_type: [rocsparse_matrix_type_general]
  spmv_alg: [rocsparse_spmv_alg_csr_adaptive]

- name: csrmv_file
  category: quick
  function: csrmv
  precision: *single_double_precisions
  M: 1
  N: 1
  alpha_beta: *alpha_beta_range_quick
  transA: [rocsparse_operation_none]
  baseA: [rocsparse_index_base_one]
  matrix: [rocsparse_matrix_file_rocalution]
  matrix_type: [rocsparse_matrix_type_general]
  spmv_alg: [rocsparse_spmv_alg_csr_adaptive]
  filename: [mac_econ_fwd500,
             nos2,
             nos4,
             nos6]

- name: csrmv_file
