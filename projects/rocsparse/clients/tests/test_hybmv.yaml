---
include: rocsparse_common.yaml


Definitions:
  - &alpha_beta_range_quick
    - { alpha:   1.0, beta: -1.0, alphai:  1.0, betai: -0.5 }


  - &alpha_beta_range_checkin
    - { alpha:   0.0, beta:  1.0,  alphai:  1.5, betai:  0.5 }
    - { alpha:   0.0, beta:  1.0,  alphai:  0.0, betai:  0.0 }


  - &alpha_beta_range_nightly
    - { alpha:   0.0, beta:  0.0,  alphai:  1.5, betai:  0.5 }
    - { alpha:   2.0, beta:  0.67, alphai:  0.0, betai:  1.5 }
    - { alpha:   3.0, beta:  1.0,  alphai:  1.5, betai:  0.0 }



Tests:
- name: hybmv_bad_arg
  category: pre_checkin
  function: hybmv_bad_arg
  precision: *single_double_precisions_complex_real

- name: hybmv
  category: pre_checkin
  function: hybmv
  precision: *single_double_precisions_complex_real
  M: [8, 16]
  N: [8, 16]
  alpha_beta: *alpha_beta_range_checkin
  transA: [rocsparse_operation_none]
  baseA: [rocsparse_index_base_zero]
  matrix: [rocsparse_matrix_random]
  part: [rocsparse_hyb_partition_auto]
  algo: [0]

- name: hybmv_file
  category: pre_checkin
  function: hybmv
  precision: *single_double_precisions
  M: 1
  N: 1
  alpha_beta: *alpha_beta_range_checkin
  transA: [rocsparse_operation_none]
  baseA: [rocsparse_index_base_zero]
  matrix: [rocsparse_matrix_file_rocalution]
  part: [rocsparse_hyb_partition_auto]
  algo: [0]
  filename: [nos1,
             nos3,
             nos5,
             nos7,
             bibd_22_8,
             Chebyshev4,
             ASIC_320k,
             mac_econ_fwd500]

- name: hybmv_file
  category: pre_checkin
  function: hybmv
  precision: *single_double_precisions_complex
  M: 1
  N: 1
  alpha_beta: *alpha_beta_range_checkin
  transA: [rocsparse_operation_none]
  baseA: [rocsparse_index_base_one]
  matrix: [rocsparse_matrix_file_rocalution]
  part: [rocsparse_hyb_partition_auto]
  algo: [0]
  filename: [mplate,
             Chevron3]

- name: hybmv
  category: quick
  function: hybmv
  precision: *single_double_precisions_complex_real
  M: [10, 300]
  N: [33, 300]
  alpha_beta: *alpha_beta_range_quick
  transA: [rocsparse_operation_none]
  baseA: [rocsparse_index_base_zero]
  matrix: [rocsparse_matrix_random]
  part: [rocsparse_hyb_partition_auto]
  algo: [1]

- name: hybmv_file
  category: quick
  function: hybmv
  precision: *single_double_precisions
  M: 1
  N: 1
  alpha_beta: *alpha_beta_range_quick
  transA: [rocsparse_operation_none]
  baseA: [rocsparse_index_base_one]
  matrix: [rocsparse_matrix_file_rocalution]
  part: [rocsparse_hyb_partition_auto]
  filename: [mac_econ_fwd500,
             nos2,
             nos4,
             nos6,
             scircuit]

- name: hybmv_file
  category: quick
  function: hybmv
  precision: *single_double_precisions_complex
  M: 1
  N: 1
  alpha_beta: *alpha_beta_range_quick
  transA: [rocsparse_operation_none]
  baseA: [rocsparse_index_base_zero]
  matrix: [rocsparse_matrix_file_rocalution]
  part: [rocsparse_hyb_partition_auto]
  filename: [Chevron2,
             qc2534]

- name: hybmv_file
  category: quick
  function: hybmv
  precision: *double_only_precisions_complex
  M: 1
  N: 1
  alpha_beta: *alpha_beta_range_quick
  transA: [rocsparse_operation_transpose]
  baseA: [rocsparse_index_base_zero]
  matrix: [rocsparse_matrix_file_rocalution]
  part: [rocsparse_hyb_partition_auto]
  filename: [Chevron2,
             qc2534]

- name: hybmv
  category: nightly
  function: hybmv
  precision: *single_double_precisions_complex_real
  M: [5000]
  N: [5000]
  alpha_beta: *alpha_beta_range_nightly
  transA: [rocsparse_operation_none]
  baseA: [rocsparse_index_base_zero]
  matrix: [rocsparse_matrix_random]
  part: [rocsparse_hyb_partition_auto]

- name: hybmv_file
  category: nightly
  function: hybmv
  precision: *single_double_precisions
  M: 1
  N: 1
  alpha_beta: *alpha_beta_range_nightly
  transA: [rocsparse_operation_none]
  baseA: [rocsparse_index_base_one]
  matrix: [rocsparse_matrix_file_rocalution]
  part: [rocsparse_hyb_partition_auto]
  filename: [amazon0312,
             Chebyshev4,
             sme3Dc,
             webbase-1M,
             shipsec1]

- name: hybmv_file
  category: nightly
  function: hybmv
  precision: *single_double_precisions_complex
  M: 1
  N: 1
  alpha_beta: *alpha_beta_range_nightly
  transA: [rocsparse_operation_none]
  baseA: [rocsparse_index_base_zero]
  matrix: [rocsparse_matrix_file_rocalution]
  part: [rocsparse_hyb_partition_auto]
  filename: [Chevron4]

# Coverage gap tests: transpose with device pointer mode (develop vs reduced_ci)
- name: hybmv_transpose
  category: pre_checkin
  function: hybmv
  precision: *single_double_precisions_complex_real
  M: [300]
  N: [300]
  alpha_beta: *alpha_beta_range_checkin
  transA: [rocsparse_operation_transpose, rocsparse_operation_conjugate_transpose]
  baseA: [rocsparse_index_base_zero]
  matrix: [rocsparse_matrix_random]
  part: [rocsparse_hyb_partition_auto]
  algo: [0]

- name: hybmv_graph_test
  category: pre_checkin
  function: hybmv
  precision: *single_double_precisions_complex_real
  M: [500]
  N: [842]
  alpha_beta: *alpha_beta_range_quick
  transA: [rocsparse_operation_none]
  baseA: [rocsparse_index_base_zero]
  matrix: [rocsparse_matrix_random]
  part: [rocsparse_hyb_partition_auto]
  algo: [0]
  graph_test: true
