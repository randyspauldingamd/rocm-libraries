---
include: rocsparse_common.yaml


Definitions:
  - &M_N_range_quick
    - { M:  50, N:  50 }

  - &M_N_range_checkin
    - { M:   1, N:   1 }
    - { M:   8, N:   8 }

  - &M_N_range_checkin_1
    - { M:  79, N:  79 }
    - { M: 152, N: 152 }

  - &M_N_range_nightly
    - { M:  9381, N:  9381 }
    - { M: 37017, N: 37017 }

  - &alpha_range_quick
    - { alpha:   1.0, alphai: -0.2 }

  - &alpha_range_checkin
    - { alpha:   2.0, alphai:  0.0 }
    - { alpha:   3.0, alphai: -1.0 }

  - &alpha_range_nightly
    - { alpha:  -0.5, alphai:  0.1 }
    - { alpha:   0.0,  alphai:  0.05 }
    - { alpha:  -0.02, alphai: -0.1 }

  - &alpha_range_nightly_one
    - { alpha:   1.0,  alphai:  0.0 }

  - &alpha_range_stress
    - { alpha:   1.0, alphai:  0.0}

Tests:
- name: sptrsm_coo
  category: pre_checkin
  function: sptrsm_coo
  indextype: *i64
  precision: *double_only_precisions
  M_N: *M_N_range_checkin
  K: [0, 1]
  ld_multiplier_B: [2]
  ld_multiplier_C: [2]
  alpha_alphai: *alpha_range_checkin
  transA: [rocsparse_operation_none]
  transB: [rocsparse_operation_none]
  orderB: *all_rocsparse_order
  orderC: *all_rocsparse_order
  diag: [rocsparse_diag_type_unit]
  uplo: [rocsparse_fill_mode_upper]
  baseA: [rocsparse_index_base_zero]
  sptrsm_alg: [rocsparse_sptrsm_alg_default]
  matrix: [rocsparse_matrix_random]

- name: sptrsm_coo_bad_arg
  category: pre_checkin
  function: sptrsm_coo_bad_arg
  precision: *single_double_precisions_complex_real

