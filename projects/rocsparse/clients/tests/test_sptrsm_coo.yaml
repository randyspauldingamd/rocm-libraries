  K: [1, 2, 8]
  ld_multiplier_B: [1]
  ld_multiplier_C: [4]
  alpha_alphai: *alpha_range_checkin
  transA: [rocsparse_operation_none, rocsparse_operation_transpose]
  transB: [rocsparse_operation_none, rocsparse_operation_transpose]
  orderB: *all_rocsparse_order
  orderC: *all_rocsparse_order
  diag: [rocsparse_diag_type_unit]
  uplo: *all_rocsparse_fill_mode
  baseA: *all_rocsparse_index_base
  sptrsm_alg: [rocsparse_sptrsm_alg_default]
  matrix: [rocsparse_matrix_random]

