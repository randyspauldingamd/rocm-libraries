---
include: rocsparse_common.yaml


Definitions:
  - &alpha_range_quick
    - { alpha:   1.0, alphai:  1.0 }

  - &alpha_range_checkin
    - { alpha:   3.0, alphai:  1.0 }

  - &alpha_range_nightly
    - { alpha:   0.0, alphai:  1.5 }
    - { alpha:   2.0, alphai:  0.0 }

  - &beta_range_quick
    - { beta:   1.0, betai:  1.0 }

  - &beta_range_checkin
    - { beta:   2.0, betai:  1.5 }

  - &beta_range_nightly
    - { beta:   0.0, betai:  1.5 }
    - { beta:   2.0, betai:  0.0 }

Tests:
# Quick
