# rocBLAS Test Categories Configuration
# Aligned with rocJenkins job types (precheckin, extended, weekly) and Test Filter Standardization POC.
# *quick* without *strided* is a proxy for smoke set until we use the smoke yaml.
test_categories:
  quick:
    description: "Smoke - not the same as rocblas_smoke.yaml TODO (timeout: 30 min)"
    test_patterns:
      - "*quick*"
    exclude:
      - "*strided*"
      - "*known_bug*"
    labels:
      - "quick"
      - "smoke"

  standard:
    description: "Precheckin - same as Jenkins precheckin (timeout: 2 hours)"
    test_patterns:
      - "*quick*"
      - "*pre_checkin*"
    exclude:
      - "*known_bug*"
    labels:
      - "standard"
      - "pr"
      - "precheckin"

  comprehensive:
    description: "Extended - same as Jenkins extended/nightly (timeout: 8 hours)"
    test_patterns:
      - "*nightly*"
    exclude:
      - "*known_bug*"
    labels:
      - "comprehensive"
      - "nightly"
      - "extended"

  full:
    description: "Stress / weekly - same as Jenkins weekly (stress + HMM)"
    test_patterns:
    #  - "*stress*"
    #  - "*HMM*"
    # current CI use case currently does not match stress use case
      - "*quick*"
      - "*pre_checkin*"
      - "*nightly*"
    exclude:
      - "*known_bug*"
    labels:
      - "full"
      - "stress"
      - "weekly"

# GPU-specific exclusions can be added here when needed (see shared/ctest/README.md).
# exclude_gpu:
#   exclude_gpu_gfxXXXX:
#     test_patterns: [...]
#     labels: ["quick", "standard", "comprehensive", "full", "ex_gpu_gfxXXXX"]

execution_settings:
  default_timeout: 900
  timeout_multiplier: 1
  category_timeouts:
    quick: 1800    # 30 min
    standard: 7200    # 2 hours
    comprehensive: 7200   # 2 hours
    full: 28800       # 8 hours
