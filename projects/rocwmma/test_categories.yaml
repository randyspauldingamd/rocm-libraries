# rocWMMA Test Categories Configuration (CTest)
#
# Based on test_rocwmma.py from TheRock.
#
# Labels here are applied to the *installed-tree* CTestTestfile.cmake
# fragments (full / smoke / regression) by a single call to
# apply_ctest_category_labels(yaml, install_test_file) in
# projects/rocwmma/test/CMakeLists.txt, after every subdirectory has
# appended its add_test() lines. The shared parser scans those lines
# for test names and emits explicit set_tests_properties(... LABELS ...)
# entries, which is the only form ctest's script interpreter exposes
# through `--print-labels` / `-L` at install time.
#
# Test types used by TheRock (test_runner.py):
# - quick: ctest --test-dir …/rocwmma/regression with -L quick (emulation regression tree; ~12 min)
# - standard/comprehensive/full: ctest --test-dir …/rocwmma with -L <tier> -LE <tier>_exclude
#
# Tier labels are applied automatically by parse_ctest_categories.py:
#   quick         -> quick, standard, comprehensive, full so that tests in quick category will be run for all categories
#   standard      -> standard, comprehensive, full
#   comprehensive -> comprehensive, full
#   full          -> full
# The `labels:` field below is a placeholder for additional custom labels
# (e.g. "flaky", "gpu_only", "slow"). The category's own tier label is
# kept here for clarity and as an anchor for future additions.

test_categories:
  quick:
    description: "rocWMMA quick tests - regression install tree (emulation + regression_tests)"
    test_patterns:
      - "regression_tests"
      - ".* regression$"
    exclude:
      # Flaky/problematic tests excluded
      - ".*unpack_util_test.*"
      - ".*contamination_test.*"
      - ".*map_util_test.*"
    labels:
      - "quick"

  standard:
    description: "rocWMMA standard tests"
    test_patterns:
      - ".*"
    exclude:
      - ".*unpack_util_test.*"
      - ".*contamination_test.*"
      - ".*map_util_test.*"
    labels:
      - "standard"

  comprehensive:
    description: "rocWMMA comprehensive tests"
    test_patterns:
      - ".*"
    exclude:
      - ".*unpack_util_test.*"
      - ".*contamination_test.*"
      - ".*map_util_test.*"
    labels:
      - "comprehensive"

  full:
    description: "rocWMMA full test suite - includes flaky/problematic tests excluded from lower tiers"
    test_patterns:
      - ".*"
    # No exclude list: 'full' is the absolute superset and is the only way
    # to exercise tests that are flaky under current infrastructure
    # (unpack_util_test, contamination_test, map_util_test). These remain
    # excluded from quick/standard/comprehensive so routine CI stays green;
    # `ctest -L full` is the opt-in path for running them. See PR #7535
    # review thread for context.
    labels:
      - "full"
