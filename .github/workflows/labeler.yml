name: Auto Label PR
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-24.04
    steps:
    - id: label-the-PR
      uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0
