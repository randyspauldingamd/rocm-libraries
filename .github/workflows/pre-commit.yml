name: "pre-commit checks"
on:
  pull_request:
    branches:
      - develop

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0 # 0 fetches all commit history for --from-ref/--to-ref to function

      - name: Run pre-commit filter tests
        run: python3 .github/scripts/tests/pre_commit_filter_test.py

      - name: Filter changed files
        id: filter
        env:
          # List of projects opted into pre-commit checks.
          # Add new projects here (one per line), expressed as the name of their folder within 'projects/' or 'shared/':
          OPTED_IN_PROJECTS: >-
            hipdnn
        run: |
          python3 .github/scripts/pre_commit_filter.py \
            --base-ref origin/${{ github.event.pull_request.base.ref }} \
            --head-ref HEAD \
            $OPTED_IN_PROJECTS

      - name: Set up Python
        if: steps.filter.outputs.should_run == 'true'
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
        with:
          python-version: '3.12'

      - name: Install core dependencies
        if: steps.filter.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      # If hipdnn_changed then FILTERED_FILES is unempty.
      # Hence, this is only conditional on hipdnn_changed.
      - name: Install hipDNN dependencies
        if: steps.filter.outputs.hipdnn_changed == 'true'
        run: |
          # Install flatc for hipDNN
          wget -q https://github.com/google/flatbuffers/releases/download/v25.9.23/Linux.flatc.binary.g++-13.zip
          unzip -q Linux.flatc.binary.g++-13.zip
          sudo mv flatc /usr/local/bin/
          sudo chmod +x /usr/local/bin/flatc
          rm Linux.flatc.binary.g++-13.zip

      # Add additional project-specific dependency steps here as needed
      # Example:
      # - name: Install <project-name> dependencies
      #   if: steps.filter.outputs.<project-name>_changed == 'true'
      #   run: |
      #     # Install project-specific dependencies

      - name: Run pre-commit checks
        if: steps.filter.outputs.should_run == 'true'
        run: |
          echo "================================================"
          echo "Running pre-commit checks on changed files..."
          echo "================================================"
          echo ""

          # mapfile is a bash builtin that reads lines from stdin into an array
          mapfile -t FILTERED_FILES <<< "${{ steps.filter.outputs.files }}"

          if ! pre-commit run --show-diff-on-failure --files "${FILTERED_FILES[@]}"; then
            echo ""
            echo "================================================"
            echo "❌ Pre-commit checks FAILED"
            echo "================================================"
            echo ""
            echo "Please fix the issues above and commit the changes."
            echo ""
            echo "To run pre-commit locally on eligible changed files:"
            echo -n "  pre-commit run --files "
            printf "%q " "${FILTERED_FILES[@]}"
            echo ""
            echo "Or install pre-commit hooks to run automatically on commits:"
            echo "  pip install pre-commit"
            echo "  pre-commit install"
            echo ""
            exit 1
          fi

          echo ""
          echo "================================================"
          echo "✅ All pre-commit checks passed"
          echo "================================================"
