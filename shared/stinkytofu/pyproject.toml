[project]
name = "stinkytofu"
version = "0.1.0"
description = "An LLVM-inspired pass-based IR optimizer for AMD GPU assembly kernels"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = []

[build-system]
requires = ["scikit-build-core>=0.10", "nanobind>=2.0"]
build-backend = "scikit_build_core.build"

[tool.scikit-build]
cmake.build-type = "Release"
cmake.args = [
    "-DSTINKYTOFU_BUILD_PYTHON=ON",
    "-DSTINKYTOFU_BUILD_TESTS=OFF",
]
# No pure-Python packages to scan; the wheel contents come entirely from
# cmake install() rules (_stinkytofu.so + __init__.py → stinkytofu/).
wheel.packages = []
