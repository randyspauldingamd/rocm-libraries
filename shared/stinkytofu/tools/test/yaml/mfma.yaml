GlobalParameters:
  NumElementsToValidate: -1
  NumWarmups: 1000
  NumBenchmarks: 1
  SyncsPerBenchmark: 1
  EnqueuesPerSync: 10000
  MinFlopsPerSync: 10737418240
  MaxEnqueuesPerSync: 10000
  SleepPercent: 0
  PrintWinnersOnly: True
  KernelTime: True
  RotatingBufferSize: 512
  Device: 0
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  MaxWorkspaceSize: 5000000000
  CpuThreads: 0

BenchmarkProblems:
  #######################################
  # NN - standard
  #######################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: H
      DestDataType: H
      ComputeDataType: s
      HighPrecisionAccumulate:  True
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      Sparse: 0
      Batched: True
      Activation: True
      ActivationType: all

    - # BenchmarkProblemSizeGroup - Standard
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
        #- EdgeType: ["ShiftPtr"]
      ForkParameters:
        - MatrixInstruction:
          - [16, 16, 16, 1,  1,  2, 2,  2, 2 ]
          # - [16, 16, 16, 1,  1,  2, 4,  4, 2 ]
          # - [16, 16, 16, 1,  1,  8, 2,  1, 4 ]
          # - [32, 32, 16, 1,  1,  7, 2,  1, 4 ]
          # - [32, 32, 16, 1,  1,  6, 2,  1, 4 ]
          # - [32, 32, 16, 1,  1,  5, 2,  1, 4 ]
          # - [32, 32, 16, 1,  1,  4, 2,  1, 4 ]
          # - [32, 32, 16, 1,  1,  3, 2,  1, 4 ]
          # - [32, 32, 16, 1,  1,  2, 2,  1, 4 ]
          # - [32, 32, 16, 1,  1,  1, 1,  1, 1 ]
        - GlobalReadVectorWidthA: [4]
        - WorkGroupMappingXCC: [8]
        # - GlobalReadVectorWidthA: [-1]
        # - GlobalReadVectorWidthB: [-1]
        - DepthU: [32]
        # - VectorWidthA: [1,2]
        # - VectorWidthB: [1]
        - TransposeLDS: [-1]
        # - LdsPadA: [-1]
        # - LdsPadB: [-1]
        # - LdsPadMetadata: [-1]
        # - LdsBlockSizePerPadA: [-1]
        # - LdsBlockSizePerPadB: [-1]
        # - LdsBlockSizePerPadMetadata: [-1]
        # - StaggerU: [0]
        - ScheduleIterAlg: [1]
        # - ClusterLocalRead: [1]
        - PrefetchLocalRead: [1]
        - PrefetchGlobalRead: [1]
        # - StoreRemapVectorWidth: [-1]
        # - GlobalSplitU: [2, 3, 4, 5, 6, 7, 8, 10, 12, 14, 16, 18, 20, 24, 28, 32, 40, 48, 60]
        # - GlobalSplitUAlgorithm: [MultipleBuffer]
        - 1LDSBuffer: [1]
        - DirectToVgprSparseMetadata: [0]
        - WorkGroupMapping: [1]
        - StoreVectorWidth: [-1]
        - GlobalSplitUAlgorithm: [MultipleBufferSingleKernel]
        # - LocalReadVectorWidth: [4,8]
        # - SourceSwap: [0,1]
        - UseSgprForGRO: [1]
      BenchmarkForkParameters:
      JoinParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
