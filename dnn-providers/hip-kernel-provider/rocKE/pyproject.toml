# rocKE - rocke Python authoring frontend for the rocKE C++ kernel engine.
#
# This declares the pure-Python package `rocke` (rooted at Python/rocke) so it
# can be installed/editable-installed:  pip install -e .   (run from rocKE/)
# The bare workflow still works too:    PYTHONPATH=<rocKE>/Python  ->  import rocke
#
# The C++ engine (Cpp/ -> librocke_core.a) and its `rocke_engine` pybind binding are
# built via CMake, not pip (see BUILD.md); they are intentionally NOT part of
# this wheel.

[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rocke"
version = "0.1.0"
description = "rocKE: Python authoring frontend for the rocKE AMDGPU kernel engine"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "numpy>=1.24",
]

[project.optional-dependencies]
# torch must be the ROCm build for your system (install from the ROCm wheel
# index, not here); see requirements.txt / BUILD.md.
dev = [
    "pytest>=7.0",
    "pytest-subtests>=0.11",
    "pybind11>=3.0",
]

[tool.setuptools]
package-dir = { "" = "Python" }

[tool.setuptools.packages.find]
where = ["Python"]
include = ["rocke*"]
