# Integration test configuration for MIOPEN_ENGINE
# Filters use GTest-style globs: * matches any sequence of characters
# Later entries take precedence over earlier ones when multiple filters match

[meta]
version = 1

# -- Tolerance Overrides --
# Override default tolerances for specific tests or groups of tests.
# Each entry requires:
#   filters: array of glob patterns matched against the full GTest name
#   atol: absolute tolerance
#   rtol: relative tolerance

# BatchnormBackwardCalcStats 3D /0 (shape [1,16,8,112,112], NCDHW) — DSCALE
# runs ~0.94-1.08% low vs CPU reference (uniform across 16 channels and all 3
# dtypes; impl/ref ratio ~0.9906 to 4 sig figs). Bumped tolerance to keep the
# fixture running outside the gfx11+windows skip scope while epic 1913 is
# investigated. Same fixture is skipped on gfx11+windows above; the skip
# fires in SetUp before this tolerance applies, so the two coexist cleanly.
[[tolerance_overrides]]
filters = ["Full/*BatchnormBackwardCalcStats3d*.Correctness/0"]
atol = 0.002
rtol = 0.012

# -- Test Skips --
# Skip tests on specific architectures (or globally if 'archs' is omitted).
# Each entry requires:
#   archs:   optional array of substrings matched against the device's raw
#            gcnArchName (e.g. "gfx942" matches "gfx942:sramecc+:xnack-").
#            Omit or leave empty to skip on every arch.
#   filters: array of GTest globs matched against the full GTest name
#   reason:  human-readable string surfaced in the GTEST_SKIP message
# First matching entry wins.

# ROCm/rocm-libraries#6979 — MIOpen Conv-Bias-Activation (CBA) fusion has
# limited solver coverage: gfx90a returns wrong results, and RDNA archs
# (gfx10*, gfx11*, gfx12*) have no CK fusion kernels. Skip the
# integration-tests CBA fixtures on those archs until the upstream issue
# is resolved.
#
# Replaces the same-arch carve-out previously enforced at runtime by
# IS_WORKAROUND_ISSUE_6979 / shouldSkipOnEngineConfigResult in
# dnn-providers/miopen-provider/tests/common/TestWorkarounds.hpp.
[[test_skips]]
archs   = ["gfx90a", "gfx10", "gfx11", "gfx12"]
filters = ["*ConvFwdBiasActiv*"]
reason  = "ROCm/rocm-libraries#6979 — no engine has an applicable solution for ConvBiasActiv fusion (gfx90a returns wrong results; RDNA archs have no CK fusion kernels)"
